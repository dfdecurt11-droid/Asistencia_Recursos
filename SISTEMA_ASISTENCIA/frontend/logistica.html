<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARGRAMETAL | Área Logistica</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2312/2312701.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #f59e0b; /* Ámbar Logística */
            --bg-dark: #020617;
            --surface: #0f172a;
            --surface-alt: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(245, 158, 11, 0.05) 0px, transparent 50%),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: clamp(20px, 5vh, 50px) 20px;
        }

        .container { 
            width: 100%;
            max-width: 1000px;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* --- NAVEGACIÓN --- */
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .btn-back {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }
        .btn-back:hover { color: white; transform: translateX(-5px); }

        .clock-box {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            background: rgba(245, 158, 11, 0.05);
            padding: 8px 18px;
            border-radius: 10px;
            border: 1px solid rgba(245, 158, 11, 0.15);
        }

        /* --- TÍTULO DE ÁREA --- */
        .header-section { margin-bottom: 35px; }
        .header-section span { 
            font-size: 0.75rem; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-weight: 800; 
        }
        .header-section h1 { 
            font-size: clamp(1.8rem, 5vw, 2.5rem); 
            font-weight: 800; 
            letter-spacing: -1.5px; 
            margin-top: 5px;
        }

        /* --- LISTADO DE PERSONAL --- */
        .staff-list {
            display: grid;
            gap: 12px;
            max-height: 58vh;
            overflow-y: auto;
            padding-right: 10px;
        }

        .staff-list::-webkit-scrollbar { width: 4px; }
        .staff-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .staff-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .staff-card:hover {
            border-color: rgba(245, 158, 11, 0.3);
            background: var(--surface-alt);
        }

        .staff-info strong { 
            font-size: 1.15rem; 
            display: block; 
            margin-bottom: 4px; 
            color: #fff; 
        }

        .staff-tag { 
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem; 
            color: var(--text-dim); 
            background: rgba(255,255,255,0.03);
            padding: 3px 8px;
            border-radius: 5px;
            border: 1px solid var(--border);
        }

        /* --- ACCIONES --- */
        .btn-group { display: flex; gap: 10px; }

        .btn-action {
            height: 44px;
            min-width: 130px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            background: transparent;
            color: white;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-action:hover:not(:disabled) {
            background: white;
            color: var(--bg-dark);
            border-color: white;
        }

        .btn-action:disabled { opacity: 0.2; cursor: not-allowed; }

        /* --- SISTEMA DE TOAST --- */
        #notification {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 16px 28px; border-radius: 12px;
            background: white; color: var(--bg-dark);
            display: none; z-index: 1000;
            font-size: 0.8rem; font-weight: 800;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

        @media (max-width: 768px) {
            .staff-card { flex-direction: column; text-align: center; gap: 20px; padding: 25px; }
            .btn-group { width: 100%; }
            .btn-action { flex: 1; }
            .nav-header { flex-direction: column-reverse; gap: 15px; }
        }
    </style>
</head>
<body>

    <div id="notification"></div>

    <div class="container">
        <nav class="nav-header">
            <a href="lista.html" class="btn-back"><i class="fas fa-arrow-left"></i> Áreas del Sistema</a>
            <div id="reloj" class="clock-box">00:00:00</div>
        </nav>

        <header class="header-section">
            <span>ARGRAMETAL S.A.</span>
            <h1>ÁREA <span style="color: var(--accent);">LOGÍSTICA</span></h1>
        </header>

        <main id="lista-asistencia" class="staff-list">
            <div style="text-align:center; padding: 80px; opacity: 0.4;">
                <i class="fas fa-circle-notch fa-spin" style="font-size: 1.5rem; color: var(--accent);"></i>
                <p style="margin-top: 15px; font-weight: 700; font-size: 0.75rem; letter-spacing: 3px;">SINCRONIZANDO MANIFIESTO...</p>
            </div>
        </main>
    </div>

    <script>
        const API_GET = "https://asistencia-recursos.onrender.com/api/practicantes";
        const API_POST = "https://asistencia-recursos.onrender.com/api/asistencia";
        const AREA_NAME = "Logística";

        function startClock() {
            setInterval(() => {
                document.getElementById('reloj').textContent = new Date().toLocaleTimeString('es-PE', { 
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false 
                });
            }, 1000);
        }

        function notify(text, isError = false) {
            const toast = document.getElementById('notification');
            toast.style.display = 'block';
            toast.style.background = isError ? '#ef4444' : '#ffffff';
            toast.style.color = isError ? '#ffffff' : '#020617';
            toast.innerHTML = `<i class="fas ${isError ? 'fa-triangle-exclamation' : 'fa-circle-check'}"></i> &nbsp; ${text.toUpperCase()}`;
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        async function loadLogisticsTeam() {
            const container = document.getElementById('lista-asistencia');
            try {
                const res = await fetch(API_GET);
                const data = await res.json();
                
                const equipo = data.filter(p => p.area.trim() === AREA_NAME);

                if (equipo.length === 0) {
                    container.innerHTML = `<p style="text-align:center; padding: 40px; color:var(--text-dim);">No hay personal registrado en Logística.</p>`;
                    return;
                }

                container.innerHTML = equipo.sort((a,b) => a.apellidos.localeCompare(b.apellidos)).map(p => `
                    <div class="staff-card">
                        <div class="staff-info">
                            <strong>${p.apellidos.toUpperCase()}, ${p.nombres}</strong>
                            <span class="staff-tag">ID: ${String(p.id_practicantes).padStart(4, '0')} • ARGRAMETAL</span>
                        </div>
                        <div class="btn-group">
                            <button class="btn-action" onclick="register(${p.id_practicantes}, 'entrada', this)">
                                Entrada
                            </button>
                            <button class="btn-action" onclick="register(${p.id_practicantes}, 'salida', this)">
                                Salida
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                notify("Error de sincronización", true);
                container.innerHTML = `<p style="text-align:center; color:#ef4444; font-weight:800; padding: 40px;">FALLO DE RED</p>`;
            }
        }

        async function register(id, tipo, btn) {
            const btns = btn.closest('.btn-group').querySelectorAll('button');
            const originalText = btn.innerText;

            btns.forEach(b => b.disabled = true);
            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i>`;

            try {
                const res = await fetch(`${API_POST}/${id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tipo_registro: tipo })
                });

                if (res.ok) {
                    notify(`MARCACIÓN DE ${tipo} REGISTRADA`);
                } else {
                    const err = await res.json();
                    notify(err.message || "Error en proceso", true);
                }
            } catch (e) {
                notify("Sin respuesta del servidor", true);
            } finally {
                btns.forEach(b => b.disabled = false);
                btn.innerText = originalText;
            }
        }

        window.onload = () => {
            startClock();
            loadLogisticsTeam();
        };
    </script>
</body>
</html>
