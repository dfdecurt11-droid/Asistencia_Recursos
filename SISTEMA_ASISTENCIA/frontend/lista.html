<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RRHH | Gestión de Áreas</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #020617;
            --bg-card: rgba(15, 23, 42, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --c-ventas: #fb7185; --c-finanzas: #34d399; --c-marketing: #a78bfa;
            --c-logistica: #fbbf24; --c-mejora: #22d3ee; --c-rrhh: #f472b6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.08) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.08) 0%, transparent 35%);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container { 
            width: 100%; 
            max-width: 1100px; 
            height: 95vh; 
            display: flex;
            flex-direction: column;
            padding: 1rem;
            position: relative; /* Para que el botón se posicione respecto a esto */
        }

        /* --- BOTÓN VOLVER (ESQUINA SUPERIOR IZQUIERDA) --- */
        .btn-back-header {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
            padding: 8px 12px;
            border-radius: 12px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .btn-back-header:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .header { 
            text-align: center; 
            margin-top: 40px; /* Espacio para que no choque con el botón de volver */
        }
        .header h1 { 
            font-size: clamp(1.4rem, 4vh, 2.2rem); 
            font-weight: 800; 
            letter-spacing: -1px;
            margin-bottom: 0.5vh;
        }
        .header p { color: var(--text-muted); font-size: clamp(0.75rem, 1.8vh, 0.9rem); }

        .area-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 1.5vh;
            flex-grow: 1;
            margin: 2vh 0;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.5vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--accent-color); }

        .icon-wrapper {
            width: clamp(40px, 7vh, 55px);
            height: clamp(40px, 7vh, 55px);
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: var(--accent-color);
            margin-bottom: 1vh;
            border: 1px solid var(--border);
        }

        .card h3 { 
            font-size: clamp(0.9rem, 2.2vh, 1.1rem); 
            margin-bottom: 1.5vh;
        }

        .btn-attendance {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: 0.3s;
        }

        .card:hover .btn-attendance {
            background-color: var(--accent-color);
            color: #020617;
            border-color: transparent;
        }

        /* Colores de Área */
        .ventas { --accent-color: var(--c-ventas); }
        .finanzas { --accent-color: var(--c-finanzas); }
        .marketing { --accent-color: var(--c-marketing); }
        .logistica { --accent-color: var(--c-logistica); }
        .mejora { --accent-color: var(--c-mejora); }
        .rrhh { --accent-color: var(--c-rrhh); }

        /* Ajuste para móviles */
        @media (max-width: 768px) {
            .container { height: 98vh; padding: 0.8rem; }
            .header { margin-top: 50px; }
            .btn-back-header { top: 15px; left: 15px; font-size: 0.75rem; }
            .area-grid {
                grid-template-columns: repeat(2, 1fr); 
                grid-template-rows: repeat(3, 1fr);
                gap: 1vh;
            }
            .card { border-radius: 20px; padding: 1vh; }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="registro.html" class="btn-back-header">
            <i class="fas fa-arrow-left"></i><span>Volver</span>
        </a>

        <header class="header">
            <h1>Control de Asistencia</h1>
            <p>Seleccione un área para continuar</p>
        </header>

        <main class="area-grid">
            <div class="card ventas">
                <div class="icon-wrapper"><i class="fas fa-chart-line"></i></div>
                <h3>Ventas</h3>
                <a href="ventas.html" class="btn-attendance">TOMAR ASISTENCIA <i class="fas fa-arrow-right"></i></a>
            </div>

            <div class="card finanzas">
                <div class="icon-wrapper"><i class="fas fa-landmark"></i></div>
                <h3>Finanzas</h3>
                <a href="finanzas.html" class="btn-attendance">TOMAR ASISTENCIA <i class="fas fa-arrow-right"></i></a>
            </div>

            <div class="card marketing">
                <div class="icon-wrapper"><i class="fas fa-rocket"></i></div>
                <h3>Marketing</h3>
                <a href="marketing.html" class="btn-attendance">TOMAR ASISTENCIA <i class="fas fa-arrow-right"></i></a>
            </div>

            <div class="card logistica">
                <div class="icon-wrapper"><i class="fas fa-box-open"></i></div>
                <h3>Logística</h3>
                <a href="logistica.html" class="btn-attendance">TOMAR ASISTENCIA <i class="fas fa-arrow-right"></i></a>
            </div>

            <div class="card mejora">
                <div class="icon-wrapper"><i class="fas fa-microchip"></i></div>
                <h3>Mejora</h3>
                <a href="gestion_continua.html" class="btn-attendance">TOMAR ASISTENCIA <i class="fas fa-arrow-right"></i></a>
            </div>

            <div class="card rrhh">
                <div class="icon-wrapper"><i class="fas fa-id-card-clip"></i></div>
                <h3>Talento</h3>
                <a href="recursos_humanos.html" class="btn-attendance">TOMAR ASISTENCIA <i class="fas fa-arrow-right"></i></a>
            </div>
        </main>
    </div>

</body>
</html>
