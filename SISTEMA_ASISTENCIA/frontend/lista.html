<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control RRHH - Departamentos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3498db;
            --dark: #2c3e50;
            --bg-color-1: #4158D0;
            --bg-color-2: #C850C0;
            --bg-color-3: #FFCC70;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(45deg, var(--bg-color-1), var(--bg-color-2), var(--bg-color-3));
            background-size: 300% 300%;
            animation: gradientMove 10s ease infinite;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bubbles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: moveUp 15s linear infinite;
            bottom: -150px;
        }

        @keyframes moveUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            z-index: 2;
            color: white;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            text-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .grid-menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            width: 100%;
            z-index: 2;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 45px 20px;
            text-align: center;
            text-decoration: none;
            color: var(--dark);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.4);
        }

        .menu-card i { font-size: 4rem; margin-bottom: 25px; }

        .menu-card:hover {
            transform: translateY(-15px);
            background: white;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        /* Colores vivos */
        .ventas i { color: #FF4757; }
        .finanzas i { color: #2ED573; }
        .marketing i { color: #1E90FF; }
        .logistica i { color: #3742FA; }
        .gestion i { color: #FFA502; }

        .btn-back {
            margin-top: 50px;
            text-decoration: none;
            color: white;
            background: rgba(0,0,0,0.2);
            padding: 12px 25px;
            border-radius: 50px;
            z-index: 2;
            transition: 0.3s;
        }
    </style>
</head>
<body>

<div class="bubbles" id="bubbleContainer"></div>

<div class="header">
    <h1>Control de Asistencia RRHH</h1>
    <p>ASISTENCIA POR AREAS</p>
</div>

<div class="grid-menu">
    <a href="ventas.html" class="menu-card ventas">
        <i class="fas fa-shopping-cart"></i>
        <h3>Ventas</h3>
        <p>Asesores Comerciales</p>
    </a>

    <a href="finanzas.html" class="menu-card finanzas">
        <i class="fas fa-file-invoice-dollar"></i>
        <h3>Finanzas</h3>
        <p>Contabilidad y Tesorería</p>
    </a>

    <a href="marketing.html" class="menu-card marketing">
        <i class="fas fa-bullhorn"></i>
        <h3>Marketing</h3>
        <p>Publicidad y Estrategia</p>
    </a>

    <a href="logistica.html" class="menu-card logistica">
        <i class="fas fa-truck"></i>
        <h3>Logística</h3>
        <p>Almacén y Distribución</p>
    </a>

    <a href="gestion_continua.html" class="menu-card gestion">
        <i class="fas fa-chart-line"></i>
        <h3>Mejora Continua</h3>
        <p>Procesos y Calidad</p>
    </a>
</div>

<a href="index.html" class="btn-back">
    <i class="fas fa-arrow-left"></i> Volver al Registro Principal
</a>

<script>
    function createBubbles() {
        const container = document.getElementById('bubbleContainer');
        for (let i = 0; i < 15; i++) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = Math.random() * 100 + 50 + 'px';
            bubble.style.width = size;
            bubble.style.height = size;
            bubble.style.left = Math.random() * 100 + '%';
            bubble.style.animationDelay = Math.random() * 8 + 's';
            bubble.style.animationDuration = Math.random() * 10 + 10 + 's';
            container.appendChild(bubble);
        }
    }
    window.onload = createBubbles;
</script>

</body>
</html>
