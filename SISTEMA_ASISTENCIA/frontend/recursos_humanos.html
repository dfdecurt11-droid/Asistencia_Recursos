<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARGRAMETAL | Área Recursos Humanos</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/912/912318.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #f472b6; /* Rose Quartz para RRHH */
            --bg-dark: #020617;
            --surface: #0f172a;
            --surface-alt: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.06);
            --success: #10b981;
            --error: #ef4444;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 100% 100%, rgba(244, 114, 182, 0.05) 0px, transparent 50%),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: clamp(20px, 5vh, 50px) 20px;
        }

        .app-container { 
            width: 100%;
            max-width: 1000px;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* --- NAVEGACIÓN --- */
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .btn-return {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }
        .btn-return:hover { color: white; transform: translateX(-5px); }

        .clock-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            background: rgba(244, 114, 182, 0.05);
            padding: 8px 18px;
            border-radius: 10px;
            border: 1px solid rgba(244, 114, 182, 0.15);
        }

        /* --- TÍTULOS --- */
        .header-main { margin-bottom: 35px; }
        .header-main span { 
            font-size: 0.75rem; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-weight: 800; 
        }
        .header-main h1 { 
            font-size: clamp(1.8rem, 5vw, 2.5rem); 
            font-weight: 800; 
            letter-spacing: -1.5px; 
            margin-top: 5px;
        }

        /* --- LISTADO --- */
        .staff-list {
            display: grid;
            gap: 12px;
            max-height: 58vh;
            overflow-y: auto;
            padding-right: 10px;
        }

        .staff-list::-webkit-scrollbar { width: 4px; }
        .staff-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .staff-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .staff-card:hover {
            border-color: rgba(244, 114, 182, 0.3);
            background: var(--surface-alt);
            transform: scale(1.005);
        }

        .staff-info strong { 
            font-size: 1.15rem; 
            display: block; 
            margin-bottom: 4px; 
            color: #fff; 
            letter-spacing: -0.3px;
        }

        .staff-tag { 
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem; 
            color: var(--text-dim); 
            background: rgba(255,255,255,0.03);
            padding: 3px 8px;
            border-radius: 5px;
            border: 1px solid var(--border);
        }

        /* --- BOTONES --- */
        .btn-group { display: flex; gap: 10px; }

        .btn-action {
            height: 44px;
            min-width: 130px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            background: transparent;
            color: white;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-action:hover:not(:disabled) {
            background: white;
            color: var(--bg-dark);
        }

        .btn-action:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        /* --- TOAST NOTIFICATION --- */
        #notification-toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 16px 28px; border-radius: 12px;
            background: white; color: var(--bg-dark);
            display: none; z-index: 1000;
            font-size: 0.8rem; font-weight: 800;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

        @media (max-width: 750px) {
            .staff-card { flex-direction: column; text-align: center; gap: 20px; padding: 25px; }
            .btn-group { width: 100%; }
            .btn-action { flex: 1; }
            .nav-header { flex-direction: column-reverse; gap: 15px; }
        }
    </style>
</head>
<body>

    <div id="notification-toast"></div>

    <div class="app-container">
        <nav class="nav-header">
            <a href="lista.html" class="btn-return"><i class="fas fa-arrow-left"></i> Áreas del Sistema</a>
            <div id="reloj" class="clock-display">00:00:00</div>
        </nav>

        <header class="header-main">
            <span>ARGRAMETAL S.A.</span>
            <h1>AREA <span style="color: var(--accent);">Recursos Humanos</span></h1>
        </header>

        <main id="lista-asistencia" class="staff-list">
            <div style="text-align:center; padding: 80px; opacity: 0.4;">
                <i class="fas fa-circle-notch fa-spin" style="font-size: 1.5rem; color: var(--accent);"></i>
                <p style="margin-top: 15px; font-weight: 700; font-size: 0.75rem; letter-spacing: 3px;">SINCRONIZANDO DATA...</p>
            </div>
        </main>
    </div>

    <script>
        // CONFIGURACIÓN DE ENDPOINTS
        const URL_GET = "https://asistencia-recursos.onrender.com/api/practicantes";
        const URL_POST = "https://asistencia-recursos.onrender.com/api/asistencia";
        const AREA_OBJETIVO = "Recursos Humanos";

        // Reloj en tiempo real
        function initClock() {
            const clockEl = document.getElementById('reloj');
            setInterval(() => {
                clockEl.textContent = new Date().toLocaleTimeString('es-PE', { 
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false 
                });
            }, 1000);
        }

        // Sistema de notificaciones centralizado
        function showNotify(text, isError = false) {
            const toast = document.getElementById('notification-toast');
            toast.style.display = 'block';
            toast.style.background = isError ? '#ef4444' : '#ffffff';
            toast.style.color = isError ? '#ffffff' : '#020617';
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> &nbsp; ${text}`;
            setTimeout(() => toast.style.display = 'none', 3500);
        }

        // Función Principal: Cargar y Filtrar Personal
        async function fetchStaff() {
            const container = document.getElementById('lista-asistencia');
            try {
                const response = await fetch(URL_GET);
                const allData = await response.json();
                
                // Aplicamos la lógica de filtrado por área
                const filteredStaff = allData.filter(p => p.area.trim() === AREA_OBJETIVO);

                if (filteredStaff.length === 0) {
                    container.innerHTML = `<p style="text-align:center; padding: 40px; color:var(--text-dim);">No hay colaboradores registrados en RRHH.</p>`;
                    return;
                }

                // Renderizado dinámico ordenado por apellidos
                container.innerHTML = filteredStaff.sort((a,b) => a.apellidos.localeCompare(b.apellidos)).map(p => `
                    <div class="staff-card">
                        <div class="staff-info">
                            <strong>${p.apellidos.toUpperCase()}, ${p.nombres}</strong>
                            <span class="staff-tag">ID: ${String(p.id_practicantes).padStart(4, '0')} • STAFF</span>
                        </div>
                        <div class="btn-group">
                            <button class="btn-action" onclick="sendRegistry(${p.id_practicantes}, 'entrada', this)">
                                Entrada
                            </button>
                            <button class="btn-action" onclick="sendRegistry(${p.id_practicantes}, 'salida', this)">
                                Salida
                            </button>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                showNotify("Error crítico de conexión", true);
                container.innerHTML = `<p style="text-align:center; color:#ef4444; font-weight:800;">ERROR: SERVIDOR NO DISPONIBLE</p>`;
            }
        }

        // Función de Marcación (POST)
        async function sendRegistry(id, tipo, button) {
            const parent = button.closest('.btn-group');
            const allBtns = parent.querySelectorAll('button');
            const originalText = button.innerText;

            // Bloqueo de UI para evitar doble envío
            allBtns.forEach(b => b.disabled = true);
            button.innerHTML = `<i class="fas fa-spinner fa-spin"></i>`;

            try {
                const res = await fetch(`${URL_POST}/${id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tipo_registro: tipo })
                });

                if (res.ok) {
                    showNotify(`REGISTRO DE ${tipo.toUpperCase()} EXITOSO`);
                } else {
                    const errorMsg = await res.json();
                    showNotify(errorMsg.message || "Acción rechazada", true);
                }
            } catch (e) {
                showNotify("Fallo de red", true);
            } finally {
                // Restauración de botones
                setTimeout(() => {
                    allBtns.forEach(b => b.disabled = false);
                    button.innerText = originalText;
                }, 500);
            }
        }

        // Ejecución al cargar
        window.onload = () => {
            initClock();
            fetchStaff();
        };
    </script>
</body>
</html>
