<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RRHH | Recursos Humanos</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #f472b6; 
            --primary-soft: rgba(244, 114, 182, 0.1);
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --success: #10b981;
            --border: rgba(255, 255, 255, 0.08);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background: radial-gradient(circle at bottom left, #2d1b2e, #0f172a 70%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: clamp(1rem, 5vw, 2.5rem);
        }

        .container { 
            width: 100%;
            max-width: 850px;
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .btn-back {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 14px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-back:hover { color: white; background: rgba(255,255,255,0.08); border-color: var(--primary); }

        #reloj {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            color: var(--primary);
            font-size: 1.15rem;
            background: var(--primary-soft);
            padding: 8px 18px;
            border-radius: 12px;
            border: 1px solid rgba(244, 114, 182, 0.2);
            box-shadow: 0 0 20px rgba(244, 114, 182, 0.1);
        }

        .main-header { margin-bottom: 35px; }
        .main-header p { font-size: 0.7rem; color: var(--primary); text-transform: uppercase; letter-spacing: 3px; font-weight: 800; margin-bottom: 8px; }
        .main-header h1 { font-size: clamp(1.8rem, 5vw, 2.5rem); font-weight: 800; letter-spacing: -1px; }

        .list-wrapper {
            display: grid;
            gap: 14px;
            max-height: 55vh;
            overflow-y: auto;
            padding-right: 10px;
        }

        .list-wrapper::-webkit-scrollbar { width: 4px; }
        .list-wrapper::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .user-card {
            background: var(--card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 22px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .user-card:hover { border-color: var(--primary); background: rgba(244, 114, 182, 0.03); transform: scale(1.01); }

        .user-info strong { font-size: 1.1rem; display: block; margin-bottom: 5px; color: #fff; }
        .user-info span { font-size: 0.8rem; color: var(--text-dim); display: flex; align-items: center; gap: 8px; font-weight: 600; }
        .user-info i { color: var(--primary); font-size: 0.9rem; }

        .btn-actions { display: flex; gap: 12px; }

        .btn {
            border: none;
            cursor: pointer;
            padding: 12px 22px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            letter-spacing: 0.5px;
        }

        .btn-in { background-color: var(--success); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2); }
        .btn-out { background-color: #334155; box-shadow: 0 4px 15px rgba(51, 65, 85, 0.2); }
        .btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        #toast {
            position: fixed; bottom: 30px; right: 30px;
            padding: 18px 30px; border-radius: 20px;
            background: #1e293b; color: white;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            display: none; z-index: 1000;
            font-size: 0.9rem; font-weight: 700;
            animation: toastIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes toastIn { from { transform: translateY(100px) scale(0.8); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

        @media (max-width: 650px) {
            .user-card { flex-direction: column; text-align: center; gap: 20px; padding: 25px; }
            .btn-actions { width: 100%; }
            .btn { flex: 1; justify-content: center; }
            .top-bar { flex-direction: column-reverse; gap: 15px; }
        }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div class="container">
        <header class="top-bar">
            <a href="lista.html" class="btn-back"><i class="fas fa-arrow-left"></i>Volver</a>
            <div id="reloj">--:--:-- --</div>
        </header>

        <section class="main-header">
            <p>People & Culture</p>
            <h1>Gestión de <span style="color: var(--primary);">RRHH</span></h1>
        </section>

        <div id="lista-asistencia" class="list-wrapper">
            <div style="text-align:center; padding: 60px; color: var(--text-dim);">
                <i class="fas fa-heart fa-beat" style="font-size: 2rem; color: var(--primary); margin-bottom: 15px;"></i>
                <p style="letter-spacing: 1px; font-weight: 600;">SINCRONIZANDO TALENTO...</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://asistencia-recursos.onrender.com/api";
        const AREA = "Recursos Humanos";

        function updateClock() {
            const el = document.getElementById('reloj');
            setInterval(() => {
                el.textContent = new Date().toLocaleTimeString('es-PE', { 
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true 
                }).toUpperCase();
            }, 1000);
        }

        function notify(msg, err = false) {
            const t = document.getElementById('toast');
            t.style.display = 'block';
            t.style.borderLeft = `6px solid ${err ? '#ef4444' : '#f472b6'}`;
            t.innerHTML = `<i class="fas ${err ? 'fa-times-circle' : 'fa-check-circle'}" style="margin-right:10px; color:${err ? '#ef4444' : '#f472b6'}"></i> ${msg}`;
            setTimeout(() => t.style.display = 'none', 3000);
        }

        async function cargarDatos() {
            const container = document.getElementById('lista-asistencia');
            try {
                const res = await fetch(`${API_URL}/practicantes?area=${encodeURIComponent(AREA)}`);
                const data = await res.json();

                if (!data.length) {
                    container.innerHTML = `<div style="text-align:center; padding: 40px; opacity:0.5;">
                        <i class="fas fa-users-slash fa-2x"></i>
                        <p style="margin-top:10px;">No hay personal asignado a RRHH.</p>
                    </div>`;
                    return;
                }

                data.sort((a,b) => a.apellidos.localeCompare(b.apellidos));

                container.innerHTML = data.map(p => `
                    <div class="user-card">
                        <div class="user-info">
                            <strong>${p.apellidos.toUpperCase()}, ${p.nombres}</strong>
                            <span><i class="fas fa-fingerprint"></i> STAFF ID: ${p.id_practicantes}</span>
                        </div>
                        <div class="btn-actions">
                            <button class="btn btn-in" onclick="marcar(${p.id_practicantes}, 'entrada', this)">
                                <i class="fas fa-clock"></i> Entrada
                            </button>
                            <button class="btn btn-out" onclick="marcar(${p.id_practicantes}, 'salida', this)">
                                <i class="fas fa-door-open"></i> Salida
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                notify("Fallo al conectar con el servidor", true);
                container.innerHTML = `<p style="text-align:center; color:#ef4444; font-weight:700;">ERROR DE CONEXIÓN</p>`;
            }
        }

        async function marcar(id, tipo, btn) {
            const btns = btn.closest('.btn-actions').querySelectorAll('button');
            const originalHTML = btn.innerHTML;
            
            btns.forEach(b => b.disabled = true);
            btn.innerHTML = `<i class="fas fa-sync fa-spin"></i>`;

            try {
                const res = await fetch(`${API_URL}/asistencia/${id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tipo_registro: tipo })
                });
                
                if (res.ok) notify(`¡Marcación de ${tipo} registrada!`);
                else notify("El servidor rechazó el registro", true);
            } catch (e) {
                notify("Error de red crítico", true);
            } finally {
                setTimeout(() => {
                    btns.forEach(b => b.disabled = false);
                    btn.innerHTML = originalHTML;
                }, 500);
            }
        }

        window.onload = () => { updateClock(); cargarDatos(); };
    </script>
</body>
</html>
