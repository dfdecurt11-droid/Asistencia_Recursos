<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursos Humanos - Control de Asistencia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            /* Color exacto de Recursos Humanos extraído de la imagen */
            --primary: #ff00ff; 
            --primary-glow: rgba(255, 0, 255, 0.4);
            /* Fondo dinámico basado en el color del reloj/tarjeta */
            --bg-gradient: linear-gradient(-45deg, #030a11, #2d004d, #1a0033, #030a11);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Orbes de luz decorativos fucsias */
        .glow-orb {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 0, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            animation: float 10s infinite alternate ease-in-out;
        }

        @keyframes float {
            from { transform: translate(-10%, -10%) scale(1); }
            to { transform: translate(10%, 10%) scale(1.1); }
        }

        /* Contenedor Glassmorphism */
        .container { 
            position: relative;
            z-index: 10;
            max-width: 820px; 
            width: 92%;
            background: rgba(10, 2, 15, 0.4); 
            padding: 45px; 
            border-radius: 35px; 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 0, 255, 0.2);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.8);
        }

        .area-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 0, 255, 0.1);
        }

        .area-title p {
            color: #d1d5db;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .area-title h2 {
            font-size: 2.2rem;
            font-weight: 800;
            color: white;
            /* Aplicamos el color fucsia al nombre del área */
            text-shadow: 0 0 20px var(--primary-glow);
        }

        .area-name-highlight {
            color: var(--primary);
        }

        #reloj {
            font-weight: 800;
            color: var(--primary);
            font-size: 1.6rem;
            background: rgba(255, 0, 255, 0.08);
            padding: 12px 24px;
            border-radius: 18px;
            border: 1px solid rgba(255, 0, 255, 0.3);
            text-shadow: 0 0 15px var(--primary-glow);
            letter-spacing: 1px;
            box-shadow: inset 0 0 15px rgba(255, 0, 255, 0.1);
        }

        .btn-back {
            text-decoration: none;
            color: #94a3b8;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            transition: 0.3s;
            font-size: 0.9rem;
        }
        .btn-back:hover { color: var(--primary); transform: translateX(-5px); }

        #lista-asistencia { display: grid; gap: 14px; }

        .item-practicante { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 25px; 
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease; 
        }

        .item-practicante:hover { 
            background: rgba(255, 0, 255, 0.05);
            border-color: var(--primary);
            transform: translateX(5px);
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.15);
        }

        .info-user strong { font-size: 1.1rem; color: #ffffff; display: block; margin-bottom: 4px; }
        .info-user small { color: #94a3b8; font-weight: 600; font-size: 0.85rem; letter-spacing: 0.5px; }

        .btn-group { display: flex; gap: 12px; }

        .btn-asistencia { 
            padding: 12px 22px; 
            border-radius: 14px; 
            border: none; 
            cursor: pointer; 
            font-weight: 800; 
            color: white; 
            transition: 0.3s; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-entrada { 
            background: var(--primary); 
            box-shadow: 0 4px 15px var(--primary-glow); 
        }
        
        .btn-salida { 
            background: #1e293b; 
            border: 1px solid rgba(255, 255, 255, 0.1);
        } 

        .btn-asistencia:hover:not(:disabled) { 
            transform: translateY(-2px); 
            filter: brightness(1.1); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        #toast-alert {
            position: fixed; top: 25px; right: 25px; padding: 18px 30px;
            border-radius: 16px; color: white; display: none; z-index: 1000;
            font-weight: 800; animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border-left: 5px solid white;
        }

        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <div class="glow-orb" style="top: -100px; right: -100px;"></div>
    <div class="glow-orb" style="bottom: -100px; left: -100px; animation-delay: -5s;"></div>

    <div id="toast-alert"></div>

    <div class="container">
        <a href="lista.html" class="btn-back"><i class="fas fa-chevron-left"></i> Panel de Áreas</a>
        
        <div class="area-header">
            <div class="area-title">
                <p>Gestión de Personal</p>
                <h2>Área <span class="area-name-highlight">Recursos Humanos</span></h2>
            </div>
            <div id="reloj">00:00:00 p. m.</div>
        </div>

        <div id="lista-asistencia">
            <div style="text-align:center; padding: 40px; opacity: 0.6;">
                <i class="fas fa-users-gear fa-spin" style="font-size: 2.5rem; color: var(--primary);"></i>
                <p style="margin-top: 15px; font-weight: 600;">Sincronizando equipo...</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://asistencia-recursos.onrender.com/api/practicantes";
        const ASISTENCIA_URL = "https://asistencia-recursos.onrender.com/api/asistencia";
        const AREA_PAGINA = "Recursos Humanos"; 

        setInterval(() => {
            document.getElementById('reloj').innerText = new Date().toLocaleTimeString('es-PE', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit', 
                hour12: true 
            });
        }, 1000);

        function showToast(msg, isError = false) {
            const el = document.getElementById('toast-alert');
            el.innerText = msg;
            el.style.backgroundColor = isError ? "#e11d48" : "#86198f";
            el.style.display = "block";
            setTimeout(() => { el.style.display = "none"; }, 3500);
        }

        async function cargarLista() {
            try {
                const res = await fetch(`${API_URL}?area=${encodeURIComponent(AREA_PAGINA)}`);
                let data = await res.json();
                const listaDiv = document.getElementById('lista-asistencia');
                
                if(data.length === 0) {
                    listaDiv.innerHTML = `<p style="text-align:center; padding: 30px; opacity:0.5;">No hay colaboradores registrados en Recursos Humanos.</p>`;
                    return;
                }

                data.sort((a, b) => (a.apellidos || "").localeCompare(b.apellidos || ""));

                listaDiv.innerHTML = data.map(p => `
                    <div class="item-practicante">
                        <div class="info-user">
                            <strong>${p.apellidos.toUpperCase()}, ${p.nombres}</strong>
                            <small>ID: ${p.id_practicantes} • GESTIÓN DE TALENTO</small>
                        </div>
                        <div class="btn-group">
                            <button class="btn-asistencia btn-entrada" onclick="marcar(${p.id_practicantes}, 'entrada')">
                                <i class="fas fa-sign-in-alt"></i> Entrada
                            </button>
                            <button class="btn-asistencia btn-salida" onclick="marcar(${p.id_practicantes}, 'salida')">
                                <i class="fas fa-sign-out-alt"></i> Salida
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        async function marcar(id, tipo) {
            try {
                const res = await fetch(`${ASISTENCIA_URL}/${id}`, { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tipo_registro: tipo })
                });
                if (res.ok) showToast(`Registro de ${tipo} exitoso para el colaborador.`);
                else showToast("Error en la validación de ID", true);
            } catch (e) { showToast("Error de comunicación con el servidor", true); }
        }

        window.onload = cargarLista;
    </script>
</body>
</html>
