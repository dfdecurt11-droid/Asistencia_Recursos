<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRHH - Control de Asistencia (Recursos Humanos)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #0984e3; 
            --secondary: #00cec9; 
            --success: #27ae60;
            --danger: #d63031;
            --dark: #2d3436; 
            /* Gradiente Profesional para RRHH */
            --bg-gradient: linear-gradient(-45deg, #0984e3, #6c5ce7, #00cec9, #81ecec);
        }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { 
            max-width: 850px; 
            width: 100%;
            background: rgba(255, 255, 255, 0.92); 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.2); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .header-flex { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid rgba(9, 132, 227, 0.1); 
            padding-bottom: 15px; 
            margin-bottom: 25px; 
        }

        .header-flex h2 { margin: 0; font-size: 1.8rem; color: var(--dark); }

        #reloj-lista { 
            font-weight: 800; 
            color: var(--primary); 
            font-size: 1.4rem; 
            background: #fff; 
            padding: 8px 22px; 
            border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(9, 132, 227, 0.1);
            border: 1px solid #e1f5fe;
        }

        #lista-asistencia { display: grid; gap: 15px; }

        .item-practicante { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px; 
            background: #fff;
            border-radius: 20px;
            border: 1px solid #f1f1f1;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
        }

        .item-practicante:hover { 
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(9, 132, 227, 0.08);
            border-color: var(--secondary);
        }

        .info-personal strong { font-size: 1.15rem; color: var(--dark); display: block; }
        .status-badge { 
            font-size: 0.75rem; 
            padding: 4px 12px; 
            border-radius: 20px; 
            background: #e1f5fe; 
            color: var(--primary); 
            font-weight: 700;
            margin-top: 5px; 
            display: inline-block;
        }

        .btn-group { display: flex; gap: 12px; }

        .btn-asistencia { 
            padding: 12px 22px; 
            border-radius: 14px; 
            border: none; 
            cursor: pointer; 
            font-weight: 700; 
            color: white; 
            transition: 0.3s; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-family: 'Poppins'; 
            font-size: 0.85rem;
        }

        .btn-entrada { 
            background: var(--success); 
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.2);
        }
        
        .btn-salida { 
            background: var(--primary); 
            box-shadow: 0 4px 12px rgba(9, 132, 227, 0.2);
        }

        .btn-asistencia:hover { 
            transform: scale(1.05); 
            filter: brightness(1.1); 
        }

        .btn-back { 
            text-decoration: none; 
            color: var(--primary); 
            font-weight: 600; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px;
            margin-bottom: 20px; 
            background: rgba(255, 255, 255, 0.7);
            padding: 8px 18px;
            border-radius: 12px;
            transition: 0.3s;
        }
        
        .btn-back:hover { background: #fff; transform: translateX(-5px); }

        #mensaje-alert {
            position: fixed; top: 20px; right: 20px; padding: 18px 30px;
            border-radius: 15px; color: white; display: none; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); font-weight: 700;
            animation: fadeInRight 0.5s ease;
        }

        @keyframes fadeInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .loader-rrhh { color: var(--primary); font-size: 2.5rem; }
    </style>
</head>
<body>

    <div id="mensaje-alert"></div>

    <div class="container">
        <a href="lista.html" class="btn-back"><i class="fas fa-users-gear"></i> Gestión de Áreas</a>
        
        <div class="header-flex">
            <div>
                <p style="margin:0; color: #636e72; font-weight: 600; font-size: 0.85rem;">Gestión de Talento Humano</p>
                <h2>Área: <span style="color: var(--primary);">Recursos Humanos</span></h2>
            </div>
            <div id="reloj-lista">00:00:00</div>
        </div>

        <div id="lista-asistencia">
            <div style="text-align:center; padding: 40px;">
                <i class="fas fa-id-card-clip fa-spin loader-rrhh"></i>
                <p style="margin-top:15px; color:#636e72; font-weight: 600;">Conectando con la base de datos de RRHH...</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://asistencia-recursos.onrender.com/api/practicantes";
        const ASISTENCIA_URL = "https://asistencia-recursos.onrender.com/api/asistencia";
        const AREA_PAGINA = "Recursos Humanos"; 

        setInterval(() => {
            document.getElementById('reloj-lista').innerText = new Date().toLocaleTimeString('es-PE', { hour12: true });
        }, 1000);

        function showAlert(msg, isError = false) {
            const el = document.getElementById('mensaje-alert');
            el.innerHTML = `<i class="fas ${isError ? 'fa-user-slash' : 'fa-user-check'}"></i> ${msg}`;
            el.style.backgroundColor = isError ? "var(--danger)" : "var(--success)";
            el.style.display = "block";
            setTimeout(() => { el.style.display = "none"; }, 4000);
        }

        async function cargarLista() {
            try {
                const res = await fetch(`${API_URL}?area=${encodeURIComponent(AREA_PAGINA)}`);
                let data = await res.json();
                const listaDiv = document.getElementById('lista-asistencia');
                
                if (!data || data.length === 0) {
                    listaDiv.innerHTML = `
                        <div style="text-align:center; padding:50px; opacity:0.6;">
                            <i class="fas fa-user-group" style="font-size:3.5rem; color:#b2bec3;"></i>
                            <p>No se encontraron colaboradores en el área de RRHH.</p>
                        </div>`;
                    return;
                }

                data.sort((a, b) => a.apellidos.localeCompare(b.apellidos, 'es', { sensitivity: 'base' }));

                listaDiv.innerHTML = data.map(p => `
                    <div class="item-practicante">
                        <div class="info-personal">
                            <strong>${p.apellidos.toUpperCase()}, ${p.nombres}</strong>
                            <span class="status-badge"><i class="fas fa-id-badge"></i> RRHH-ID: ${p.id_practicantes}</span>
                        </div>
                        <div class="btn-group">
                            <button class="btn-asistencia btn-entrada" onclick="marcar(${p.id_practicantes}, 'entrada')">
                                <i class="fas fa-user-plus"></i> Entrada
                            </button>
                            <button class="btn-asistencia btn-salida" onclick="marcar(${p.id_practicantes}, 'salida')">
                                <i class="fas fa-user-minus"></i> Salida
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('lista-asistencia').innerHTML = `<p style="text-align:center; color: var(--danger);">Error de conexión con el servidor central.</p>`;
            }
        }

        async function marcar(id, tipo) {
            try {
                const horaLocal = new Date().toLocaleTimeString('es-PE', { hour12: true });
                const res = await fetch(`${ASISTENCIA_URL}/${id}`, { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tipo_registro: tipo })
                });
                const result = await res.json();
                if (res.ok) {
                    const emoji = tipo === 'entrada' ? '🤝' : '👋';
                    showAlert(`${emoji} Marcación de ${tipo} validada para RRHH (${horaLocal})`);
                } else {
                    showAlert(result.message || "Error al validar registro", true);
                }
            } catch (e) {
                showAlert("Fallo en la comunicación con el servidor", true);
            }
        }
        window.onload = cargarLista;
    </script>
</body>
</html>
