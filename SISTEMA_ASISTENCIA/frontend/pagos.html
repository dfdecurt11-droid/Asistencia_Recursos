<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argrametal | Gestión de Pagos Pro</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #1e293b; 
            --accent: #0ea5e9;  
            --bg-body: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --border-color: #cbd5e1;
            --danger: #dc2626;
            --success: #059669;
            --pdf-red: #e11d48;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); padding: 2rem; color: var(--text-main); }

        .container { 
            max-width: 1250px; margin: auto; background: var(--surface); 
            border-radius: 12px; padding: 2.5rem; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
        }

        .header { 
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 2px solid var(--bg-body); 
        }
        
        .brand h2 { font-weight: 800; letter-spacing: -0.025em; font-size: 1.5rem; color: var(--primary); }
        .brand h2 span { color: var(--accent); }
        .nav-back { text-decoration: none; color: var(--text-muted); font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 8px; margin-bottom: 10px; transition: 0.2s; }
        .nav-back:hover { color: var(--accent); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2.5rem; }
        .stat-card { background: var(--surface); padding: 1.5rem; border-radius: 8px; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 1.25rem; }
        .stat-icon { width: 48px; height: 48px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: #f0f9ff; color: var(--accent); font-size: 1.2rem; }

        .form-container {
            background: #f1f5f9; padding: 2rem; border-radius: 8px; margin-bottom: 2.5rem;
            display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 1.25rem; align-items: end;
        }

        .field label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--primary); text-transform: uppercase; margin-bottom: 8px; }
        .field select, .field input { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.9rem; }

        .btn-add { background: var(--primary); color: white; border: none; padding: 0 24px; border-radius: 6px; font-weight: 700; cursor: pointer; height: 45px; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .btn-add:hover { background: #000; transform: translateY(-1px); }

        .btn-report-all { background: var(--pdf-red); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 15px; font-size: 0.85rem; }

        .table-container { border-radius: 8px; border: 1px solid var(--border-color); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--primary); color: white; padding: 14px 20px; text-align: left; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; }
        td { padding: 16px 20px; border-bottom: 1px solid var(--bg-body); font-size: 0.9rem; }

        .btn-action { border: none; background: none; cursor: pointer; padding: 5px; font-size: 1.1rem; transition: 0.2s; }
        .btn-pdf { color: var(--pdf-red); }
        .btn-delete { color: #94a3b8; }
        .btn-delete:hover { color: var(--danger); }
        
        .badge-area { background: #e2e8f0; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); }
        .mono { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <div class="brand">
            <a href="index.html" class="nav-back"><i class="fas fa-arrow-left"></i> Panel Principal</a>
            <h2>ARGRAMETAL <span>PAGOS</span></h2>
        </div>
        <div style="text-align: right;">
            <p id="dateNow" style="font-size: 0.9rem; font-weight: 600; color: var(--primary);"></p>
            <button class="btn-report-all" onclick="generateGeneralReport()">
                <i class="fas fa-file-pdf"></i> REPORTE CONSOLIDADO
            </button>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-wallet"></i></div>
            <div>
                <p style="font-size: 0.65rem; color: var(--text-muted); font-weight: 800;">TOTAL A PAGAR</p>
                <h4 id="grandTotal" class="mono">S/ 0.00</h4>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-box"></i></div>
            <div>
                <p style="font-size: 0.65rem; color: var(--text-muted); font-weight: 800;">TOTAL ENTREGABLES</p>
                <h4 id="totalDeliveries" class="mono">0</h4>
            </div>
        </div>
    </div>

    <section class="form-container">
        <div class="field">
            <label>Practicante</label>
            <select id="pSelect">
                <option value="">Cargando practicantes...</option>
            </select>
        </div>
        <div class="field">
            <label>Cant. Entregables</label>
            <input type="number" id="pCant" value="1" min="1">
        </div>
        <div class="field">
            <label>Pago x Unidad (S/)</label>
            <input type="number" id="pMonto" value="50" min="0">
        </div>
        <button class="btn-add" onclick="addPayment()">
            <i class="fas fa-plus-circle"></i> REGISTRAR
        </button>
    </section>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Practicante</th>
                    <th>Área</th>
                    <th>Entregables</th>
                    <th>Subtotal Bruto</th>
                    <th style="text-align: center;">Acciones</th>
                </tr>
            </thead>
            <tbody id="payTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let dbPracticantes = [];
    let payments = {}; // { "Nombre": { area, total, entregables, logs: [] } }
    const API_URL = "https://asistencia-recursos.onrender.com/api/practicantes";

    document.getElementById('dateNow').innerText = new Intl.DateTimeFormat('es-PE', { dateStyle: 'long' }).format(new Date());

    async function init() {
        try {
            const res = await fetch(API_URL);
            dbPracticantes = await res.json();
            const select = document.getElementById('pSelect');
            select.innerHTML = '<option value="">-- Seleccionar --</option>';
            dbPracticantes.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.id || `${p.nombres} ${p.apellidos}`;
                opt.textContent = `${p.nombres} ${p.apellidos}`.toUpperCase();
                opt.dataset.area = p.area;
                select.appendChild(opt);
            });
        } catch (e) {
            console.error("Error cargando datos:", e);
        }
    }

    function addPayment() {
        const select = document.getElementById('pSelect');
        const nombre = select.options[select.selectedIndex].text;
        const area = select.options[select.selectedIndex].dataset.area;
        const cant = parseInt(document.getElementById('pCant').value);
        const monto = parseFloat(document.getElementById('pMonto').value);
        const fecha = new Date().toLocaleDateString('es-PE');

        if(select.value === "") return Swal.fire('Atención', 'Seleccione un practicante', 'warning');

        if (!payments[nombre]) {
            payments[nombre] = { area, total: 0, entregables: 0, logs: [] };
        }

        payments[nombre].logs.push({ fecha, cant, monto, subtotal: (cant * monto) });
        payments[nombre].total += (cant * monto);
        payments[nombre].entregables += cant;

        renderTable();
        Swal.fire({ icon: 'success', title: 'Registro exitoso', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500 });
    }

    function renderTable() {
        const body = document.getElementById('payTableBody');
        let html = "";
        let gTotal = 0, gCant = 0;

        Object.keys(payments).forEach(nom => {
            const p = payments[nom];
            gTotal += p.total;
            gCant += p.entregables;
            html += `
                <tr>
                    <td><strong>${nom}</strong></td>
                    <td><span class="badge-area">${p.area}</span></td>
                    <td class="mono">${p.entregables}</td>
                    <td class="mono" style="color:var(--success)">S/ ${p.total.toFixed(2)}</td>
                    <td style="text-align:center;">
                        <button class="btn-action btn-pdf" onclick="generateIndividualReport('${nom}')" title="Generar Boleta Detallada">
                            <i class="fas fa-file-invoice-dollar"></i>
                        </button>
                        <button class="btn-action btn-delete" onclick="deleteEntry('${nom}')">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                </tr>`;
        });

        body.innerHTML = html || '<tr><td colspan="5" style="text-align:center; padding:3rem; color:#94a3b8">Esperando registros de pago...</td></tr>';
        document.getElementById('grandTotal').innerText = `S/ ${gTotal.toFixed(2)}`;
        document.getElementById('totalDeliveries').innerText = gCant;
    }

    function deleteEntry(nom) {
        delete payments[nom];
        renderTable();
    }

    // --- MOTOR DE REPORTES PDF ---

    function generateGeneralReport() {
        if(Object.keys(payments).length === 0) return Swal.fire('Error', 'No hay datos en la sesión', 'error');
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const now = new Date().toLocaleString('es-PE');
        
        doc.setFontSize(18); doc.setTextColor(30, 41, 59);
        doc.text("ARGRAMETAL S.A.C.", 14, 22);
        doc.setFontSize(10); doc.setTextColor(100);
        doc.text("REPORTE RESUMEN DE PAGOS ACUMULADOS", 14, 28);
        doc.setFontSize(9);
        doc.text(`Generado el: ${now}`, 14, 34);

        const tableData = Object.keys(payments).map(nom => [
            nom, payments[nom].area, payments[nom].entregables, `S/ ${payments[nom].total.toFixed(2)}`
        ]);

        doc.autoTable({
            startY: 40,
            head: [['Practicante', 'Área', 'Total Entregables', 'Monto Acumulado']],
            body: tableData,
            theme: 'grid',
            headStyles: { fillColor: [30, 41, 59] }
        });

        doc.save(`Argrametal_Resumen_${Date.now()}.pdf`);
    }

    function generateIndividualReport(nom) {
        const p = payments[nom];
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const now = new Date().toLocaleString('es-PE');

        // Encabezado
        doc.setFillColor(30, 41, 59);
        doc.rect(0, 0, 210, 45, 'F');
        
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(22);
        doc.text("ARGRAMETAL", 14, 20);
        doc.setFontSize(11);
        doc.text("BOLETA DE PAGO DETALLADA POR ENTREGABLE", 14, 30);

        // Datos del receptor y tiempo
        doc.setTextColor(30, 41, 59);
        doc.setFontSize(11);
        doc.text(`PRACTICANTE: ${nom}`, 14, 60);
        doc.text(`DEPARTAMENTO: ${p.area}`, 14, 67);
        doc.setFontSize(10);
        doc.setTextColor(120);
        doc.text(`FECHA/HORA DE EMISIÓN: ${now}`, 14, 74);

        // Tabla de historial detallado
        const logData = p.logs.map(l => [l.fecha, l.cant, `S/ ${l.monto.toFixed(2)}`, `S/ ${l.subtotal.toFixed(2)}`]);

        doc.autoTable({
            startY: 85,
            head: [['Fecha de Entrega', 'Cantidad', 'Costo Unitario', 'Subtotal']],
            body: logData,
            theme: 'striped',
            headStyles: { fillColor: [14, 165, 233] },
            styles: { fontSize: 10 }
        });

        const finalY = doc.lastAutoTable.finalY + 15;
        
        // Resumen
        doc.setDrawColor(200);
        doc.line(120, finalY, 195, finalY);
        doc.setFontSize(13);
        doc.setTextColor(30, 41, 59);
        doc.text(`TOTAL A PAGAR:`, 120, finalY + 10);
        doc.setTextColor(5, 150, 105);
        doc.text(`S/ ${p.total.toFixed(2)}`, 165, finalY + 10);

        doc.setTextColor(150);
        doc.setFontSize(8);
        doc.text(`Este documento certifica los pagos registrados hasta el ${now}.`, 14, 285);

        doc.save(`Boleta_Pago_${nom.replace(" ","_")}.pdf`);
    }

    init();
</script>
</body>
</html>
