<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argrametal | Gestión de Pagos Pro</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #1e293b; 
            --accent: #0ea5e9;  
            --bg-body: #f1f5f9;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
            --pdf-red: #e11d48;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main);
            line-height: 1.5;
            padding: 1rem;
        }

        @media (min-width: 768px) {
            body { padding: 2rem; }
        }

        .container { 
            max-width: 1200px; 
            margin: auto; 
            background: var(--surface); 
            border-radius: 16px; 
            padding: 1.5rem; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        @media (min-width: 768px) {
            .container { padding: 2.5rem; }
        }

        /* HEADER */
        .header { 
            display: flex; 
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2.5rem; 
            padding-bottom: 1.5rem; 
            border-bottom: 2px solid var(--bg-body); 
        }

        @media (min-width: 768px) {
            .header { flex-direction: row; justify-content: space-between; align-items: center; }
        }
        
        .brand h2 { font-weight: 800; letter-spacing: -0.025em; font-size: 1.5rem; color: var(--primary); }
        .brand h2 span { color: var(--accent); }
        .nav-back { text-decoration: none; color: var(--text-muted); font-size: 0.85rem; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 8px; transition: 0.2s; }
        .nav-back:hover { color: var(--accent); }

        .header-info { text-align: left; }
        @media (min-width: 768px) { .header-info { text-align: right; } }

        /* RELOJ Y FECHA */
        #clock { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; color: var(--accent); font-weight: 700; display: block; }
        #dateNow { font-size: 0.85rem; font-weight: 500; color: var(--text-muted); margin-bottom: 10px; }

        /* STATS */
        .stats-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin-bottom: 2rem; }
        @media (min-width: 640px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }

        .stat-card { 
            background: var(--surface); 
            padding: 1.25rem; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
            display: flex; 
            align-items: center; 
            gap: 1rem;
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-icon { width: 45px; height: 45px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: #f0f9ff; color: var(--accent); font-size: 1.1rem; }

        /* FORMULARIO */
        .form-container {
            background: #f8fafc; 
            padding: 1.5rem; 
            border-radius: 12px; 
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 1.25rem; 
            align-items: end;
        }

        @media (min-width: 1024px) {
            .form-container { grid-template-columns: 2fr 1fr 1fr auto; }
        }

        .field label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.025em; }
        .field select, .field input { 
            width: 100%; 
            padding: 10px 12px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            font-size: 0.95rem; 
            background: white;
            outline: none;
            transition: border-color 0.2s;
        }
        .field select:focus, .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1); }

        .btn-add { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; width: 100%; }
        .btn-add:hover { background: #000; }

        .btn-report-all { background: var(--pdf-red); color: white; border: none; padding: 10px 18px; border-radius: 8px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 0.8rem; transition: 0.2s; }
        .btn-report-all:hover { opacity: 0.9; transform: scale(1.02); }

        /* TABLA */
        .table-wrapper { overflow-x: auto; margin-top: 1rem; border-radius: 12px; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { background: #f8fafc; color: var(--text-muted); padding: 12px 20px; text-align: left; font-size: 0.75rem; text-transform: uppercase; font-weight: 700; border-bottom: 1px solid var(--border-color); }
        td { padding: 14px 20px; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #fcfcfd; }

        .btn-action { border: none; background: #f1f5f9; cursor: pointer; width: 32px; height: 32px; border-radius: 6px; font-size: 1rem; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; }
        .btn-pdf { color: var(--pdf-red); margin-right: 5px; }
        .btn-pdf:hover { background: #fee2e2; }
        .btn-delete { color: var(--text-muted); }
        .btn-delete:hover { background: #fee2e2; color: var(--danger); }
        
        .badge-area { background: #f1f5f9; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; color: var(--primary); border: 1px solid var(--border-color); }
        .mono { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <div class="brand">
            <a href="index.html" class="nav-back"><i class="fas fa-arrow-left"></i> VOLVER AL PANEL</a>
            <h2>ARGRAMETAL <span>PAGOS</span></h2>
        </div>
        <div class="header-info">
            <span id="clock">00:00:00 PM</span>
            <p id="dateNow"></p>
            <button class="btn-report-all" onclick="generateGeneralReport()">
                <i class="fas fa-file-pdf"></i> REPORTE GENERAL
            </button>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-wallet"></i></div>
            <div>
                <p style="font-size: 0.65rem; color: var(--text-muted); font-weight: 800; text-transform: uppercase;">Monto Total Acumulado</p>
                <h4 id="grandTotal" class="mono" style="font-size: 1.25rem; color: var(--success);">S/ 0.00</h4>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-box"></i></div>
            <div>
                <p style="font-size: 0.65rem; color: var(--text-muted); font-weight: 800; text-transform: uppercase;">Total Entregables</p>
                <h4 id="totalDeliveries" class="mono" style="font-size: 1.25rem;">0</h4>
            </div>
        </div>
    </div>

    <section class="form-container">
        <div class="field">
            <label>Seleccionar Practicante</label>
            <select id="pSelect">
                <option value="">Cargando practicantes...</option>
            </select>
        </div>
        <div class="field">
            <label>Cant. Entregables</label>
            <input type="number" id="pCant" value="1" min="1">
        </div>
        <div class="field">
            <label>Pago x Unidad (S/)</label>
            <input type="number" id="pMonto" value="50" min="0">
        </div>
        <button class="btn-add" onclick="addPayment()">
            <i class="fas fa-plus"></i> REGISTRAR PAGO
        </button>
    </section>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Practicante</th>
                    <th>Área de Trabajo</th>
                    <th>Cant.</th>
                    <th>Subtotal Bruto</th>
                    <th style="text-align: center;">Acciones</th>
                </tr>
            </thead>
            <tbody id="payTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let dbPracticantes = [];
    let payments = {}; 
    const API_URL = "https://asistencia-recursos.onrender.com/api/practicantes";

    // Función del Reloj 12h
    function updateClock() {
        const now = new Date();
        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        
        hours = hours % 12;
        hours = hours ? hours : 12; // el 0 es 12
        const strTime = `${String(hours).padStart(2, '0')}:${minutes}:${seconds} ${ampm}`;
        
        document.getElementById('clock').innerText = strTime;
    }

    document.getElementById('dateNow').innerText = new Intl.DateTimeFormat('es-PE', { dateStyle: 'full' }).format(new Date());
    setInterval(updateClock, 1000);
    updateClock();

    async function init() {
        try {
            const res = await fetch(API_URL);
            dbPracticantes = await res.json();
            const select = document.getElementById('pSelect');
            select.innerHTML = '<option value="">-- Seleccionar --</option>';
            dbPracticantes.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.id || `${p.nombres} ${p.apellidos}`;
                opt.textContent = `${p.nombres} ${p.apellidos}`.toUpperCase();
                opt.dataset.area = p.area;
                select.appendChild(opt);
            });
        } catch (e) {
            console.error("Error cargando datos:", e);
        }
    }

    function addPayment() {
        const select = document.getElementById('pSelect');
        if(select.value === "") return Swal.fire('Atención', 'Seleccione un practicante', 'warning');

        const nombre = select.options[select.selectedIndex].text;
        const area = select.options[select.selectedIndex].dataset.area;
        const cant = parseInt(document.getElementById('pCant').value);
        const monto = parseFloat(document.getElementById('pMonto').value);
        const fecha = new Date().toLocaleDateString('es-PE');

        if (!payments[nombre]) {
            payments[nombre] = { area, total: 0, entregables: 0, logs: [] };
        }

        payments[nombre].logs.push({ fecha, cant, monto, subtotal: (cant * monto) });
        payments[nombre].total += (cant * monto);
        payments[nombre].entregables += cant;

        renderTable();
        Swal.fire({ 
            icon: 'success', 
            title: 'Pago Registrado', 
            text: `${nombre} ha sido actualizado`,
            toast: true, 
            position: 'top-end', 
            showConfirmButton: false, 
            timer: 2000 
        });
    }

    function renderTable() {
        const body = document.getElementById('payTableBody');
        let html = "";
        let gTotal = 0, gCant = 0;

        Object.keys(payments).forEach(nom => {
            const p = payments[nom];
            gTotal += p.total;
            gCant += p.entregables;
            html += `
                <tr>
                    <td><div style="font-weight:700">${nom}</div></td>
                    <td><span class="badge-area">${p.area}</span></td>
                    <td class="mono">${p.entregables}</td>
                    <td class="mono" style="color:var(--success); font-weight:700">S/ ${p.total.toFixed(2)}</td>
                    <td style="text-align:center;">
                        <button class="btn-action btn-pdf" onclick="generateIndividualReport('${nom}')" title="Boleta Detallada">
                            <i class="fas fa-file-invoice-dollar"></i>
                        </button>
                        <button class="btn-action btn-delete" onclick="deleteEntry('${nom}')" title="Eliminar">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                </tr>`;
        });

        body.innerHTML = html || '<tr><td colspan="5" style="text-align:center; padding:4rem; color:#94a3b8"><i class="fas fa-inbox" style="display:block; font-size:2rem; margin-bottom:10px; opacity:0.3"></i> No hay pagos registrados hoy</td></tr>';
        document.getElementById('grandTotal').innerText = `S/ ${gTotal.toFixed(2)}`;
        document.getElementById('totalDeliveries').innerText = gCant;
    }

    function deleteEntry(nom) {
        Swal.fire({
            title: '¿Eliminar registro?',
            text: `Se borrarán los datos de pago para ${nom}`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#1e293b',
            cancelButtonColor: '#ef4444',
            confirmButtonText: 'Sí, borrar',
            cancelButtonText: 'Cancelar'
        }).then((result) => {
            if (result.isConfirmed) {
                delete payments[nom];
                renderTable();
            }
        });
    }

    function generateGeneralReport() {
        if(Object.keys(payments).length === 0) return Swal.fire('Error', 'No hay datos para exportar', 'error');
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const now = new Date().toLocaleString('es-PE');
        
        doc.setFontSize(18); doc.setTextColor(30, 41, 59);
        doc.text("ARGRAMETAL S.A.C.", 14, 22);
        doc.setFontSize(10); doc.setTextColor(100);
        doc.text("REPORTE CONSOLIDADO DE PAGOS", 14, 28);
        doc.setFontSize(9);
        doc.text(`Fecha de emisión: ${now}`, 14, 34);

        const tableData = Object.keys(payments).map(nom => [
            nom, payments[nom].area, payments[nom].entregables, `S/ ${payments[nom].total.toFixed(2)}`
        ]);

        doc.autoTable({
            startY: 40,
            head: [['Practicante', 'Área', 'Entregables', 'Total']],
            body: tableData,
            theme: 'grid',
            headStyles: { fillColor: [30, 41, 59] }
        });

        doc.save(`Argrametal_General_${Date.now()}.pdf`);
    }

    function generateIndividualReport(nom) {
        const p = payments[nom];
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const now = new Date().toLocaleString('es-PE');

        doc.setFillColor(30, 41, 59);
        doc.rect(0, 0, 210, 45, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(22);
        doc.text("ARGRAMETAL", 14, 20);
        doc.setFontSize(11);
        doc.text("BOLETA DE PAGO DETALLADA", 14, 30);

        doc.setTextColor(30, 41, 59);
        doc.setFontSize(11);
        doc.text(`PRACTICANTE: ${nom}`, 14, 60);
        doc.text(`DEPARTAMENTO: ${p.area}`, 14, 67);
        doc.setFontSize(10);
        doc.setTextColor(120);
        doc.text(`EMITIDO: ${now}`, 14, 74);

        const logData = p.logs.map(l => [l.fecha, l.cant, `S/ ${l.monto.toFixed(2)}`, `S/ ${l.subtotal.toFixed(2)}`]);

        doc.autoTable({
            startY: 85,
            head: [['Fecha', 'Cantidad', 'Costo U.', 'Subtotal']],
            body: logData,
            theme: 'striped',
            headStyles: { fillColor: [14, 165, 233] }
        });

        const finalY = doc.lastAutoTable.finalY + 15;
        doc.setFontSize(13);
        doc.setTextColor(30, 41, 59);
        doc.text(`TOTAL A PAGAR: S/ ${p.total.toFixed(2)}`, 140, finalY + 10);

        doc.save(`Boleta_${nom.replace(" ","_")}.pdf`);
    }

    init();
</script>
</body>
</html>
