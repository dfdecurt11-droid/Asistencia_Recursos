<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RRHH | Inicio de Sesión</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg-body: #f1f5f9; --card-bg: #ffffff; --text-main: #1e293b; --error: #f43f5e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-body); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: var(--card-bg); padding: 45px 40px; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.08); width: 100%; max-width: 420px; text-align: center; }
        .icon-box { width: 70px; height: 70px; background: #f1f5ff; border-radius: 22px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; color: var(--primary); font-size: 2rem; }
        h2 { font-weight: 800; margin-bottom: 20px; letter-spacing: -1px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 8px; padding-left: 5px; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #64748b; }
        input { width: 100%; padding: 16px 20px 16px 55px; border: 1.5px solid #e2e8f0; border-radius: 18px; outline: none; background: #f8fafc; }
        input:focus { border-color: var(--primary); background: #fff; }
        .btn-login { width: 100%; padding: 18px; border: none; border-radius: 20px; color: white; font-weight: 700; cursor: pointer; background: var(--primary); box-shadow: 0 10px 20px -5px rgba(99,102,241,0.4); text-transform: uppercase; }
        #error-msg { background: #fff1f2; color: var(--error); padding: 12px; border-radius: 15px; font-size: 0.85rem; margin-bottom: 20px; display: none; border: 1px solid rgba(244,63,94,0.2); }
    </style>
</head>
<body>

<div class="card">
    <div class="icon-box"><i class="fas fa-lock"></i></div>
    <h2>Acceso Privado</h2>
    <div id="error-msg"></div>
    <form id="loginForm">
        <div class="form-group">
            <label>Correo Electrónico</label>
            <div class="input-wrapper">
                <input type="email" id="txtEmail" placeholder="admin@rrhh.com" required>
                <i class="fas fa-envelope"></i>
            </div>
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <div class="input-wrapper">
                <input type="password" id="txtPass" placeholder="••••••••" required>
                <i class="fas fa-key"></i>
            </div>
        </div>
        <button type="submit" class="btn-login" id="btnLogin">Entrar al Sistema</button>
    </form>
</div>

<script>
    const API_LOGIN_URL = "/api/login"; 

    // Si ya tiene token, saltar el login
    if(localStorage.getItem('token')) {
        window.location.href = 'recursos_humanos.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorDiv = document.getElementById('error-msg');
        const email = document.getElementById('txtEmail').value;
        const password = document.getElementById('txtPass').value;

        try {
            const response = await fetch(API_LOGIN_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok && data.token) {
                localStorage.setItem('token', data.token);
                // Redirige al panel correcto
                window.location.href = 'recursos_humanos.html'; 
            } else {
                errorDiv.innerText = data.error || "Acceso denegado";
                errorDiv.style.display = 'block';
            }
        } catch (err) {
            // Esto soluciona el mensaje de "Error de conexión"
            errorDiv.innerText = "Error: El servidor no responde";
            errorDiv.style.display = 'block';
        }
    });
</script>
</body>
</html>
