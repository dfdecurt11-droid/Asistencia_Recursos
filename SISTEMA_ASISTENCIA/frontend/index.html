<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRHH | Registro de Practicantes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4776E6;
            --secondary: #8E54E9;
            --success: #00b894;
            --error: #ff7675;
            --dark: #1e272e;
            --text-muted: #636e72;
            --glass: rgba(255, 255, 255, 0.92);
        }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(-45deg, #2e3192, #1bffff, #d4145a, #ffbb00);
            background-size: 400% 400%; 
            animation: gradient 15s ease infinite;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
            overflow: hidden;
        }

        @keyframes gradient { 
            0% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }

        .card { 
            background: var(--glass); 
            backdrop-filter: blur(25px);
            padding: 40px; 
            border-radius: 40px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.25); 
            width: 100%; max-width: 460px; 
            border: 1px solid rgba(255, 255, 255, 0.7);
            position: relative;
        }

        .top-badge {
            position: absolute;
            top: 0; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--dark);
            color: white;
            padding: 8px 25px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            white-space: nowrap;
        }

        .header-section { text-align: center; margin-bottom: 25px; margin-top: 10px; }
        
        .header-section i.main-icon {
            font-size: 3.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 10px rgba(71, 118, 230, 0.2));
        }

        h2 { 
            color: var(--dark); 
            font-weight: 800; 
            margin: 15px 0 5px 0; 
            font-size: 1.7rem; 
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }
        
        .subtitle { color: var(--text-muted); font-size: 0.95rem; font-weight: 500; }
        
        #reloj { 
            text-align: center; font-size: 1.3rem; color: var(--dark); 
            margin: 20px 0; font-weight: 700; 
            background: linear-gradient(135deg, rgba(71, 118, 230, 0.1), rgba(142, 84, 233, 0.1));
            padding: 12px; border-radius: 20px; 
            border: 1px solid rgba(71, 118, 230, 0.2);
        }

        .form-group { position: relative; margin-bottom: 22px; }
        label { display: block; font-weight: 700; color: var(--dark); margin-bottom: 8px; font-size: 0.8rem; padding-left: 10px; text-transform: uppercase; }

        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 1.1rem; }
        
        input, select { 
            width: 100%; padding: 16px 16px 16px 55px; 
            border: 2px solid #f1f2f6; border-radius: 20px; outline: none; 
            transition: 0.3s; font-size: 0.95rem; font-family: 'Poppins'; background: #fdfdfd; 
        }

        input:focus, select:focus { border-color: var(--primary); background: #fff; box-shadow: 0 10px 25px rgba(71, 118, 230, 0.12); }

        .btn-add { 
            width: 100%; padding: 18px; border: none; border-radius: 22px; color: white; 
            font-weight: 700; cursor: pointer; transition: 0.4s; font-size: 1.1rem; 
            display: flex; align-items: center; justify-content: center; gap: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            box-shadow: 0 12px 30px rgba(71, 118, 230, 0.35);
        }

        .btn-add:hover { transform: translateY(-4px); filter: brightness(1.1); }

        .secondary-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }

        .btn-nav { 
            background: white; color: var(--dark); border: 2px solid #f1f2f6; padding: 14px; 
            border-radius: 18px; font-size: 0.85rem; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s;
        }
        
        .btn-nav:hover { background: var(--dark); color: white; }

        #toast-container { position: fixed; top: 30px; right: 30px; z-index: 9999; }
        .toast { 
            background: white; padding: 20px 30px; border-radius: 25px; margin-bottom: 15px; 
            display: flex; align-items: center; gap: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.12); 
            animation: slideIn 0.5s ease; border-left: 10px solid var(--success);
        }
        @keyframes slideIn { from { transform: translateX(150%); } to { transform: translateX(0); } }
        .spinner { animation: rotate 2s linear infinite; display: none; width: 22px; height: 22px; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div class="card">
    <div class="top-badge">Sistema D&B</div>
    
    <div class="header-section">
        <i class="fas fa-id-badge main-icon"></i>
        <h2>Registro de Practicantes</h2>
        <span class="subtitle">Gestión de Talento Humano</span>
    </div>

    <div id="reloj">00:00:00 p. m.</div>
    
    <div class="form-group">
        <label>Nombres Completos</label>
        <div class="input-wrapper">
            <input type="text" id="txtNombres" placeholder="Escriba los nombres..." spellcheck="false">
            <i class="fas fa-user"></i>
        </div>
    </div>
    
    <div class="form-group">
        <label>Apellidos Completos</label>
        <div class="input-wrapper">
            <input type="text" id="txtApellidos" placeholder="Escriba los apellidos..." spellcheck="false">
            <i class="fas fa-address-card"></i>
        </div>
    </div>

    <div class="form-group">
        <label>Área Designada</label>
        <div class="input-wrapper">
            <select id="selArea">
                <option value="" disabled selected>Seleccione el área...</option>
                <option value="Ventas">Ventas</option>
                <option value="Finanzas">Finanzas</option>
                <option value="Marketing">Marketing</option>
                <option value="Logística">Logística</option>
                <option value="Mejora Continua">Mejora Continua</option>
                <option value="Recursos Humanos">Recursos Humanos</option>
            </select>
            <i class="fas fa-sitemap"></i>
        </div>
    </div>

    <button class="btn-add" id="btnGuardar" onclick="registrar()">
        <i class="fas fa-cloud-upload-alt" id="btnIcon"></i>
        <i class="fas fa-circle-notch spinner" id="btnSpinner"></i>
        <span>Guardar Registro</span>
    </button>
    
    <div class="secondary-btns">
        <button class="btn-nav" onclick="location.href='lista.html'">
            <i class="fas fa-users"></i> Ver Áreas
        </button>
        <button class="btn-nav" onclick="location.href='reporte.html'">
            <i class="fas fa-file-signature"></i> Reportes
        </button>
    </div>
</div>

<script>
    const API_URL = "https://asistencia-recursos.onrender.com/api/practicantes";

    setInterval(() => {
        document.getElementById('reloj').innerText = new Date().toLocaleTimeString('es-PE', { 
            hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true 
        });
    }, 1000);

    function mostrarToast(mensaje, tipo = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${tipo}`;
        const icon = tipo === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
        toast.innerHTML = `
            <i class="fas ${icon}" style="color: ${tipo === 'success' ? 'var(--success)' : 'var(--error)'}; font-size: 1.8rem;"></i> 
            <div>
                <strong style="display:block; color:var(--dark); font-size:0.9rem">${tipo === 'success' ? 'Éxito' : 'Atención'}</strong>
                <span style="color:var(--text-muted); font-size:0.85rem">${mensaje}</span>
            </div>`;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 500);
        }, 3500);
    }

    async function registrar() {
        const btn = document.getElementById('btnGuardar');
        const icon = document.getElementById('btnIcon');
        const spinner = document.getElementById('btnSpinner');
        const txtBtn = btn.querySelector('span');

        const nom = document.getElementById('txtNombres').value.trim();
        const ape = document.getElementById('txtApellidos').value.trim();
        const are = document.getElementById('selArea').value;

        if(!nom || !ape || !are) {
            mostrarToast("Debe completar todos los campos", "error");
            return;
        }

        btn.disabled = true;
        icon.style.display = 'none';
        spinner.style.display = 'block';
        txtBtn.innerText = "Sincronizando...";

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombres: nom, apellidos: ape, area: are })
            });
            
            if(res.ok) {
                mostrarToast(`Registro de ${nom} completado.`);
                document.getElementById('txtNombres').value = "";
                document.getElementById('txtApellidos').value = "";
                document.getElementById('selArea').value = "";
            } else {
                mostrarToast("Error en el servidor", "error");
            }
        } catch (e) { 
            mostrarToast("Error de conexión", "error"); 
        } finally {
            btn.disabled = false;
            icon.style.display = 'block';
            spinner.style.display = 'none';
            txtBtn.innerText = "Guardar Registro";
        }
    }
</script>
</body>
</html>
