<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIA | Gestión de Practicantes</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3456/3456426.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --bg-body: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --input-bg: #ffffff;
            --border-color: #e2e8f0;
            --success: #10b981;
            --error: #ef4444;
            --accent-payment: #0ea5e9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(14, 165, 233, 0.05) 0px, transparent 50%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px; color: var(--text-main);
        }

        .card { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 28px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02); 
            width: 100%; max-width: 460px; 
            border: 1px solid var(--border-color);
            position: relative;
        }

        .header-section { text-align: center; margin-bottom: 32px; }
        
        .brand-tag {
            display: inline-block;
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        h2 { font-weight: 800; font-size: 1.6rem; letter-spacing: -0.5px; color: var(--text-main); margin-bottom: 6px; }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; }
        
        #reloj { 
            text-align: center; font-size: 1.4rem; color: var(--text-main); 
            margin-bottom: 32px; font-weight: 700; 
            letter-spacing: 1px; font-variant-numeric: tabular-nums;
            background: #f1f5f9; padding: 10px; border-radius: 12px;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; color: var(--text-main); margin-bottom: 8px; font-size: 0.85rem; }

        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1rem; transition: 0.3s; }
        
        input, select { 
            width: 100%; padding: 14px 16px 14px 48px; 
            border: 1px solid var(--border-color); border-radius: 14px; 
            outline: none; transition: all 0.2s ease; font-size: 0.95rem; 
            font-family: inherit; background: var(--input-bg);
            color: var(--text-main);
        }

        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        input:focus + i { color: var(--primary); }

        .btn-add { 
            width: 100%; padding: 16px; border: none; border-radius: 14px; 
            color: white; font-weight: 700; cursor: pointer; transition: 0.3s; 
            font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px;
            background: var(--primary);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-add:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 6px 15px rgba(37, 99, 235, 0.3); }

        .secondary-btns { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            margin-top: 32px; 
        }

        .btn-nav { 
            background: #ffffff; color: var(--text-muted); 
            border: 1px solid var(--border-color); padding: 14px 8px; 
            border-radius: 16px; font-size: 0.75rem; font-weight: 700; 
            cursor: pointer; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 8px; transition: 0.3s; 
        }

        .btn-nav i { font-size: 1.2rem; }
        .btn-nav:hover { background: #f8fafc; color: var(--primary); border-color: var(--primary); transform: translateY(-3px); }
        
        .btn-payment { border-color: rgba(14, 165, 233, 0.2); color: var(--accent-payment); }
        .btn-payment:hover { background: #f0f9ff; border-color: var(--accent-payment); color: var(--accent-payment); }

        /* MODAL DE SEGURIDAD */
        #modalSeguridad {
            display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); 
            z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }

        .modal-content {
            background: white; padding: 35px; border-radius: 24px; width: 90%; max-width: 340px;
            text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .pin-input {
            width: 100%; padding: 15px; text-align: center; font-size: 2rem; 
            letter-spacing: 8px; border: 2px solid #e2e8f0; border-radius: 12px;
            margin: 20px 0; font-family: 'Courier New', Courier, monospace;
        }

        /* TOASTS */
        #toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; }
        .toast { 
            background: white; padding: 16px 20px; border-radius: 18px; margin-bottom: 12px; 
            display: flex; align-items: center; gap: 14px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
            min-width: 300px; border-left: 5px solid var(--primary);
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .spinner { animation: rotate 1s linear infinite; display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .card { padding: 30px 20px; border: none; box-shadow: none; background: transparent; }
            body { background: white; align-items: flex-start; }
        }
    </style>
</head>
<body>

<div id="toast-container"></div>

<!-- Modal de Seguridad -->
<div id="modalSeguridad">
    <div class="modal-content">
        <div style="background: #eff6ff; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
            <i class="fas fa-lock" style="font-size: 1.5rem; color: var(--primary);"></i>
        </div>
        <h3 style="font-size: 1.2rem; font-weight: 800;">Acceso Restringido</h3>
        <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 5px;">Ingrese el PIN de administrador</p>
        
        <input type="password" id="pinAdmin" class="pin-input" placeholder="*****" maxlength="5" inputmode="numeric">
        
        <button onclick="validarPin()" class="btn-add" style="padding: 14px;">ENTRAR</button>
        <button onclick="cerrarModal()" style="background: none; border: none; color: var(--text-muted); margin-top: 15px; font-size: 0.8rem; cursor: pointer; font-weight: 600;">Cancelar</button>
    </div>
</div>

<div class="card">
    <div class="header-section">
        <span class="brand-tag">Argrametal | RRHH</span>
        <h2>Registro de Ingreso</h2>
        <p class="subtitle">Complete los datos del practicante</p>
    </div>

    <div id="reloj">00:00:00</div>
    
    <div class="form-group">
        <label>Nombres</label>
        <div class="input-wrapper">
            <input type="text" id="txtNombres" placeholder="Ej. Juan Andrés" autocomplete="off">
            <i class="fas fa-user"></i>
        </div>
    </div>
    
    <div class="form-group">
        <label>Apellidos</label>
        <div class="input-wrapper">
            <input type="text" id="txtApellidos" placeholder="Ej. Pérez García" autocomplete="off">
            <i class="fas fa-id-card"></i>
        </div>
    </div>

    <div class="form-group">
        <label>Área de Asignación</label>
        <div class="input-wrapper">
            <select id="selArea">
                <option value="" disabled selected>Seleccione un área...</option>
                <option value="Ventas">Ventas</option>
                <option value="Finanzas">Finanzas</option>
                <option value="Marketing">Marketing</option>
                <option value="Logística">Logística</option>
                <option value="Mejora Continua">Mejora Continua</option>
                <option value="Recursos Humanos">Recursos Humanos</option>
            </select>
            <i class="fas fa-briefcase"></i>
        </div>
    </div>

    <button class="btn-add" id="btnGuardar" onclick="registrar()">
        <span class="spinner" id="btnSpinner"></span>
        <i class="fas fa-paper-plane" id="btnIcon"></i>
        <span>Confirmar Registro</span>
    </button>
    
    <div class="secondary-btns">
        <button class="btn-nav" onclick="location.href='lista.html'">
            <i class="fas fa-th-large"></i>
            <span>Áreas</span>
        </button>
        <button class="btn-nav btn-payment" onclick="solicitarAcceso()">
            <i class="fas fa-wallet"></i>
            <span>Pagos</span>
        </button>
        <button class="btn-nav" onclick="location.href='reporte.html'">
            <i class="fas fa-file-invoice"></i>
            <span>Reportes</span>
        </button>
    </div>
</div>

<script>
    const API_URL = "https://asistencia-recursos.onrender.com/api/practicantes";
    const PIN_ADMIN = "26113"; // NUEVO PIN ACTUALIZADO

    function updateClock() {
        const now = new Date();
        document.getElementById('reloj').innerText = now.toLocaleTimeString('es-PE', { 
            hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false 
        });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // --- LÓGICA DE SEGURIDAD ---
    function solicitarAcceso() {
        document.getElementById('modalSeguridad').style.display = 'flex';
        document.getElementById('pinAdmin').focus();
    }

    function cerrarModal() {
        document.getElementById('modalSeguridad').style.display = 'none';
        document.getElementById('pinAdmin').value = '';
    }

    function validarPin() {
        const pin = document.getElementById('pinAdmin').value;
        if(pin === PIN_ADMIN) {
            location.href = 'pagos.html';
        } else {
            mostrarToast("PIN Incorrecto. Acceso denegado.", "error");
            document.getElementById('pinAdmin').value = '';
        }
    }

    document.getElementById('pinAdmin').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') validarPin();
    });

    // --- GESTIÓN DE REGISTRO ---
    function mostrarToast(mensaje, tipo = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast`;
        toast.style.borderLeftColor = tipo === 'success' ? 'var(--success)' : 'var(--error)';
        
        const icon = tipo === 'success' ? 'fa-check-circle' : 'fa-circle-xmark';
        const color = tipo === 'success' ? 'var(--success)' : 'var(--error)';
        
        toast.innerHTML = `
            <i class="fas ${icon}" style="color: ${color}; font-size: 1.25rem;"></i> 
            <div>
                <strong style="display:block; font-size:0.85rem; color: ${color}">${tipo === 'success' ? 'Éxito' : 'Error'}</strong>
                <span style="color:var(--text-muted); font-size:0.8rem">${mensaje}</span>
            </div>`;
        container.appendChild(toast);
        
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(20px)';
            toast.style.transition = '0.4s ease';
            setTimeout(() => toast.remove(), 400);
        }, 4000);
    }

    async function registrar() {
        const btn = document.getElementById('btnGuardar');
        const icon = document.getElementById('btnIcon');
        const spinner = document.getElementById('btnSpinner');
        const txtBtn = btn.querySelector('span:not(.spinner)');

        const nom = document.getElementById('txtNombres').value.trim();
        const ape = document.getElementById('txtApellidos').value.trim();
        const are = document.getElementById('selArea').value;

        if(!nom || !ape || !are) {
            mostrarToast("Por favor, complete todos los campos.", "error");
            return;
        }

        btn.disabled = true;
        icon.style.display = 'none';
        spinner.style.display = 'block';
        txtBtn.innerText = "Procesando...";

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombres: nom, apellidos: ape, area: are })
            });
            
            if(res.ok) {
                mostrarToast(`¡Bienvenido, ${nom}! Registro exitoso.`);
                document.getElementById('txtNombres').value = "";
                document.getElementById('txtApellidos').value = "";
                document.getElementById('selArea').value = "";
            } else {
                mostrarToast("No se pudo completar el registro.", "error");
            }
        } catch (e) { 
            mostrarToast("Error de conexión con el servidor.", "error"); 
        } finally {
            btn.disabled = false;
            icon.style.display = 'block';
            spinner.style.display = 'none';
            txtBtn.innerText = "Confirmar Registro";
        }
    }
</script>
</body>
</html>
