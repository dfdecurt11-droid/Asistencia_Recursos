<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRHH | Registro de Talentos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4776E6;
            --secondary: #8E54E9;
            --success: #00b894;
            --error: #ff7675;
            --dark: #2d3436;
            --glass: rgba(255, 255, 255, 0.9);
        }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(-45deg, #4158D0, #C850C0, #FFCC70);
            background-size: 400% 400%; 
            animation: gradient 15s ease infinite;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }

        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Contenedor Principal con efecto Cristal */
        .card { 
            background: var(--glass); 
            backdrop-filter: blur(20px);
            padding: 45px; 
            border-radius: 35px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.2); 
            width: 100%; max-width: 450px; 
            border: 1px solid rgba(255, 255, 255, 0.6);
            position: relative;
            overflow: hidden;
        }

        /* Adorno decorativo superior */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 8px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
        }

        .header-section { text-align: center; margin-bottom: 30px; }
        
        .header-section i.main-icon {
            font-size: 3rem;
            background: linear-gradient(to bottom, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        h2 { color: var(--dark); font-weight: 800; margin: 10px 0 5px 0; font-size: 1.8rem; letter-spacing: -1px; }
        .subtitle { color: #636e72; font-size: 0.9rem; font-weight: 500; }
        
        #reloj { 
            text-align: center; font-size: 1.2rem; color: var(--primary); 
            margin: 20px 0; font-weight: 700; 
            background: rgba(71, 118, 230, 0.08); 
            padding: 12px; border-radius: 20px; 
            border: 1px dashed var(--primary);
        }

        /* Estilo de los Inputs */
        .form-group { position: relative; margin-bottom: 25px; }
        
        label { 
            display: block; font-weight: 600; color: var(--dark); 
            margin-bottom: 10px; font-size: 0.85rem; 
            padding-left: 5px;
        }

        .input-wrapper { position: relative; }

        .input-wrapper i { 
            position: absolute; left: 18px; top: 50%; 
            transform: translateY(-50%); color: #b2bec3; 
            transition: 0.3s; font-size: 1.1rem;
        }
        
        input, select { 
            width: 100%; padding: 15px 15px 15px 52px; 
            border: 2px solid #edf2f7; 
            border-radius: 18px; box-sizing: border-box; outline: none; 
            transition: all 0.3s ease; 
            font-size: 0.95rem; font-family: 'Poppins'; 
            background: #fff;
        }

        input:focus, select:focus { 
            border-color: var(--primary); 
            box-shadow: 0 10px 20px rgba(71, 118, 230, 0.1);
            transform: translateY(-2px);
        }

        input:focus + i, select:focus + i { color: var(--primary); }

        /* Botones */
        .button-group { display: flex; flex-direction: column; gap: 15px; margin-top: 35px; }
        
        button { 
            width: 100%; padding: 16px; border: none; border-radius: 20px; color: white; 
            font-weight: 700; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 12px;
            letter-spacing: 0.5px;
        }

        .btn-add { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            box-shadow: 0 12px 24px rgba(71, 118, 230, 0.3); 
        }

        .secondary-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn-list, .btn-report { 
            background: white; color: var(--dark); 
            border: 2px solid #edf2f7; padding: 12px; font-size: 0.85rem;
        }
        
        button:hover { transform: translateY(-5px); filter: brightness(1.1); }
        .btn-add:hover { box-shadow: 0 15px 30px rgba(71, 118, 230, 0.4); }
        
        .btn-list:hover, .btn-report:hover { 
            background: var(--dark); color: white; border-color: var(--dark); 
        }

        /* Toast Styles */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { 
            background: white; color: var(--dark); padding: 20px 25px; border-radius: 22px; 
            margin-bottom: 12px; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15); 
            animation: slideIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border-left: 8px solid var(--success);
            font-weight: 600;
        }
        .toast.error { border-left-color: var(--error); }
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .spinner { animation: rotate 2s linear infinite; display: none; width: 20px; height: 20px; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div class="card">
    <div class="header-section">
        <i class="fas fa-user-tie main-icon"></i>
        <h2>Nuevo Talento</h2>
        <p class="subtitle">Módulo de Ingresos RRHH</p>
    </div>

    <div id="reloj">00:00:00 p. m.</div>
    
    <div class="form-group">
        <label>Nombres del Practicante</label>
        <div class="input-wrapper">
            <input type="text" id="txtNombres" placeholder="Ej: Alvaro Fabian" spellcheck="false">
            <i class="fas fa-signature"></i>
        </div>
    </div>
    
    <div class="form-group">
        <label>Apellidos del Practicante</label>
        <div class="input-wrapper">
            <input type="text" id="txtApellidos" placeholder="Ej: Alvites Merino" spellcheck="false">
            <i class="fas fa-id-card"></i>
        </div>
    </div>

    <div class="form-group">
        <label>Área de Destino</label>
        <div class="input-wrapper">
            <select id="selArea">
                <option value="" disabled selected>Seleccione el área...</option>
                <option value="Ventas">Ventas</option>
                <option value="Finanzas">Finanzas</option>
                <option value="Marketing">Marketing</option>
                <option value="Logística">Logística</option>
                <option value="Mejora Continua">Mejora Continua</option>
                <option value="Recursos Humanos">Recursos Humanos</option>
            </select>
            <i class="fas fa-building-user"></i>
        </div>
    </div>

    <div class="button-group">
        <button class="btn-add" id="btnGuardar" onclick="registrar()">
            <i class="fas fa-user-plus" id="btnIcon"></i>
            <i class="fas fa-circle-notch spinner" id="btnSpinner"></i>
            <span>Confirmar Registro</span>
        </button>
        
        <div class="secondary-btns">
            <button class="btn-list" onclick="location.href='lista.html'">
                <i class="fas fa-th-large"></i> Áreas
            </button>
            <button class="btn-report" onclick="location.href='reporte.html'">
                <i class="fas fa-chart-pie"></i> Reportes
            </button>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://asistencia-recursos.onrender.com/api/practicantes";

    setInterval(() => {
        document.getElementById('reloj').innerText = new Date().toLocaleTimeString('es-PE', { 
            hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true 
        });
    }, 1000);

    function mostrarToast(mensaje, tipo = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${tipo}`;
        const icon = tipo === 'success' ? 'fa-check-circle' : 'fa-triangle-exclamation';
        toast.innerHTML = `<i class="fas ${icon}" style="color: ${tipo === 'success' ? 'var(--success)' : 'var(--error)'}; font-size: 1.5rem;"></i> <span>${mensaje}</span>`;
        container.appendChild(toast);
        
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateY(-20px)';
            setTimeout(() => toast.remove(), 500);
        }, 3500);
    }

    async function registrar() {
        const btn = document.getElementById('btnGuardar');
        const icon = document.getElementById('btnIcon');
        const spinner = document.getElementById('btnSpinner');
        const txtBtn = btn.querySelector('span');

        const nom = document.getElementById('txtNombres').value.trim();
        const ape = document.getElementById('txtApellidos').value.trim();
        const are = document.getElementById('selArea').value;

        if(!nom || !ape || !are) {
            mostrarToast("Completa todos los datos del talento", "error");
            return;
        }

        btn.disabled = true;
        icon.style.display = 'none';
        spinner.style.display = 'block';
        txtBtn.innerText = "Procesando...";

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombres: nom, apellidos: ape, area: are })
            });
            
            if(res.ok) {
                mostrarToast(`¡Bienvenido(a), ${nom}! Registro completado.`);
                document.getElementById('txtNombres').value = "";
                document.getElementById('txtApellidos').value = "";
                document.getElementById('selArea').value = "";
            } else {
                mostrarToast("Error en el registro del servidor", "error");
            }
        } catch (e) { 
            mostrarToast("Error crítico: Servidor no responde", "error"); 
        } finally {
            btn.disabled = false;
            icon.style.display = 'block';
            spinner.style.display = 'none';
            txtBtn.innerText = "Confirmar Registro";
        }
    }
</script>
</body>
</html>
