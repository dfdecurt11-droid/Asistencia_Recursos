<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIA | Gestión de Practicantes</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3456/3456426.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --bg-body: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --input-bg: #ffffff;
            --border-color: #e2e8f0;
            --success: #10b981;
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.03) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 64, 175, 0.03) 0px, transparent 50%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px; color: var(--text-main);
        }

        .card { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); 
            width: 100%; max-width: 440px; 
            border: 1px solid var(--border-color);
            position: relative;
        }

        .header-section { text-align: center; margin-bottom: 32px; }
        
        .header-section .brand-tag {
            display: inline-block;
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        h2 { font-weight: 800; font-size: 1.5rem; letter-spacing: -0.5px; color: var(--text-main); margin-bottom: 6px; }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; font-weight: 400; }
        
        #reloj { 
            text-align: center; font-size: 1.25rem; color: var(--text-main); 
            margin: 0 0 32px; font-weight: 600; 
            letter-spacing: 1px; font-variant-numeric: tabular-nums;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; color: var(--text-main); margin-bottom: 8px; font-size: 0.85rem; }

        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1rem; transition: 0.3s; }
        
        input, select { 
            width: 100%; padding: 14px 16px 14px 48px; 
            border: 1px solid var(--border-color); border-radius: 12px; 
            outline: none; transition: all 0.2s ease; font-size: 0.95rem; 
            font-family: inherit; background: var(--input-bg);
            color: var(--text-main);
        }

        input::placeholder { color: #cbd5e1; }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08); }
        input:focus + i { color: var(--primary); }

        .btn-add { 
            width: 100%; padding: 16px; border: none; border-radius: 12px; 
            color: white; font-weight: 600; cursor: pointer; transition: 0.2s; 
            font-size: 0.95rem; display: flex; align-items: center; justify-content: center; gap: 10px;
            background: var(--primary);
            margin-top: 10px;
        }

        .btn-add:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-add:active { transform: translateY(0); }
        .btn-add:disabled { background: var(--text-muted); cursor: not-allowed; opacity: 0.7; }

        .secondary-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px; }
        .btn-nav { 
            background: transparent; color: var(--text-muted); 
            border: 1px solid var(--border-color); padding: 12px; 
            border-radius: 12px; font-size: 0.85rem; font-weight: 600; 
            cursor: pointer; display: flex; align-items: center; 
            justify-content: center; gap: 8px; transition: 0.2s; 
        }

        .btn-nav:hover { background: #f1f5f9; color: var(--text-main); border-color: #cbd5e1; }

        /* Toast Estilo Moderno */
        #toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; }
        .toast { 
            background: white; padding: 16px 20px; border-radius: 16px; margin-bottom: 12px; 
            display: flex; align-items: center; gap: 14px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
            min-width: 320px; border: 1px solid var(--border-color);
            animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .spinner { animation: rotate 1s linear infinite; display: none; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .card { padding: 30px 20px; border: none; box-shadow: none; background: transparent; }
            body { background: white; align-items: flex-start; }
        }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div class="card">
    <div class="header-section">
        <span class="brand-tag">Recursos Humanos</span>
        <h2>Registro de Ingreso</h2>
        <p class="subtitle">Complete los datos del practicante</p>
    </div>

    <div id="reloj">00:00:00</div>
    
    <div class="form-group">
        <label>Nombres</label>
        <div class="input-wrapper">
            <input type="text" id="txtNombres" placeholder="Ej. Juan Andrés" autocomplete="off">
            <i class="fas fa-user"></i>
        </div>
    </div>
    
    <div class="form-group">
        <label>Apellidos</label>
        <div class="input-wrapper">
            <input type="text" id="txtApellidos" placeholder="Ej. Pérez García" autocomplete="off">
            <i class="fas fa-id-card"></i>
        </div>
    </div>

    <div class="form-group">
        <label>Área de Asignación</label>
        <div class="input-wrapper">
            <select id="selArea">
                <option value="" disabled selected>Seleccione un área...</option>
                <option value="Ventas">Ventas</option>
                <option value="Finanzas">Finanzas</option>
                <option value="Marketing">Marketing</option>
                <option value="Logística">Logística</option>
                <option value="Mejora Continua">Mejora Continua</option>
                <option value="Recursos Humanos">Recursos Humanos</option>
            </select>
            <i class="fas fa-briefcase"></i>
        </div>
    </div>

    <button class="btn-add" id="btnGuardar" onclick="registrar()">
        <span class="spinner" id="btnSpinner"></span>
        <i class="fas fa-paper-plane" id="btnIcon"></i>
        <span>Confirmar Registro</span>
    </button>
    
    <div class="secondary-btns">
        <button class="btn-nav" onclick="location.href='lista.html'">
            <i class="fas fa-list-ul"></i> Áreas
        </button>
        <button class="btn-nav" onclick="location.href='reporte.html'">
            <i class="fas fa-chart-pie"></i> Reportes
        </button>
    </div>
</div>

<script>
    const API_URL = "https://asistencia-recursos.onrender.com/api/practicantes";

    function updateClock() {
        const now = new Date();
        document.getElementById('reloj').innerText = now.toLocaleTimeString('es-PE', { 
            hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false 
        });
    }
    setInterval(updateClock, 1000);
    updateClock();

    function mostrarToast(mensaje, tipo = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast`;
        
        const icon = tipo === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
        const color = tipo === 'success' ? 'var(--success)' : 'var(--error)';
        const titulo = tipo === 'success' ? 'Éxito' : 'Atención';
        
        toast.innerHTML = `
            <i class="fas ${icon}" style="color: ${color}; font-size: 1.25rem;"></i> 
            <div>
                <strong style="display:block; font-size:0.85rem; color: ${color}">${titulo}</strong>
                <span style="color:var(--text-muted); font-size:0.8rem">${mensaje}</span>
            </div>`;
        container.appendChild(toast);
        
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateY(-10px)';
            toast.style.transition = '0.4s ease';
            setTimeout(() => toast.remove(), 400);
        }, 4000);
    }

    async function registrar() {
        const btn = document.getElementById('btnGuardar');
        const icon = document.getElementById('btnIcon');
        const spinner = document.getElementById('btnSpinner');
        const txtBtn = btn.querySelector('span:not(.spinner)');

        const nom = document.getElementById('txtNombres').value.trim();
        const ape = document.getElementById('txtApellidos').value.trim();
        const are = document.getElementById('selArea').value;

        if(!nom || !ape || !are) {
            mostrarToast("Debe completar todos los campos del formulario.", "error");
            return;
        }

        btn.disabled = true;
        icon.style.display = 'none';
        spinner.style.display = 'block';
        txtBtn.innerText = "Registrando...";

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombres: nom, apellidos: ape, area: are })
            });
            
            if(res.ok) {
                mostrarToast(`Registro completado: ${nom} ${ape} en ${are}.`);
                document.getElementById('txtNombres').value = "";
                document.getElementById('txtApellidos').value = "";
                document.getElementById('selArea').value = "";
            } else {
                mostrarToast("El servidor rechazó la solicitud de registro.", "error");
            }
        } catch (e) { 
            mostrarToast("Error de conexión. Verifique su red.", "error"); 
        } finally {
            btn.disabled = false;
            icon.style.display = 'block';
            spinner.style.display = 'none';
            txtBtn.innerText = "Confirmar Registro";
        }
    }
</script>
</body>
</html>
