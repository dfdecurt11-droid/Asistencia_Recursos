<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RRHH | División Ventas</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/9440/9440939.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #ff334b; 
            --primary-glow: rgba(255, 51, 75, 0.4);
            --dark-bg: #050810;
            --surface: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.1);
            --success: #10b981;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, #2a0a0d, #050810 60%);
            background-color: var(--dark-bg);
            color: white;
            padding: clamp(15px, 4vw, 40px);
            overflow-x: hidden;
        }

        /* Orbes decorativos animados */
        .orb {
            position: fixed;
            width: 500px; height: 500px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 75%);
            filter: blur(80px);
            z-index: -1;
            animation: float 15s infinite alternate ease-in-out;
        }

        @keyframes float {
            from { transform: translate(-10%, -10%) scale(1); }
            to { transform: translate(15%, 15%) scale(1.1); }
        }

        .container { 
            position: relative;
            z-index: 10;
            max-width: 900px; 
            width: 100%;
            background: var(--surface); 
            padding: clamp(25px, 5vw, 45px); 
            border-radius: 35px; 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .btn-back { 
            text-decoration: none; 
            color: #94a3b8; 
            font-weight: 700; 
            display: flex; 
            align-items: center; 
            gap: 10px;
            transition: 0.3s;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .btn-back:hover { color: var(--primary); transform: translateX(-5px); }

        .clock-display { 
            font-family: 'JetBrains Mono', monospace;
            background: rgba(255, 51, 75, 0.1);
            padding: 10px 22px; 
            border-radius: 15px; 
            border: 1px solid var(--primary);
            color: var(--primary);
            font-size: 1.1rem;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .title-section { margin-bottom: 30px; }
        .title-section p { color: var(--primary); font-weight: 800; font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 5px; }
        .title-section h2 { font-size: clamp(1.8rem, 5vw, 2.6rem); font-weight: 800; letter-spacing: -1.5px; }

        /* Lista de practicantes */
        #lista-asistencia { 
            display: grid; 
            gap: 15px; 
            max-height: 55vh; 
            overflow-y: auto; 
            padding-right: 10px;
        }

        #lista-asistencia::-webkit-scrollbar { width: 5px; }
        #lista-asistencia::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .card-practicante { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 30px; 
            background: rgba(255, 255, 255, 0.02);
            border-radius: 22px;
            border: 1px solid var(--border);
            transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); 
        }

        .card-practicante:hover { 
            background: rgba(255, 51, 75, 0.05);
            border-color: var(--primary);
            transform: translateY(-3px);
        }

        .info strong { font-size: 1.1rem; color: #fff; display: block; margin-bottom: 4px; letter-spacing: -0.5px; }
        .info small { color: #64748b; font-weight: 700; font-size: 0.75rem; display: flex; align-items: center; gap: 6px; text-transform: uppercase; }

        .actions { display: flex; gap: 12px; }

        .btn-action { 
            padding: 12px 22px; 
            border-radius: 15px; 
            border: none; 
            cursor: pointer; 
            font-weight: 800; 
            color: white; 
            transition: 0.3s; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .btn-in { background: var(--primary); box-shadow: 0 8px 20px rgba(255, 51, 75, 0.3); }
        .btn-out { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); }

        .btn-action:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.2); }
        .btn-action:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Notificaciones flotantes */
        #notification {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 18px 35px; border-radius: 20px; 
            background: #0f172a; color: white; border: 1px solid var(--primary);
            display: none; z-index: 1000; font-weight: 700;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popUp { from { transform: translate(-50%, 100px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

        @media (max-width: 650px) {
            .card-practicante { flex-direction: column; gap: 20px; text-align: center; }
            .actions { width: 100%; }
            .btn-action { flex: 1; justify-content: center; }
            .nav-header { flex-direction: column-reverse; gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="orb" style="top: -10%; left: -10%;"></div>
    <div class="orb" style="bottom: -10%; right: -10%; animation-delay: -5s;"></div>

    <div id="notification"></div>

    <div class="container">
        <div class="nav-header">
            <a href="index.html" class="btn-back"><i class="fas fa-chevron-left"></i> Volver al Inicio</a>
            <div id="reloj" class="clock-display">00:00:00 --</div>
        </div>
        
        <header class="title-section">
            <p>Growth & Revenue</p>
            <h2>División <span style="color: var(--primary);">Ventas</span></h2>
        </header>

        <div id="lista-asistencia">
            <div style="text-align:center; padding: 50px; opacity: 0.6;">
                <i class="fas fa-bolt fa-beat" style="font-size: 2rem; color: var(--primary);"></i>
                <p style="margin-top: 15px; font-weight: 700; letter-spacing: 1px;">CARGANDO EQUIPO COMERCIAL...</p>
            </div>
        </div>
    </div>

    <script>
        const API_GET = "https://asistencia-recursos.onrender.com/api/practicantes";
        const API_POST = "https://asistencia-recursos.onrender.com/api/asistencia";
        const AREA_FILTRO = "Ventas";

        function updateClock() {
            const now = new Date();
            document.getElementById('reloj').innerText = now.toLocaleTimeString('es-PE', { 
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true 
            }).toUpperCase();
        }
        setInterval(updateClock, 1000);
        updateClock();

        function notify(msg, err = false) {
            const n = document.getElementById('notification');
            n.style.borderColor = err ? '#ef4444' : '#ff334b';
            n.innerHTML = `<i class="fas ${err ? 'fa-exclamation-triangle' : 'fa-check-circle'}" style="color: ${err ? '#ef4444' : '#ff334b'}; margin-right:10px;"></i> ${msg}`;
            n.style.display = "block";
            setTimeout(() => n.style.display = "none", 3000);
        }

        async function loadTeam() {
            const container = document.getElementById('lista-asistencia');
            try {
                const res = await fetch(API_GET);
                const data = await res.json();
                
                // Filtrar solo los del área de Ventas
                const equipoVentas = data.filter(p => p.area.trim() === AREA_FILTRO);

                if(equipoVentas.length === 0) {
                    container.innerHTML = `<div style="text-align:center; padding: 40px;">
                        <p style="color:#64748b; font-weight:700;">No hay practicantes registrados en Ventas.</p>
                    </div>`;
                    return;
                }

                container.innerHTML = equipoVentas.sort((a,b) => a.apellidos.localeCompare(b.apellidos)).map(p => `
                    <div class="card-practicante">
                        <div class="info">
                            <strong>${p.apellidos.toUpperCase()}, ${p.nombres}</strong>
                            <small><i class="fas fa-id-badge"></i> AGENTE: ${String(p.id_practicantes).padStart(4, '0')}</small>
                        </div>
                        <div class="actions">
                            <button class="btn-action btn-in" onclick="register(${p.id_practicantes}, 'entrada', this)">
                                <i class="fas fa-sign-in-alt"></i> Entrada
                            </button>
                            <button class="btn-action btn-out" onclick="register(${p.id_practicantes}, 'salida', this)">
                                <i class="fas fa-sign-out-alt"></i> Salida
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (e) { 
                container.innerHTML = `<p style="text-align:center; color:var(--primary); font-weight:800;">ERROR AL CONECTAR CON EL SERVIDOR</p>`;
                console.error(e);
            }
        }

        async function register(id, tipo, btn) {
            const actionsDiv = btn.closest('.actions');
            const btns = actionsDiv.querySelectorAll('button');
            const originalContent = btn.innerHTML;
            
            // Bloqueo de UI
            btns.forEach(b => b.disabled = true);
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i>`;

            try {
                const res = await fetch(`${API_POST}/${id}`, { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tipo_registro: tipo })
                });

                if (res.ok) {
                    notify(`¡REGISTRO DE ${tipo.toUpperCase()} EXITOSO!`);
                } else {
                    const errorData = await res.json();
                    notify(errorData.message || "Error al procesar", true);
                }
            } catch (e) { 
                notify("Fallo de red: Reintente luego", true); 
            } finally {
                btns.forEach(b => b.disabled = false);
                btn.innerHTML = originalContent;
            }
        }

        window.onload = loadTeam;
    </script>
</body>
</html>
