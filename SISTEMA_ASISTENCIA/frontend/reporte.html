<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRHH | Reporte de Practicantes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ventas: #fb7185; --finanzas: #34d399; --marketing: #a78bfa;
            --logistica: #fbbf24; --mejora: #22d3ee; --recursos: #f472b6;
            --bg-body: #020617;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #f1f5f9;
            --accent: #6366f1;
            --danger: #ef4444;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-body); 
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent);
            color: var(--text-main);
            padding: clamp(0.5rem, 2vw, 2.5rem); /* Reducido para móviles */
            min-height: 100vh;
        }

        .container { 
            width: 100%; max-width: 1440px; margin: auto; 
            background: var(--surface); 
            border-radius: 24px; /* Un poco más pequeño en bordes para móviles */
            padding: clamp(1rem, 3vw, 3rem); 
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.4); 
        }

        .header { margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid #f1f5f9; }
        .header h2 { font-size: clamp(1.2rem, 5vw, 2rem); font-weight: 800; letter-spacing: -1px; margin-top: 0.5rem; }
        .nav-back { text-decoration: none; color: var(--text-muted); font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 6px; transition: 0.2s; margin-bottom: 10px; }
        .nav-back:hover { color: var(--accent); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: #f8fafc; padding: 1rem; border-radius: 16px; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 0.8rem; }
        .stat-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: white; color: var(--accent); flex-shrink: 0; }

        .controls-card { background: #f8fafc; padding: 1rem; border-radius: 20px; margin-bottom: 1.5rem; border: 1px solid var(--border-color); }
        .search-wrapper { position: relative; }
        .search-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-wrapper input { width: 100%; padding: 12px 12px 12px 45px; border-radius: 14px; border: 1px solid #e2e8f0; font-family: inherit; font-size: 0.9rem; }
        
        .filter-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-top: 1rem; scrollbar-width: none; }
        .filter-tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 6px 14px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.7rem; background: white; color: var(--text-muted); border: 1px solid #e2e8f0; white-space: nowrap; }
        .tab.active { background: var(--text-main); color: white; border-color: var(--text-main); }

        /* --- AJUSTE CLAVE PARA LA TABLA EN MÓVIL --- */
        .table-container { 
            border-radius: 16px; 
            overflow-x: auto; /* Permite scroll horizontal si la tabla es muy ancha */
            border: 1px solid var(--border-color);
            background: white;
        }
        table { width: 100%; border-collapse: collapse; min-width: 700px; /* Asegura que los datos no se encimen */ }
        th { background: #f8fafc; padding: 12px 15px; text-align: left; font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); font-weight: 800; }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 35px; height: 35px; border-radius: 10px; background: #eef2ff; color: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.75rem; flex-shrink: 0; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; color: white; white-space: nowrap; }
        .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
        .hours-pill { background: #0f172a; color: #38bdf8; padding: 4px 8px; border-radius: 6px; font-weight: 700; }

        .action-btns-wrapper { display: flex; gap: 5px; justify-content: center; }
        .action-btn { width: 32px; height: 32px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #f1f5f9; }
        .edit-btn { color: var(--accent); }
        .delete-btn { color: var(--danger); }

        /* Ajustes de Modales para móvil */
        .modal-card { background: white; padding: 1.5rem; border-radius: 24px; width: 95%; max-width: 400px; }
        
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .container { padding: 1rem; border-radius: 0; }
            body { padding: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <a href="index.html" class="nav-back"><i class="fas fa-arrow-left"></i> Volver al panel</a>
        <h2>Reporte <span style="color: var(--accent);">Asistencia</span></h2>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-users"></i></div>
            <div>
                <p style="font-size: 0.65rem; color: var(--text-muted); font-weight: 700;">TOTAL</p>
                <h4 id="statTotal" class="mono">--</h4>
            </div>
        </div>
        <div class="stat-card" style="cursor: pointer; border-color: var(--accent);" id="generar-reporte">
            <div class="stat-icon" style="color: white; background: var(--accent);"><i class="fas fa-download"></i></div>
            <div>
                <p style="font-size: 0.65rem; color: var(--text-muted); font-weight: 700;">PDF</p>
                <h4 style="font-size: 0.75rem; font-weight: 800;">EXPORTAR</h4>
            </div>
        </div>
    </div>

    <section class="controls-card">
        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="inputSearch" placeholder="Buscar practicante..." onkeyup="filterData()">
        </div>
        <div class="filter-tabs">
            <button class="tab active" onclick="setFilter('Todos', this)">Todos</button>
            <button class="tab" onclick="setFilter('Ventas', this)">Ventas</button>
            <button class="tab" onclick="setFilter('Finanzas', this)">Finanzas</button>
            <button class="tab" onclick="setFilter('Marketing', this)">Marketing</button>
            <button class="tab" onclick="setFilter('Logística', this)">Logística</button>
            <button class="tab" onclick="setFilter('Mejora Continua', this)">Mejora</button>
            <button class="tab" onclick="setFilter('Recursos Humanos', this)">RRHH</button>
        </div>
    </section>

    <div class="table-container">
        <table id="tabla-practicantes">
            <thead>
                <tr>
                    <th style="width: 40px;">#</th>
                    <th>Practicante</th>
                    <th>Área</th>
                    <th>Entrada</th>
                    <th>Salida</th>
                    <th>Total</th>
                    <th style="text-align: center;">Acción</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="modalEdit">
    <div class="modal-card">
        <h3 style="margin-bottom: 20px;">Editar Datos</h3>
        <input type="hidden" id="editId">
        <div class="input-group">
            <label>NOMBRES</label>
            <input type="text" id="editNombres">
        </div>
        <div class="input-group">
            <label>APELLIDOS</label>
            <input type="text" id="editApellidos">
        </div>
        <div class="input-group">
            <label>ÁREA</label>
            <select id="editArea">
                <option value="Ventas">Ventas</option>
                <option value="Finanzas">Finanzas</option>
                <option value="Marketing">Marketing</option>
                <option value="Logística">Logística</option>
                <option value="Mejora Continua">Mejora Continua</option>
                <option value="Recursos Humanos">Recursos Humanos</option>
            </select>
        </div>
        <div class="btn-group">
            <button class="btn btn-ghost" onclick="closeModal('modalEdit')">Volver</button>
            <button class="btn btn-accent" onclick="saveEdit()">Guardar</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalDelete">
    <div class="modal-card">
        <div class="modal-icon icon-delete"><i class="fas fa-trash"></i></div>
        <h3>¿Eliminar registro?</h3>
        <p id="deleteText" style="margin-bottom: 20px; font-size: 0.9rem;"></p>
        <div class="btn-group">
            <button class="btn btn-ghost" onclick="closeModal('modalDelete')">Cancelar</button>
            <button class="btn btn-danger" id="confirmDeleteBtn">Eliminar</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<script>
    const API = "https://asistencia-recursos.onrender.com/api";
    let allData = [];
    let currentArea = "Todos";

    async function fetchData() {
        try {
            const r = await fetch(`${API}/reporte`);
            allData = await r.json();
            document.getElementById('statTotal').innerText = allData.length;
            filterData();
        } catch (e) { console.error("Error API"); }
    }

    function filterData() {
        const query = document.getElementById('inputSearch').value.toLowerCase();
        let filtered = allData.filter(p => {
            const matchName = `${p.nombres} ${p.apellidos}`.toLowerCase().includes(query);
            const matchArea = currentArea === "Todos" || p.area.trim() === currentArea;
            return matchName && matchArea;
        });
        filtered.sort((a, b) => a.area.localeCompare(b.area));
        render(filtered);
    }

    function render(list) {
        const body = document.getElementById('tableBody');
        body.innerHTML = list.map((p, idx) => {
            const areaKey = p.area.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes('logistica') ? 'logistica' : 
                            p.area.toLowerCase().includes('mejora') ? 'mejora' : 
                            p.area.toLowerCase().includes('ventas') ? 'ventas' :
                            p.area.toLowerCase().includes('finanzas') ? 'finanzas' :
                            p.area.toLowerCase().includes('marketing') ? 'marketing' : 'recursos';

            return `
                <tr>
                    <td class="mono" style="color: var(--text-muted);">${idx + 1}</td>
                    <td>
                        <div class="user-info">
                            <div class="user-avatar">${p.apellidos[0]}${p.nombres[0]}</div>
                            <div>
                                <div style="font-weight: 700; font-size: 0.8rem;">${p.apellidos.split(' ')[0]}</div>
                                <div style="color: var(--text-muted); font-size: 0.7rem;">${p.nombres.split(' ')[0]}</div>
                            </div>
                        </div>
                    </td>
                    <td><span class="badge" style="background: var(--${areaKey})">${p.area}</span></td>
                    <td class="mono">${p.hora_entrada ? new Date(p.hora_entrada).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--:--'}</td>
                    <td class="mono">${p.hora_salida ? new Date(p.hora_salida).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--:--'}</td>
                    <td><span class="hours-pill mono">${p.horas_acumuladas ? p.horas_acumuladas.split(':').slice(0,2).join(':') : '00:00'}</span></td>
                    <td>
                        <div class="action-btns-wrapper">
                            <button class="action-btn edit-btn" onclick='openEdit(${JSON.stringify(p)})'><i class="fas fa-edit"></i></button>
                            <button class="action-btn delete-btn" onclick='openDelete(${JSON.stringify(p)})'><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
    }

    // Funciones de utilidad (Modales y API) se mantienen igual
    function openEdit(p) {
        document.getElementById('editId').value = p.id_practicantes;
        document.getElementById('editNombres').value = p.nombres;
        document.getElementById('editApellidos').value = p.apellidos;
        document.getElementById('editArea').value = p.area;
        document.getElementById('modalEdit').classList.add('active');
    }

    async function saveEdit() {
        const id = document.getElementById('editId').value;
        const payload = {
            nombres: document.getElementById('editNombres').value,
            apellidos: document.getElementById('editApellidos').value,
            area: document.getElementById('editArea').value
        };
        await fetch(`${API}/practicantes/${id}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        closeModal('modalEdit');
        fetchData();
    }

    function openDelete(p) {
        document.getElementById('deleteText').innerHTML = `¿Eliminar a <b>${p.nombres}</b>?`;
        document.getElementById('modalDelete').classList.add('active');
        document.getElementById('confirmDeleteBtn').onclick = async () => {
            await fetch(`${API}/practicantes/${p.id_practicantes}`, { method: 'DELETE' });
            closeModal('modalDelete');
            fetchData();
        };
    }

    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    function setFilter(area, btn) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        currentArea = area;
        filterData();
    }

    window.onload = fetchData;
</script>
</body>
</html>
