<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Asistencia - RRHH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9b59b6; --secondary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --info: #3498db; 
            --ventas: #e67e22; --finanzas: #2ecc71; --marketing: #9b59b6; --logística: #34495e; --mejora: #f1c40f;
        }

        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 10px; background-color: #1a1a2e; color: var(--secondary); }
        .container { width: 100%; max-width: 1200px; margin: auto; background: white; border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); box-sizing: border-box; }
        
        .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 15px; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .header h2 { margin: 0; font-size: 1.4rem; }

        .controls-wrapper { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; background: #f8f9fa; padding: 15px; border-radius: 12px; border: 1px solid #eee; }

        .search-container { position: relative; width: 100%; }
        .search-container input { width: 100%; padding: 12px 15px 12px 40px; border-radius: 10px; border: 2px solid #dfe6e9; outline: none; font-size: 1rem; box-sizing: border-box; }
        .search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--info); }

        .filter-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-filter { padding: 8px 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.75rem; color: white; opacity: 0.7; transition: 0.3s; }
        .btn-filter.active { opacity: 1; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 12px; background: #f8f9fa; color: #7f8c8d; font-size: 0.7rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }

        .timer-box { font-family: 'JetBrains Mono', monospace; background: #f0f0f0; padding: 4px 8px; border-radius: 5px; font-weight: 600; font-size: 0.85rem; display: inline-block; }
        .total-highlight { background: var(--secondary); color: white; }
        .area-badge { padding: 4px 10px; border-radius: 15px; color: white; font-size: 0.7rem; font-weight: 700; display: inline-block; }

        /* MODALES */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(8px); }
        .modal-content { background: white; padding: 25px; border-radius: 20px; text-align: center; max-width: 450px; width: 90%; transform: scale(0.8); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal-content.show { transform: scale(1); }
        
        .btn-action { border: none; background: none; cursor: pointer; font-size: 1.1rem; margin: 0 8px; }
        .btn-edit { color: var(--info); }
        .btn-delete { color: var(--danger); }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 25px; border-radius: 50px; display: none; z-index: 5000; font-size: 0.85rem; }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content" id="modalContent">
        <i id="mainIcon" class="fas fa-exclamation-triangle modal-icon" style="color:var(--danger); font-size: 3rem; margin-bottom: 15px;"></i>
        <h3 id="modalTitle">¿Estás seguro?</h3>
        <p id="modalText">Esta acción no se puede deshacer.</p>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button onclick="cerrarModal()" style="flex:1; padding:10px; border-radius:8px; border:none; cursor:pointer;">Cancelar</button>
            <button id="btnConfirmarAction" style="flex:1; padding:10px; border-radius:8px; border:none; cursor:pointer; background:var(--danger); color:white; font-weight:bold;">Confirmar</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <a href="index.html" style="text-decoration:none; color:var(--info); font-weight:700;"><i class="fas fa-arrow-left"></i> Volver</a>
            <h2>Reporte <span style="color:var(--info)">RRHH</span></h2>
        </div>
        <button onclick="abrirModalReset()" style="background:var(--danger); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:700;">
            <i class="fas fa-history"></i> REINICIAR QUINCENA
        </button>
    </div>

    <div class="controls-wrapper">
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="inputNombre" placeholder="Buscar por nombre o apellido..." onkeyup="ejecutarFiltros()">
        </div>
        <div class="filter-buttons">
            <button class="btn-filter active" style="background:var(--secondary)" onclick="filtrar('Todos', this)">Todos</button>
            <button class="btn-filter" style="background:var(--ventas)" onclick="filtrar('Ventas', this)">Ventas</button>
            <button class="btn-filter" style="background:var(--finanzas)" onclick="filtrar('Finanzas', this)">Finanzas</button>
            <button class="btn-filter" style="background:var(--marketing)" onclick="filtrar('Marketing', this)">Marketing</button>
            <button class="btn-filter" style="background:var(--logística)" onclick="filtrar('Logística', this)">Logística</button>
            <button class="btn-filter" style="background:var(--mejora)" onclick="filtrar('Mejora Continua', this)">Mejora</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>N°</th>
                    <th>Practicante</th>
                    <th>Área</th>
                    <th>Última Entrada</th>
                    <th>Última Salida</th>
                    <th>Total Acumulado</th>
                </tr>
            </thead>
            <tbody id="tabla-body">
                <tr><td colspan="6" style="text-align:center; padding:50px;">Cargando datos del servidor...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const REPORTE_URL = "https://asistencia-recursos.onrender.com/api/reporte";
    let practicantes = [];
    let filtroArea = "Todos";

    // Formatea la hora de PostgreSQL a algo legible (12h)
    function mostrarHora(h) {
        if (!h || h === "00:00:00") return "--:--";
        try {
            // Si es un objeto Date completo
            const d = new Date(h);
            if(!isNaN(d.getTime())) return d.toLocaleTimeString('es-PE', {hour:'2-digit', minute:'2-digit', hour12:true});
            return h; // Si ya es un string formateado
        } catch(e) { return h; }
    }

    async function cargarDatos() {
        try {
            const res = await fetch(REPORTE_URL);
            practicantes = await res.json();
            ejecutarFiltros();
        } catch (e) { mostrarToast("❌ Error al conectar con el servidor"); }
    }

    function ejecutarFiltros() {
        const busqueda = document.getElementById('inputNombre').value.toLowerCase();
        const filtrados = practicantes.filter(p => {
            const nombreCompleto = `${p.nombres} ${p.apellidos}`.toLowerCase();
            const matchNom = nombreCompleto.includes(busqueda);
            const matchArea = filtroArea === "Todos" || p.area.trim() === filtroArea;
            return matchNom && matchArea;
        });
        renderizar(filtrados);
    }

    function renderizar(lista) {
        const tbody = document.getElementById('tabla-body');
        if(lista.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:30px;">No se encontraron resultados</td></tr>';
            return;
        }
        tbody.innerHTML = lista.map((p, i) => `
            <tr>
                <td><b>${i + 1}</b></td>
                <td><strong>${p.apellidos}, ${p.nombres}</strong></td>
                <td><span class="area-badge" style="background:var(--${p.area.toLowerCase().split(' ')[0]})">${p.area}</span></td>
                <td><span class="timer-box">${mostrarHora(p.hora_entrada)}</span></td>
                <td><span class="timer-box">${mostrarHora(p.hora_salida)}</span></td>
                <td><span class="timer-box total-highlight">${p.horas_acumuladas}</span></td>
            </tr>
        `).join('');
    }

    function filtrar(area, btn) {
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filtroArea = area;
        ejecutarFiltros();
    }

    function abrirModalReset() {
        const modal = document.getElementById('modalOverlay');
        document.getElementById('modalTitle').innerText = "¿Reiniciar Horas?";
        document.getElementById('modalText').innerText = "Esto borrará todas las asistencias registradas hasta hoy.";
        modal.style.display = 'flex';
        setTimeout(() => document.getElementById('modalContent').classList.add('show'), 10);

        document.getElementById('btnConfirmarAction').onclick = async () => {
            try {
                await fetch("https://asistencia-recursos.onrender.com/api/reset", { method: 'DELETE' });
                cerrarModal(); cargarDatos();
                mostrarToast("🔄 Sistema reiniciado correctamente");
            } catch(e) { mostrarToast("❌ Error al reiniciar"); }
        };
    }

    function cerrarModal() {
        document.getElementById('modalContent').classList.remove('show');
        setTimeout(() => document.getElementById('modalOverlay').style.display = 'none', 300);
    }

    function mostrarToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    window.onload = cargarDatos;
</script>
</body>
</html>
