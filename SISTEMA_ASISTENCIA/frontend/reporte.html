<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Asistencia - RRHH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9b59b6; --secondary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --info: #3498db; 
            --ventas: #e67e22; --finanzas: #2ecc71; --marketing: #9b59b6; --logística: #34495e; --mejora: #f1c40f;
        }

        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 10px; background-color: #1a1a2e; color: var(--secondary); }
        .container { width: 100%; max-width: 1200px; margin: auto; background: white; border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); box-sizing: border-box; }
        
        .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 15px; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .header h2 { margin: 0; font-size: 1.4rem; }

        .controls-wrapper { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; background: #f8f9fa; padding: 15px; border-radius: 12px; border: 1px solid #eee; }

        .search-container { position: relative; width: 100%; }
        .search-container input { width: 100%; padding: 12px 15px 12px 40px; border-radius: 10px; border: 2px solid #dfe6e9; outline: none; font-size: 1rem; box-sizing: border-box; }
        .search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--info); }

        .filter-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-filter { padding: 8px 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.75rem; color: white; opacity: 0.7; transition: 0.3s; }
        .btn-filter.active { opacity: 1; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* TABLA */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 12px; background: #f8f9fa; color: #7f8c8d; font-size: 0.7rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }

        .timer-box { font-family: 'JetBrains Mono', monospace; background: #f0f0f0; padding: 4px 8px; border-radius: 5px; font-weight: 600; font-size: 0.85rem; display: inline-block; }
        .total-highlight { background: var(--secondary); color: white; }
        .area-badge { padding: 4px 10px; border-radius: 15px; color: white; font-size: 0.7rem; font-weight: 700; display: inline-block; }

        /* MODALES */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; justify-content: center;
            align-items: center; z-index: 9999; backdrop-filter: blur(8px);
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 20px; text-align: center;
            max-width: 450px; width: 90%; transform: scale(0.8); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-content.show { transform: scale(1); }
        .modal-icon { font-size: 2.5rem; color: var(--info); margin-bottom: 15px; }
        
        /* FORMULARIO DE EDICIÓN */
        .edit-form { text-align: left; margin-top: 15px; }
        .edit-form label { font-size: 0.8rem; font-weight: 700; color: #7f8c8d; display: block; margin-bottom: 5px; }
        .edit-form input, .edit-form select {
            width: 100%; padding: 10px; border-radius: 8px; border: 2px solid #eee;
            margin-bottom: 15px; font-family: inherit; font-size: 0.9rem; box-sizing: border-box;
        }
        .edit-form input:focus { border-color: var(--info); outline: none; }

        .modal-btns { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        .btn-m { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; flex: 1; }
        .btn-cancel { background: #eee; color: #333; }
        .btn-confirm { background: var(--info); color: white; }
        .btn-danger-confirm { background: var(--danger); color: white; }

        @media screen and (max-width: 768px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr { border: 1px solid #eee; border-radius: 12px; margin-bottom: 15px; padding: 10px; background: #fff; }
            td { border: none; position: relative; padding-left: 50%; text-align: right; border-bottom: 1px solid #f9f9f9; }
            td::before { content: attr(data-label); position: absolute; left: 12px; width: 45%; text-align: left; font-weight: 800; color: #7f8c8d; font-size: 0.7rem; }
        }

        .btn-action { border: none; background: none; cursor: pointer; font-size: 1.1rem; margin: 0 8px; }
        .btn-edit { color: var(--info); }
        .btn-delete { color: var(--danger); }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 25px; border-radius: 50px; display: none; z-index: 5000; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content" id="modalContent">
        <i id="mainIcon" class="fas fa-exclamation-triangle modal-icon" style="color:var(--danger)"></i>
        <h3 id="modalTitle">¿Estás seguro?</h3>
        <p id="modalText">Esta acción no se puede deshacer.</p>
        <div class="modal-btns">
            <button class="btn-m btn-cancel" onclick="cerrarModal()">Cancelar</button>
            <button class="btn-m btn-danger-confirm" id="btnConfirmarAction">Confirmar</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalEditOverlay">
    <div class="modal-content" id="modalEditContent">
        <i class="fas fa-user-edit modal-icon"></i>
        <h3>Editar Practicante</h3>
        <div class="edit-form">
            <input type="hidden" id="editId">
            <label>Nombres</label>
            <input type="text" id="editNombres" placeholder="Ej. Juan">
            <label>Apellidos</label>
            <input type="text" id="editApellidos" placeholder="Ej. Pérez">
            <label>Área de Trabajo</label>
            <select id="editArea">
                <option value="Ventas">Ventas</option>
                <option value="Finanzas">Finanzas</option>
                <option value="Marketing">Marketing</option>
                <option value="Logística">Logística</option>
                <option value="Mejora Continua">Mejora Continua</option>
            </select>
        </div>
        <div class="modal-btns">
            <button class="btn-m btn-cancel" onclick="cerrarModalEdit()">Cerrar</button>
            <button class="btn-m btn-confirm" onclick="guardarEdicion()">Guardar Cambios</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<div class="container">
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <a href="index.html" style="text-decoration:none; color:var(--info); font-weight:700;"><i class="fas fa-arrow-left"></i></a>
            <h2>Reporte <span style="color:var(--info)">RRHH</span></h2>
        </div>
        <button onclick="abrirModalReset()" style="background:var(--danger); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:700; font-size: 0.8rem;">
            <i class="fas fa-history"></i> REINICIAR
        </button>
    </div>

    <div class="controls-wrapper">
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="inputNombre" placeholder="Buscar practicante..." onkeyup="ejecutarFiltros()">
        </div>
        <div class="filter-buttons">
            <button class="btn-filter active" style="background:var(--secondary)" onclick="filtrar('Todos', this)">Todos</button>
            <button class="btn-filter" style="background:var(--ventas)" onclick="filtrar('Ventas', this)">Ventas</button>
            <button class="btn-filter" style="background:var(--finanzas)" onclick="filtrar('Finanzas', this)">Finanzas</button>
            <button class="btn-filter" style="background:var(--marketing)" onclick="filtrar('Marketing', this)">Marketing</button>
            <button class="btn-filter" style="background:var(--logística)" onclick="filtrar('Logística', this)">Logística</button>
            <button class="btn-filter" style="background:var(--mejora)" onclick="filtrar('Mejora Continua', this)">Gestión</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>N°</th>
                    <th>Practicante</th>
                    <th>Área</th>
                    <th>Entrada</th>
                    <th>Salida</th>
                    <th>Total Horas</th>
                    <th style="text-align:center">Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-body"></tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = "https://asistencia-recursos.onrender.com/api/practicantes";
    let practicantes = [];
    let filtroArea = "Todos";

    function mostrarHora(h) {
        if (!h || h === "00:00:00") return "--:--";
        return h.length > 8 ? new Date(h).toLocaleTimeString('es-PE', {hour:'2-digit', minute:'2-digit', hour12:true}) : h;
    }

    async function cargarDatos() {
        try {
            const res = await fetch(API_URL);
            practicantes = await res.json();
            ejecutarFiltros();
        } catch (e) { mostrarToast("❌ Error de conexión"); }
    }

    function ejecutarFiltros() {
        const busqueda = document.getElementById('inputNombre').value.toLowerCase();
        const filtrados = practicantes.filter(p => {
            const matchNom = `${p.nombres} ${p.apellidos}`.toLowerCase().includes(busqueda);
            const matchArea = filtroArea === "Todos" || p.area.trim() === filtroArea;
            return matchNom && matchArea;
        });
        renderizar(filtrados);
    }

    function renderizar(lista) {
        const tbody = document.getElementById('tabla-body');
        tbody.innerHTML = lista.map((p, i) => `
            <tr>
                <td data-label="N°"><b>${i + 1}</b></td>
                <td data-label="Practicante"><strong>${p.apellidos}, ${p.nombres}</strong></td>
                <td data-label="Área"><span class="area-badge" style="background:var(--${p.area.toLowerCase().split(' ')[0]})">${p.area}</span></td>
                <td data-label="Entrada"><span class="timer-box">${mostrarHora(p.hora_entrada)}</span></td>
                <td data-label="Salida"><span class="timer-box">${mostrarHora(p.hora_salida)}</span></td>
                <td data-label="Total Horas"><span class="timer-box total-highlight">${p.horas_acumuladas || '00:00:00'}</span></td>
                <td data-label="Acciones" style="text-align:center">
                    <button class="btn-action btn-edit" onclick="abrirModalEdit(${JSON.stringify(p).replace(/"/g, '&quot;')})"><i class="fas fa-edit"></i></button>
                    <button class="btn-action btn-delete" onclick="abrirModalEliminar(${p.id_practicantes})"><i class="fas fa-trash-alt"></i></button>
                </td>
            </tr>
        `).join('');
    }

    function filtrar(area, btn) {
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filtroArea = area;
        ejecutarFiltros();
    }

    /* LÓGICA MODAL EDICIÓN */
    function abrirModalEdit(p) {
        document.getElementById('editId').value = p.id_practicantes;
        document.getElementById('editNombres').value = p.nombres;
        document.getElementById('editApellidos').value = p.apellidos;
        document.getElementById('editArea').value = p.area;

        const modal = document.getElementById('modalEditOverlay');
        modal.style.display = 'flex';
        setTimeout(() => document.getElementById('modalEditContent').classList.add('show'), 10);
    }

    async function guardarEdicion() {
        const id = document.getElementById('editId').value;
        const data = {
            nombres: document.getElementById('editNombres').value,
            apellidos: document.getElementById('editApellidos').value,
            area: document.getElementById('editArea').value
        };

        try {
            const res = await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (res.ok) {
                cerrarModalEdit();
                cargarDatos();
                mostrarToast("✅ Datos actualizados correctamente");
            }
        } catch (e) { mostrarToast("❌ Error al actualizar"); }
    }

    function cerrarModalEdit() {
        document.getElementById('modalEditContent').classList.remove('show');
        setTimeout(() => document.getElementById('modalEditOverlay').style.display = 'none', 300);
    }

    /* MODALES DE CONFIRMACIÓN */
    function abrirModalEliminar(id) {
        const modal = document.getElementById('modalOverlay');
        document.getElementById('modalTitle').innerText = "¿Eliminar Registro?";
        document.getElementById('modalText').innerText = "Se borrará permanentemente a este practicante.";
        modal.style.display = 'flex';
        setTimeout(() => document.getElementById('modalContent').classList.add('show'), 10);
        
        document.getElementById('btnConfirmarAction').onclick = async () => {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            cerrarModal(); cargarDatos();
            mostrarToast("🗑️ Registro eliminado");
        };
    }

    function abrirModalReset() {
        const modal = document.getElementById('modalOverlay');
        document.getElementById('modalTitle').innerText = "¿Reiniciar Sistema?";
        document.getElementById('modalText').innerText = "Se limpiarán todas las horas de la quincena actual.";
        modal.style.display = 'flex';
        setTimeout(() => document.getElementById('modalContent').classList.add('show'), 10);

        document.getElementById('btnConfirmarAction').onclick = async () => {
            await fetch("https://asistencia-recursos.onrender.com/api/reset", { method: 'DELETE' });
            cerrarModal(); cargarDatos();
            mostrarToast("🔄 Sistema reiniciado");
        };
    }

    function cerrarModal() {
        document.getElementById('modalContent').classList.remove('show');
        setTimeout(() => document.getElementById('modalOverlay').style.display = 'none', 300);
    }

    function mostrarToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    window.onload = cargarDatos;
</script>
</body>
</html>
