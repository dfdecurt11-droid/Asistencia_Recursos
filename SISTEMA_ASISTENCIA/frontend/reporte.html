<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Asistencia - RRHH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ventas: #ff3366;
            --finanzas: #00ff99;
            --marketing: #9933ff;
            --logística: #ffcc00;
            --mejora: #00ccff;
            --recursos: #ff00ff;
            --primary: #4776E6; 
            --secondary: #2c3e50; 
            --danger: #e74c3c; 
            --info: #3498db; 
        }

        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 15px; background-color: #f4f7f6; color: var(--secondary); }
        .container { width: 100%; max-width: 1280px; margin: auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); box-sizing: border-box; }
        .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 15px; border-bottom: 2px solid #f1f1f1; padding-bottom: 20px; margin-bottom: 25px; }
        .header h2 { margin: 0; font-size: 1.6rem; font-weight: 800; }
        .controls-wrapper { display: flex; flex-direction: column; gap: 18px; margin-bottom: 30px; background: #fff; padding: 20px; border-radius: 15px; border: 1px solid #eaeaea; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .search-container { position: relative; width: 100%; }
        .search-container input { width: 100%; padding: 14px 15px 14px 45px; border-radius: 12px; border: 2px solid #e2e8f0; outline: none; font-size: 1rem; box-sizing: border-box; transition: all 0.3s; }
        .search-container i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #a0aec0; }
        .filter-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-filter { padding: 10px 18px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 0.8rem; color: white; opacity: 0.5; transition: all 0.3s; text-transform: uppercase; }
        .btn-filter.active { opacity: 1; transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .table-wrapper { overflow-x: auto; border-radius: 12px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { text-align: left; padding: 18px 15px; background: #f8fafc; color: #718096; font-size: 0.75rem; text-transform: uppercase; font-weight: 700; }
        td { padding: 18px 15px; border-bottom: 1px solid #edf2f7; font-size: 0.95rem; color: #1a202c; }
        .timer-box { font-family: 'JetBrains Mono', monospace; background: #edf2f7; padding: 6px 12px; border-radius: 8px; font-weight: 600; display: inline-block; }
        .total-highlight { background: #2d3748; color: white; }
        .area-badge { padding: 6px 14px; border-radius: 20px; color: white; font-size: 0.75rem; font-weight: 700; display: inline-block; text-transform: uppercase; }
        .btn-action { border: none; background: none; cursor: pointer; font-size: 1.2rem; margin: 0 8px; transition: all 0.2s; }
        .btn-edit { color: var(--info); }
        .btn-delete { color: var(--danger); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 35px; border-radius: 25px; text-align: center; max-width: 480px; width: 90%; transform: scale(0.9); transition: 0.3s; }
        .modal-content.show { transform: scale(1); }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1a202c; color: white; padding: 15px 30px; border-radius: 50px; display: none; z-index: 5000; font-size: 0.9rem; font-weight: 600; }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content" id="modalContent">
        <i id="mainIcon" class="fas fa-exclamation-circle" style="color:var(--danger); font-size: 4rem; margin-bottom: 20px;"></i>
        <h3 id="modalTitle" style="font-weight: 800;">¿Confirmar acción?</h3>
        <p id="modalText" style="color:#718096; margin-bottom: 25px;">Esta operación no se puede deshacer.</p>
        <div style="display: flex; gap: 15px;">
            <button onclick="cerrarModal()" style="flex:1; padding:15px; border-radius:12px; border:none; cursor:pointer; font-weight:700; background:#edf2f7;">Cancelar</button>
            <button id="btnConfirmarAction" style="flex:1; padding:15px; border-radius:12px; border:none; cursor:pointer; background:var(--danger); color:white; font-weight:700;">Confirmar</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalEditOverlay">
    <div class="modal-content" id="modalEditContent">
        <h3 style="font-weight: 800;">Actualizar Información</h3>
        <div style="text-align: left; margin: 20px 0;">
            <input type="hidden" id="editId">
            <label style="font-size: 0.8rem; font-weight: 700; color: #4a5568;">NOMBRES</label>
            <input type="text" id="editNombres" style="width:100%; padding:12px; margin:10px 0 20px; border-radius:10px; border:1px solid #ddd;">
            <label style="font-size: 0.8rem; font-weight: 700; color: #4a5568;">APELLIDOS</label>
            <input type="text" id="editApellidos" style="width:100%; padding:12px; margin:10px 0 20px; border-radius:10px; border:1px solid #ddd;">
            <label style="font-size: 0.8rem; font-weight: 700; color: #4a5568;">ÁREA</label>
            <select id="editArea" style="width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ddd;">
                <option value="Ventas">Ventas</option>
                <option value="Finanzas">Finanzas</option>
                <option value="Marketing">Marketing</option>
                <option value="Logística">Logística</option>
                <option value="Mejora Continua">Mejora Continua</option>
                <option value="Recursos Humanos">Recursos Humanos</option>
            </select>
        </div>
        <div style="display: flex; gap: 15px;">
            <button onclick="cerrarModalEdit()" style="flex:1; padding:15px; border-radius:12px; border:none; background:#edf2f7; font-weight:700;">Cerrar</button>
            <button onclick="guardarEdicion()" style="flex:1; padding:15px; border-radius:12px; border:none; background:var(--info); color:white; font-weight:700;">Guardar</button>
        </div>
    </div>
</div>

<div class="container"> 
    <div class="header">
        <div style="display:flex; align-items:center; gap:15px;">
            <a href="index.html" style="text-decoration:none; color:var(--info); font-weight:700;"><i class="fas fa-chevron-left"></i> Volver</a>
            <h2>Panel de Reportes <span style="color:var(--info)">RRHH</span></h2>
        </div>
        <button onclick="abrirModalReset()" style="background:var(--danger); color:white; border:none; padding:12px 20px; border-radius:12px; cursor:pointer; font-weight:700; font-size: 0.9rem;">
            <i class="fas fa-sync-alt"></i> REINICIAR 
        </button>
    </div>

    <div class="controls-wrapper">
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="inputNombre" placeholder="Buscar por nombres o apellidos..." onkeyup="ejecutarFiltros()">
        </div>
        <div class="filter-buttons">
            <button class="btn-filter active" style="background:var(--secondary)" onclick="filtrar('Todos', this)">Todos</button>
            <button class="btn-filter" style="background:var(--ventas)" onclick="filtrar('Ventas', this)">Ventas</button>
            <button class="btn-filter" style="background:var(--finanzas)" onclick="filtrar('Finanzas', this)">Finanzas</button>
            <button class="btn-filter" style="background:var(--marketing)" onclick="filtrar('Marketing', this)">Marketing</button>
            <button class="btn-filter" style="background:var(--logística)" onclick="filtrar('Logística', this)">Logística</button>
            <button class="btn-filter" style="background:var(--mejora)" onclick="filtrar('Mejora Continua', this)">Mejora Continua</button>
            <button class="btn-filter" style="background:var(--recursos)" onclick="filtrar('Recursos Humanos', this)">Recursos Humanos</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width: 50px">N°</th>
                    <th>Practicante</th>
                    <th>Área</th>
                    <th>Entrada</th>
                    <th>Salida</th>
                    <th>Total (HH:MM)</th>
                    <th style="text-align:center; width: 120px">Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-body">
                <tr><td colspan="7" style="text-align:center; padding:60px; color:#a0aec0; font-weight:600;">Cargando registros...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const BASE_URL = "https://asistencia-recursos.onrender.com/api";
    let practicantes = [];
    let filtroArea = "Todos";

    function mostrarHora(h) {
        if (!h || h === "00:00:00") return "--:--";
        const d = new Date(h);
        // Usamos es-PE para asegurar el formato correcto de hora local
        return !isNaN(d.getTime()) ? d.toLocaleTimeString('es-PE', {hour:'2-digit', minute:'2-digit', hour12:true}) : h;
    }

    async function cargarDatos() {
        try {
            const res = await fetch(`${BASE_URL}/reporte`);
            practicantes = await res.json();
            ejecutarFiltros();
        } catch (e) { mostrarToast("❌ Error de conexión"); }
    }

    function ejecutarFiltros() {
        const busqueda = document.getElementById('inputNombre').value.toLowerCase();
        const filtrados = practicantes.filter(p => {
            const matchNom = `${p.nombres} ${p.apellidos}`.toLowerCase().includes(busqueda);
            const matchArea = filtroArea === "Todos" || p.area.trim() === filtroArea;
            return matchNom && matchArea;
        });
        renderizar(filtrados);
    }

    function renderizar(lista) {
        const tbody = document.getElementById('tabla-body');
        if(lista.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:40px;">Sin resultados.</td></tr>`;
            return;
        }

        tbody.innerHTML = lista.map((p, i) => {
            let colorVar = "secondary";
            const areaKey = p.area.toLowerCase();
            if(areaKey.includes("ventas")) colorVar = "ventas";
            else if(areaKey.includes("finanzas")) colorVar = "finanzas";
            else if(areaKey.includes("marketing")) colorVar = "marketing";
            else if(areaKey.includes("logística") || areaKey.includes("logistica")) colorVar = "logística";
            else if(areaKey.includes("mejora")) colorVar = "mejora";
            else if(areaKey.includes("recursos")) colorVar = "recursos";

            // CORRECCIÓN DE CÁLCULO VISUAL:
            // Tomamos el string de horas_acumuladas (ej: "00:02:15") y lo cortamos estrictamente en HH:MM
            let totalCorto = '00:00';
            const tiempoRaw = p.horas_acumuladas || "00:00:00";
            
            if (tiempoRaw !== "00:00:00") {
                const partes = tiempoRaw.split(':');
                // Aseguramos que siempre tenga 2 dígitos usando padStart
                const hh = partes[0].padStart(2, '0');
                const mm = partes[1].padStart(2, '0');
                totalCorto = `${hh}:${mm}`;
            }

            return `
                <tr>
                    <td><b>${i + 1}</b></td>
                    <td><strong>${p.apellidos.toUpperCase()}, ${p.nombres}</strong></td>
                    <td><span class="area-badge" style="background:var(--${colorVar})">${p.area}</span></td>
                    <td><span class="timer-box">${mostrarHora(p.hora_entrada)}</span></td>
                    <td><span class="timer-box">${mostrarHora(p.hora_salida)}</span></td>
                    <td><span class="timer-box total-highlight">${totalCorto}</span></td>
                    <td style="text-align:center">
                        <button class="btn-action btn-edit" onclick='abrirModalEdit(${JSON.stringify(p)})'><i class="fas fa-edit"></i></button>
                        <button class="btn-action btn-delete" onclick="abrirModalEliminar(${p.id_practicantes})"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    // Funciones de filtrado y modales (se mantienen igual para estabilidad)
    function filtrar(area, btn) {
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filtroArea = area;
        ejecutarFiltros();
    }

    function abrirModalEdit(p) {
        document.getElementById('editId').value = p.id_practicantes;
        document.getElementById('editNombres').value = p.nombres;
        document.getElementById('editApellidos').value = p.apellidos;
        document.getElementById('editArea').value = p.area;
        document.getElementById('modalEditOverlay').style.display = 'flex';
        setTimeout(() => document.getElementById('modalEditContent').classList.add('show'), 10);
    }

    async function guardarEdicion() {
        const id = document.getElementById('editId').value;
        const data = {
            nombres: document.getElementById('editNombres').value,
            apellidos: document.getElementById('editApellidos').value,
            area: document.getElementById('editArea').value
        };
        try {
            const res = await fetch(`${BASE_URL}/practicantes/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (res.ok) { cerrarModalEdit(); cargarDatos(); mostrarToast("✅ Actualizado"); }
        } catch (e) { mostrarToast("❌ Error al guardar"); }
    }

    function cerrarModalEdit() {
        document.getElementById('modalEditContent').classList.remove('show');
        setTimeout(() => document.getElementById('modalEditOverlay').style.display = 'none', 300);
    }

    function abrirModalEliminar(id) {
        const modal = document.getElementById('modalOverlay');
        document.getElementById('modalTitle').innerText = "¿Eliminar Practicante?";
        modal.style.display = 'flex';
        setTimeout(() => document.getElementById('modalContent').classList.add('show'), 10);
        document.getElementById('btnConfirmarAction').onclick = async () => {
            await fetch(`${BASE_URL}/practicantes/${id}`, { method: 'DELETE' });
            cerrarModal(); cargarDatos(); mostrarToast("🗑️ Eliminado");
        };
    }

    function abrirModalReset() {
        const modal = document.getElementById('modalOverlay');
        document.getElementById('modalTitle').innerText = "¿Reiniciar Quincena?";
        modal.style.display = 'flex';
        setTimeout(() => document.getElementById('modalContent').classList.add('show'), 10);
        document.getElementById('btnConfirmarAction').onclick = async () => {
            await fetch(`${BASE_URL}/reset`, { method: 'DELETE' });
            cerrarModal(); cargarDatos(); mostrarToast("🔄 Ciclo reiniciado");
        };
    }

    function cerrarModal() {
        document.getElementById('modalContent').classList.remove('show');
        setTimeout(() => document.getElementById('modalOverlay').style.display = 'none', 300);
    }

    function mostrarToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3500);
    }

    window.onload = cargarDatos;
</script>
</body>
</html>
