<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRHH | Reporte de Practicantes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ventas: #fb7185; --finanzas: #34d399; --marketing: #a78bfa;
            --logistica: #fbbf24; --mejora: #22d3ee; --recursos: #f472b6;
            --bg-body: #020617;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #f1f5f9;
            --accent: #6366f1;
            --danger: #ef4444;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-body); 
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent);
            color: var(--text-main);
            padding: clamp(1rem, 3vw, 2.5rem);
            min-height: 100vh;
        }

        .container { 
            width: 100%; max-width: 1440px; margin: auto; 
            background: var(--surface); 
            border-radius: 32px; 
            padding: clamp(1.5rem, 4vw, 3rem); 
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.4); 
        }

        /* HEADER (Ahora arriba) */
        .header { margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 2px solid #f1f5f9; }
        .header h2 { font-size: 2rem; font-weight: 800; letter-spacing: -1px; margin-top: 0.5rem; }
        .nav-back { text-decoration: none; color: var(--text-muted); font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .nav-back:hover { color: var(--accent); }

        /* STATS (Debajo del Header) */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2.5rem; }
        .stat-card { background: #f8fafc; padding: 1.5rem; border-radius: 20px; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 1rem; transition: 0.3s; }
        .stat-icon { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; background: white; color: var(--accent); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }

        /* El resto de estilos se mantienen igual... */
        .controls-card { background: #f8fafc; padding: 1.5rem; border-radius: 24px; margin-bottom: 2rem; border: 1px solid var(--border-color); }
        .search-wrapper { position: relative; }
        .search-wrapper i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-wrapper input { width: 100%; padding: 14px 14px 14px 50px; border-radius: 16px; border: 1px solid #e2e8f0; font-family: inherit; font-weight: 600; }
        .filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 1.2rem; }
        .tab { padding: 8px 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 0.75rem; background: white; color: var(--text-muted); border: 1px solid #e2e8f0; transition: 0.3s; }
        .tab.active { background: var(--text-main); color: white; border-color: var(--text-main); }

        .table-container { border-radius: 20px; overflow: hidden; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #f8fafc; padding: 16px 20px; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); font-weight: 800; }
        td { padding: 16px 20px; border-bottom: 1px solid var(--border-color); }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 12px; background: #eef2ff; color: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 800; }
        .badge { padding: 5px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; color: white; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .hours-pill { background: #0f172a; color: #38bdf8; padding: 4px 10px; border-radius: 8px; font-weight: 700; }

        .action-btn { width: 34px; height: 34px; border-radius: 10px; border: none; cursor: pointer; transition: 0.2s; background: transparent; }
        .edit-btn { color: var(--accent); }
        .delete-btn { color: var(--danger); }
        .action-btn:hover { background: #f1f5f9; transform: scale(1.1); }

        /* Modales */
        .modal-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.7); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 2000; opacity: 0; transition: 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-card { background: white; padding: 2.5rem; border-radius: 32px; width: 90%; max-width: 450px; text-align: center; transform: translateY(20px); transition: 0.4s; }
        .modal-overlay.active .modal-card { transform: translateY(0); }
        .modal-icon { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin: 0 auto 1.5rem; }
        .icon-delete { background: #fff1f2; color: var(--danger); }
        .icon-edit { background: #eff6ff; color: var(--accent); }
        .icon-success { background: #ecfdf5; color: var(--success); }

        .input-group { text-align: left; margin-bottom: 1.2rem; }
        .input-group label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); margin-bottom: 6px; }
        .input-group input, .input-group select { width: 100%; padding: 12px 16px; border-radius: 14px; border: 1.5px solid #e2e8f0; font-family: inherit; font-weight: 600; }

        .btn-group { display: flex; gap: 12px; margin-top: 2rem; }
        .btn { flex: 1; padding: 14px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-accent { background: var(--accent); color: white; }
        .btn-ghost { background: #f1f5f9; color: var(--text-muted); }

        @media (max-width: 768px) {
            th:nth-child(4), td:nth-child(4), th:nth-child(5), td:nth-child(5) { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <a href="index.html" class="nav-back"><i class="fas fa-chevron-left"></i> Volver al inicio </a>
        <h2>Reporte de <span style="color: var(--accent);">Practicantes</span></h2>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-users"></i></div>
            <div>
                <p style="font-size: 0.75rem; color: var(--text-muted); font-weight: 700;">TOTAL PERSONAL</p>
                <h4 id="statTotal" class="mono">--</h4>
            </div>
        </div>
        <div class="stat-card" style="cursor: pointer;" onclick="showResetModal()">
            <div class="stat-icon" style="color: #f43f5e; background: #fff1f2;"><i class="fas fa-sync-alt"></i></div>
            <div>
                <p style="font-size: 0.75rem; color: var(--text-muted); font-weight: 700;">NUEVO CICLO</p>
                <h4 style="font-size: 0.8rem; font-weight: 800;">REINICIAR TODO</h4>
            </div>
        </div>
    </div>

    <section class="controls-card">
        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="inputSearch" placeholder="Buscar por nombre o apellido..." onkeyup="filterData()">
        </div>
        <div class="filter-tabs">
            <button class="tab active" onclick="setFilter('Todos', this)">Todos</button>
            <button class="tab" onclick="setFilter('Ventas', this)">Ventas</button>
            <button class="tab" onclick="setFilter('Finanzas', this)">Finanzas</button>
            <button class="tab" onclick="setFilter('Marketing', this)">Marketing</button>
            <button class="tab" onclick="setFilter('Logística', this)">Logística</button>
            <button class="tab" onclick="setFilter('Mejora Continua', this)">Mejora Continua</button>
            <button class="tab" onclick="setFilter('Recursos Humanos', this)">Recursos Humanos</button>
        </div>
    </section>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">#</th>
                    <th>Practicante</th>
                    <th>Departamento</th>
                    <th>Entrada</th>
                    <th>Salida</th>
                    <th>Acumulado</th>
                    <th style="text-align: center;">Acciones</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="modalEdit">
    <div class="modal-card">
        <div class="modal-icon icon-edit"><i class="fas fa-user-edit"></i></div>
        <h3 style="font-weight: 800; margin-bottom: 20px;">Editar Practicante</h3>
        <input type="hidden" id="editId">
        <div class="input-group">
            <label>NOMBRES</label>
            <input type="text" id="editNombres">
        </div>
        <div class="input-group">
            <label>APELLIDOS</label>
            <input type="text" id="editApellidos">
        </div>
        <div class="input-group">
            <label>ÁREA</label>
            <select id="editArea">
                <option value="Ventas">Ventas</option>
                <option value="Finanzas">Finanzas</option>
                <option value="Marketing">Marketing</option>
                <option value="Logística">Logística</option>
                <option value="Mejora Continua">Mejora Continua</option>
                <option value="Recursos Humanos">Recursos Humanos</option>
            </select>
        </div>
        <div class="btn-group">
            <button class="btn btn-ghost" onclick="closeModal('modalEdit')">Cancelar</button>
            <button class="btn btn-accent" onclick="saveEdit()">Guardar Cambios</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalDelete">
    <div class="modal-card">
        <div class="modal-icon icon-delete"><i class="fas fa-trash-alt"></i></div>
        <h3 style="font-weight: 800; margin-bottom: 10px;">¿Eliminar Registro?</h3>
        <p id="deleteText" style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; margin-bottom: 20px;"></p>
        <div class="btn-group">
            <button class="btn btn-ghost" onclick="closeModal('modalDelete')">No, volver</button>
            <button class="btn btn-danger" id="confirmDeleteBtn">Sí, eliminar</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalSuccess">
    <div class="modal-card">
        <div class="modal-icon icon-success"><i class="fas fa-check-circle"></i></div>
        <h3 style="font-weight: 800; margin-bottom: 10px;">¡Eliminado!</h3>
        <p id="successText" style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; margin-bottom: 20px;"></p>
        <button class="btn btn-accent" onclick="closeModal('modalSuccess')">Entendido</button>
    </div>
</div>

<script>
    const API = "https://asistencia-recursos.onrender.com/api";
    let allData = [];
    let currentArea = "Todos";

    async function fetchData() {
        try {
            const r = await fetch(`${API}/reporte`);
            allData = await r.json();
            document.getElementById('statTotal').innerText = allData.length;
            filterData();
        } catch (e) { console.error("Error API"); }
    }

    function filterData() {
        const query = document.getElementById('inputSearch').value.toLowerCase();
        const filtered = allData.filter(p => {
            const matchName = `${p.nombres} ${p.apellidos}`.toLowerCase().includes(query);
            const matchArea = currentArea === "Todos" || p.area.trim() === currentArea;
            return matchName && matchArea;
        });
        render(filtered);
    }

    function render(list) {
        const body = document.getElementById('tableBody');
        body.innerHTML = list.map((p, idx) => {
            const areaKey = p.area.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes('logistica') ? 'logistica' : 
                            p.area.toLowerCase().includes('mejora') ? 'mejora' : 
                            p.area.toLowerCase().includes('ventas') ? 'ventas' :
                            p.area.toLowerCase().includes('finanzas') ? 'finanzas' :
                            p.area.toLowerCase().includes('marketing') ? 'marketing' : 'recursos';

            return `
                <tr>
                    <td class="mono" style="color: var(--text-muted); font-size: 0.8rem;">${idx + 1}</td>
                    <td>
                        <div class="user-info">
                            <div class="user-avatar">${p.apellidos[0]}${p.nombres[0]}</div>
                            <div>
                                <div style="font-weight: 700; font-size: 0.85rem;">${p.apellidos.toUpperCase()}</div>
                                <div style="color: var(--text-muted); font-size: 0.75rem;">${p.nombres}</div>
                            </div>
                        </div>
                    </td>
                    <td><span class="badge" style="background: var(--${areaKey})">${p.area}</span></td>
                    <td class="mono" style="font-size: 0.8rem;">${p.hora_entrada ? new Date(p.hora_entrada).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--:--'}</td>
                    <td class="mono" style="font-size: 0.8rem;">${p.hora_salida ? new Date(p.hora_salida).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--:--'}</td>
                    <td><span class="hours-pill mono">${p.horas_acumuladas ? p.horas_acumuladas.split(':').slice(0,2).join(':') : '00:00'}</span></td>
                    <td style="text-align: center;">
                        <button class="action-btn edit-btn" onclick='openEdit(${JSON.stringify(p)})'><i class="fas fa-edit"></i></button>
                        <button class="action-btn delete-btn" onclick='openDelete(${JSON.stringify(p)})'><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function openEdit(p) {
        document.getElementById('editId').value = p.id_practicantes;
        document.getElementById('editNombres').value = p.nombres;
        document.getElementById('editApellidos').value = p.apellidos;
        document.getElementById('editArea').value = p.area;
        document.getElementById('modalEdit').classList.add('active');
    }

    async function saveEdit() {
        const id = document.getElementById('editId').value;
        const payload = {
            nombres: document.getElementById('editNombres').value,
            apellidos: document.getElementById('editApellidos').value,
            area: document.getElementById('editArea').value
        };
        await fetch(`${API}/practicantes/${id}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        closeModal('modalEdit');
        fetchData();
    }

    function openDelete(p) {
        const nombreCompleto = `${p.nombres} ${p.apellidos}`;
        document.getElementById('deleteText').innerHTML = `¿Estás seguro de eliminar a <b>${nombreCompleto}</b>?`;
        document.getElementById('modalDelete').classList.add('active');
        
        document.getElementById('confirmDeleteBtn').onclick = async () => {
            try {
                const res = await fetch(`${API}/practicantes/${p.id_practicantes}`, { method: 'DELETE' });
                if(res.ok) {
                    closeModal('modalDelete');
                    showSuccessMessage(nombreCompleto);
                    fetchData();
                }
            } catch (e) { console.error(e); }
        };
    }

    function showSuccessMessage(nombre) {
        document.getElementById('successText').innerHTML = `El practicante <b>${nombre}</b> ha sido eliminado correctamente del sistema.`;
        document.getElementById('modalSuccess').classList.add('active');
    }

    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    function setFilter(area, btn) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        currentArea = area;
        filterData();
    }

    window.onload = fetchData;
</script>
</body>
</html>
