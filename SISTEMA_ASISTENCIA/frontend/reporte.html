<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRHH | Reporte de Practicantes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ventas: #fb7185; --finanzas: #34d399; --marketing: #a78bfa;
            --logistica: #fbbf24; --mejora: #22d3ee; --recursos: #f472b6;
            --bg-body: #020617;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #f1f5f9;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-body); 
            padding: clamp(1rem, 3vw, 2.5rem);
            min-height: 100vh;
        }

        .container { 
            width: 100%; max-width: 1440px; margin: auto; 
            background: var(--surface); 
            border-radius: 32px; 
            padding: clamp(1.5rem, 4vw, 3rem); 
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.4); 
        }

        .header { margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 2px solid #f1f5f9; }
        .nav-back { text-decoration: none; color: var(--text-muted); font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 6px; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2.5rem; }
        .stat-card { background: #f8fafc; padding: 1.5rem; border-radius: 20px; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 1rem; }
        .stat-icon { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; background: white; color: var(--accent); }

        .controls-card { background: #f8fafc; padding: 1.5rem; border-radius: 24px; margin-bottom: 2rem; border: 1px solid var(--border-color); }
        .search-wrapper { position: relative; margin-bottom: 1.2rem; }
        .search-wrapper i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-wrapper input { width: 100%; padding: 14px 14px 14px 50px; border-radius: 16px; border: 1px solid #e2e8f0; font-family: inherit; font-weight: 500; }
        
        .filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
        .tab { padding: 8px 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 0.75rem; color: white; transition: 0.3s; opacity: 0.5; }
        .tab.active { opacity: 1; outline: 2px solid var(--text-main); outline-offset: 2px; }
        .tab-todos { background: var(--text-main); }
        .tab-ventas { background: var(--ventas); }
        .tab-finanzas { background: var(--finanzas); }
        .tab-marketing { background: var(--marketing); }
        .tab-logistica { background: var(--logistica); }
        .tab-mejora { background: var(--mejora); }
        .tab-recursos { background: var(--recursos); }

        .table-container { border-radius: 20px; overflow-x: auto; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 800px; }
        th { background: #f8fafc; padding: 16px 20px; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); font-weight: 800; }
        td { padding: 16px 20px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 12px; background: #eef2ff; color: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 800; flex-shrink: 0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .badge-area { padding: 6px 12px; border-radius: 8px; color: white; font-size: 0.75rem; font-weight: 700; display: inline-block; white-space: nowrap; }
        .bg-ventas { background-color: var(--ventas); }
        .bg-finanzas { background-color: var(--finanzas); }
        .bg-marketing { background-color: var(--marketing); }
        .bg-logistica { background-color: var(--logistica); }
        .bg-mejora { background-color: var(--mejora); }
        .bg-recursos { background-color: var(--recursos); }

        .action-group { display: flex; gap: 8px; justify-content: center; }
        .action-btn { width: 34px; height: 34px; border-radius: 10px; border: none; cursor: pointer; background: #f1f5f9; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .edit-btn { color: var(--accent); }
        .delete-btn { color: var(--danger); }
        .action-btn:hover { transform: scale(1.1); filter: brightness(0.9); }

        /* MODALES */
        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.7); 
            backdrop-filter: blur(8px); display: none; align-items: center; 
            justify-content: center; z-index: 2000; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        
        .modal-card { 
            background: white; border-radius: 32px; width: 100%; max-width: 480px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); overflow: hidden;
            animation: modalScale 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalScale {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header-pro {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            padding: 40px 30px; color: white; text-align: center;
        }
        .modal-header-pro i { font-size: 3rem; margin-bottom: 15px; display: block; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); }
        .modal-header-pro h3 { font-size: 1.6rem; font-weight: 800; }

        .modal-body-pro { padding: 30px; }
        .form-field-pro { margin-bottom: 20px; }
        .form-field-pro label { display: block; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
        
        .input-group-pro { position: relative; }
        .input-group-pro i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--accent); }
        .input-group-pro input, .input-group-pro select {
            width: 100%; padding: 16px 16px 16px 48px; border-radius: 16px;
            border: 2px solid #f1f5f9; background: #f8fafc; font-family: inherit;
            font-weight: 600; transition: 0.3s;
        }
        .input-group-pro input:focus { border-color: var(--accent); background: white; }

        .btn-group-pro { display: flex; gap: 12px; margin-top: 10px; }
        .btn-pro { flex: 1; padding: 18px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-save { background: var(--accent); color: white; }
        .btn-cancel { background: #f1f5f9; color: var(--text-muted); }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { background: white; padding: 16px 24px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 12px; margin-bottom: 10px; border-left: 5px solid var(--success); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div class="container">
    <header class="header">
        <a href="index.html" class="nav-back"><i class="fas fa-chevron-left"></i> Volver al inicio </a>
        <h2>Reporte de <span style="color: var(--accent);">Practicantes</span></h2>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-users"></i></div>
            <div>
                <p style="font-size: 0.75rem; color: var(--text-muted); font-weight: 700;">TOTAL REGISTRADOS</p>
                <h4 id="statTotal" class="mono">0</h4>
            </div>
        </div>
        <div class="stat-card" style="cursor: pointer;" onclick="generatePDF()">
            <div class="stat-icon" style="color: white; background: var(--accent);"><i class="fas fa-file-pdf"></i></div>
            <div>
                <p style="font-size: 0.75rem; color: var(--text-muted); font-weight: 700;">EXPORTAR DATOS</p>
                <h4 style="font-size: 0.8rem; font-weight: 800;">DESCARGAR PDF</h4>
            </div>
        </div>
        <div class="stat-card" style="cursor: pointer;" onclick="openModal('modalResetTable')">
            <div class="stat-icon" style="color: white; background: var(--warning);"><i class="fas fa-sync-alt"></i></div>
            <div>
                <p style="font-size: 0.75rem; color: var(--text-muted); font-weight: 700;">LIMPIAR TABLA</p>
                <h4 style="font-size: 0.8rem; font-weight: 800;">REINICIAR CICLO</h4>
            </div>
        </div>
    </div>

    <section class="controls-card">
        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="inputSearch" placeholder="Buscar por nombre o apellido..." onkeyup="filterData()">
        </div>
        <div class="filter-tabs">
            <button class="tab tab-todos active" onclick="setFilter('Todos', this)">Todos</button>
            <button class="tab tab-ventas" onclick="setFilter('Ventas', this)">Ventas</button>
            <button class="tab tab-finanzas" onclick="setFilter('Finanzas', this)">Finanzas</button>
            <button class="tab tab-marketing" onclick="setFilter('Marketing', this)">Marketing</button>
            <button class="tab tab-logistica" onclick="setFilter('Logística', this)">Logística</button>
            <button class="tab tab-mejora" onclick="setFilter('Mejora Continua', this)">Mejora Continua</button>
            <button class="tab tab-recursos" onclick="setFilter('Recursos Humanos', this)">Recursos Humanos</button>
        </div>
    </section>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">N°</th>
                    <th>Practicante</th>
                    <th>Área</th>
                    <th>Entrada</th>
                    <th>Salida</th>
                    <th>Acumulado</th>
                    <th style="text-align: center;">Acciones</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="modalEdit">
    <div class="modal-card">
        <div class="modal-header-pro">
            <i class="fas fa-user-edit"></i>
            <h3>Editar Datos</h3>
        </div>
        <div class="modal-body-pro">
            <input type="hidden" id="editId">
            <div class="form-field-pro">
                <label>Nombres</label>
                <div class="input-group-pro"><i class="fas fa-user"></i><input type="text" id="editNombres"></div>
            </div>
            <div class="form-field-pro">
                <label>Apellidos</label>
                <div class="input-group-pro"><i class="fas fa-signature"></i><input type="text" id="editApellidos"></div>
            </div>
            <div class="form-field-pro">
                <label>Área</label>
                <div class="input-group-pro">
                    <i class="fas fa-building"></i>
                    <select id="editArea">
                        <option value="Ventas">Ventas</option>
                        <option value="Finanzas">Finanzas</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Logística">Logística</option>
                        <option value="Mejora Continua">Mejora Continua</option>
                        <option value="Recursos Humanos">Recursos Humanos</option>
                    </select>
                </div>
            </div>
            <div class="btn-group-pro">
                <button class="btn-pro btn-cancel" onclick="closeModal('modalEdit')">Cancelar</button>
                <button class="btn-pro btn-save" onclick="saveEdit()">Guardar Cambios</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalDeleteConfirm">
    <div class="modal-card">
        <div style="padding: 40px 30px; text-align: center;">
            <i class="fas fa-trash-alt" style="font-size: 3rem; color: var(--danger); margin-bottom: 20px;"></i>
            <h3>¿Eliminar Registro?</h3>
            <p id="deleteTargetName" style="margin: 15px 0; font-weight: 700; color: var(--danger);"></p>
            <div class="btn-group-pro">
                <button class="btn-pro btn-cancel" onclick="closeModal('modalDeleteConfirm')">No, cancelar</button>
                <button class="btn-pro" style="background: var(--danger); color: white;" id="confirmDeleteBtn">Sí, eliminar</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalResetTable">
    <div class="modal-card">
        <div style="padding: 40px 30px; text-align: center;">
            <i class="fas fa-sync-alt" style="font-size: 3rem; color: var(--warning); margin-bottom: 20px;"></i>
            <h3>¿Reiniciar Tabla?</h3>
            <p style="margin: 15px 0; color: var(--text-muted);">Esta acción no se puede deshacer.</p>
            <div class="btn-group-pro">
                <button class="btn-pro btn-cancel" onclick="closeModal('modalResetTable')">Cancelar</button>
                <button class="btn-pro" style="background: var(--warning); color: white;" onclick="confirmReset()">Confirmar Reinicio</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<script>
    const API = "https://asistencia-recursos.onrender.com/api";
    let allData = [];
    let currentArea = "Todos";
    let practicanteAEliminar = null;

    const AREA_COLORS = {
        'Todos': [15, 23, 42], 'Ventas': [251, 113, 133], 'Finanzas': [52, 211, 153],
        'Marketing': [167, 139, 250], 'Logística': [251, 191, 36], 
        'Mejora Continua': [34, 211, 238], 'Recursos Humanos': [244, 114, 182]
    };

    const AREA_CLASSES = {
        'Ventas': 'bg-ventas', 'Finanzas': 'bg-finanzas', 'Marketing': 'bg-marketing',
        'Logística': 'bg-logistica', 'Mejora Continua': 'bg-mejora', 'Recursos Humanos': 'bg-recursos'
    };

    async function fetchData() {
        try {
            const r = await fetch(`${API}/reporte`);
            if (!r.ok) throw new Error("Error en red");
            allData = await r.json();
            document.getElementById('statTotal').innerText = allData.length;
            filterData();
        } catch (e) {
            console.error("Error API:", e);
        }
    }

    function filterData() {
        const query = document.getElementById('inputSearch').value.toLowerCase();
        let filtered = allData.filter(p => {
            const fullName = `${p.nombres} ${p.apellidos}`.toLowerCase();
            const matchName = fullName.includes(query);
            const matchArea = currentArea === "Todos" || p.area.trim() === currentArea;
            return matchName && matchArea;
        });
        render(filtered);
    }

    function render(list) {
        const body = document.getElementById('tableBody');
        body.innerHTML = list.map((p, idx) => {
            const formatDT = (s) => s ? new Date(s).toLocaleString('es-ES', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) : '--/-- --:--';
            const acumulado = p.horas_acumuladas ? p.horas_acumuladas.substring(0, 5) : "00:00";
            return `
                <tr>
                    <td class="mono">${idx + 1}</td>
                    <td>
                        <div class="user-info">
                            <div class="user-avatar">${p.apellidos[0] || ''}${p.nombres[0] || ''}</div>
                            <div>
                                <div style="font-weight: 700; font-size: 0.85rem;">${(p.apellidos || '').toUpperCase()}</div>
                                <div style="color: var(--text-muted); font-size: 0.75rem;">${p.nombres || ''}</div>
                            </div>
                        </div>
                    </td>
                    <td><span class="badge-area ${AREA_CLASSES[p.area.trim()] || ''}">${p.area}</span></td>
                    <td class="mono" style="font-size: 0.75rem;">${formatDT(p.hora_entrada)}</td>
                    <td class="mono" style="font-size: 0.75rem;">${formatDT(p.hora_salida)}</td>
                    <td><span style="font-weight:800;" class="mono">${acumulado}</span></td>
                    <td>
                        <div class="action-group">
                            <button class="action-btn edit-btn" onclick="openEdit(${p.id_practicantes})"><i class="fas fa-pen"></i></button>
                            <button class="action-btn delete-btn" onclick="askDelete(${p.id_practicantes}, '${p.nombres}', '${p.apellidos}')"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const headerColor = AREA_COLORS[currentArea] || [99, 102, 241];

        doc.setFillColor(...headerColor);
        doc.rect(0, 0, 210, 30, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(18);
        doc.text("REPORTE DE ASISTENCIA - " + currentArea.toUpperCase(), 15, 20);

        const rows = allData
            .filter(p => currentArea === "Todos" || p.area.trim() === currentArea)
            .map((p, i) => [i + 1, `${p.apellidos}, ${p.nombres}`, p.area, p.horas_acumuladas || "00:00"]);

        doc.autoTable({
            head: [['N°', 'PRACTICANTE', 'ÁREA', 'TIEMPO']],
            body: rows,
            startY: 40,
            headStyles: { fillColor: headerColor }
        });
        doc.save(`Reporte_${currentArea}.pdf`);
    }

    // LÓGICA DE EDICIÓN
    function openEdit(id) {
        const p = allData.find(x => x.id_practicantes === id);
        if(!p) return;
        document.getElementById('editId').value = p.id_practicantes;
        document.getElementById('editNombres').value = p.nombres;
        document.getElementById('editApellidos').value = p.apellidos;
        document.getElementById('editArea').value = p.area.trim();
        openModal('modalEdit');
    }

    async function saveEdit() {
        const id = document.getElementById('editId').value;
        const payload = {
            nombres: document.getElementById('editNombres').value,
            apellidos: document.getElementById('editApellidos').value,
            area: document.getElementById('editArea').value
        };
        try {
            const r = await fetch(`${API}/practicantes/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if(r.ok) {
                closeModal('modalEdit');
                showToast("Datos actualizados");
                fetchData();
            }
        } catch (e) { console.error(e); }
    }

    // LÓGICA DE ELIMINACIÓN
    function askDelete(id, nombres, apellidos) {
        practicanteAEliminar = { id, name: `${nombres} ${apellidos}` };
        document.getElementById('deleteTargetName').innerText = practicanteAEliminar.name;
        openModal('modalDeleteConfirm');
    }

    document.getElementById('confirmDeleteBtn').onclick = async () => {
        try {
            const r = await fetch(`${API}/practicantes/${practicanteAEliminar.id}`, { method: 'DELETE' });
            if(r.ok) {
                closeModal('modalDeleteConfirm');
                showToast("Registro eliminado");
                fetchData();
            }
        } catch (e) { console.error(e); }
    };

    // LÓGICA REINICIO
    async function confirmReset() {
        // Aquí llamarías a tu endpoint de limpieza si existe, 
        // por ahora cerramos y refrescamos para asegurar integridad.
        closeModal('modalResetTable');
        showToast("Ciclo reiniciado correctamente");
        fetchData();
    }

    function setFilter(area, btn) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        currentArea = area;
        filterData();
    }

    function showToast(msg) {
        const container = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerHTML = `<i class="fas fa-check-circle"></i><span>${msg}</span>`;
        container.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    window.onload = fetchData;
</script>
</body>
</html>
