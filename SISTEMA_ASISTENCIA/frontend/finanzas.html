<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRHH - Área de Finanzas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00ffa3; 
            --secondary: #2ecc71;
            --dark-bg: #020617;
            --bg-gradient: linear-gradient(-45deg, #020617, #064e3b, #065f46, #020617);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glow-orb {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 255, 163, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            animation: float 8s infinite alternate ease-in-out;
        }

        @keyframes float {
            from { transform: translate(-10%, -10%) scale(1); }
            to { transform: translate(10%, 10%) scale(1.1); }
        }

        .container { 
            position: relative;
            z-index: 10;
            max-width: 800px; 
            width: 90%;
            background: rgba(255, 255, 255, 0.03); 
            padding: 40px; 
            border-radius: 32px; 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header-flex { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        #reloj-lista { 
            font-weight: 800; 
            color: var(--primary); 
            font-size: 1.5rem; 
            background: rgba(0, 255, 163, 0.1); 
            padding: 10px 20px; 
            border-radius: 16px; 
            border: 1px solid rgba(0, 255, 163, 0.2);
            text-shadow: 0 0 10px rgba(0, 255, 163, 0.3);
        }

        #lista-asistencia { display: grid; gap: 12px; }

        .item-practicante { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 18px 25px; 
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s all ease; 
        }

        .item-practicante:hover { 
            background: rgba(255, 255, 255, 0.07);
            transform: translateX(5px);
            border-color: var(--primary);
        }

        .info-user strong { font-size: 1.1rem; color: #f8fafc; display: block; }
        .info-user small { color: #94a3b8; font-weight: 500; }

        .btn-group { display: flex; gap: 10px; }

        .btn-asistencia { 
            padding: 12px 18px; 
            border-radius: 14px; 
            border: none; 
            cursor: pointer; 
            font-weight: 700; 
            color: white; 
            transition: 0.3s; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .btn-entrada { background: #059669; box-shadow: 0 4px 15px rgba(5, 150, 105, 0.2); }
        .btn-salida { background: #2563eb; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2); } 

        .btn-asistencia:hover { 
            transform: translateY(-2px); 
            filter: brightness(1.2); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); 
        }

        .btn-back { 
            text-decoration: none; 
            color: #94a3b8; 
            font-weight: 600; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px;
            margin-bottom: 20px; 
            transition: 0.3s;
        }
        .btn-back:hover { color: var(--primary); transform: translateX(-5px); }

        #mensaje-alert {
            position: fixed; top: 20px; right: 20px; 
            padding: 15px 25px; border-radius: 12px; 
            color: white; display: none; z-index: 1000;
            font-weight: 700; animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <div class="glow-orb" style="top: -100px; left: -100px;"></div>
    <div class="glow-orb" style="bottom: -100px; right: -100px; animation-delay: -4s;"></div>

    <div id="mensaje-alert"></div>

    <div class="container">
        <a href="lista.html" class="btn-back"><i class="fas fa-arrow-left"></i> Volver a Áreas</a>
        
        <div class="header-flex">
            <div>
                <p style="margin:0; color: var(--primary); font-weight: 800; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px;">Gestión de Talento</p>
                <h2 style="font-size: 2rem;">Área <span style="color: var(--primary);">Finanzas</span></h2>
            </div>
            <div id="reloj-lista">00:00:00</div>
        </div>

        <div id="lista-asistencia">
            </div>
    </div>

    <script>
        const API_URL = "https://asistencia-recursos.onrender.com/api/practicantes";
        const ASISTENCIA_URL = "https://asistencia-recursos.onrender.com/api/asistencia";
        const AREA_PAGINA = "Finanzas"; 

        setInterval(() => {
            document.getElementById('reloj-lista').innerText = new Date().toLocaleTimeString('es-PE', { hour12: true });
        }, 1000);

        function showAlert(msg, isError = false) {
            const el = document.getElementById('mensaje-alert');
            el.innerHTML = `<i class="fas ${isError ? 'fa-times-circle' : 'fa-check-circle'}"></i> ${msg}`;
            el.style.backgroundColor = isError ? "#ef4444" : "#10b981";
            el.style.display = "block";
            setTimeout(() => { el.style.display = "none"; }, 3000);
        }

        async function cargarLista() {
            try {
                const res = await fetch(`${API_URL}?area=${encodeURIComponent(AREA_PAGINA)}`);
                let data = await res.json();
                const listaDiv = document.getElementById('lista-asistencia');
                
                if(data.length === 0) {
                    listaDiv.innerHTML = `<p style="text-align:center; opacity:0.5;">No hay practicantes en esta área.</p>`;
                    return;
                }

                data.sort((a, b) => (a.apellidos || "").localeCompare(b.apellidos || ""));

                listaDiv.innerHTML = data.map(p => `
                    <div class="item-practicante">
                        <div class="info-user">
                            <strong>${p.apellidos}, ${p.nombres}</strong>
                            <small>ID: ${p.id_practicantes}</small>
                        </div>
                        <div class="btn-group">
                            <button class="btn-asistencia btn-entrada" onclick="marcar(${p.id_practicantes}, 'entrada')">
                                <i class="fas fa-sign-in-alt"></i> Entrada
                            </button>
                            <button class="btn-asistencia btn-salida" onclick="marcar(${p.id_practicantes}, 'salida')">
                                <i class="fas fa-sign-out-alt"></i> Salida
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error(e);
            }
        }

        async function marcar(id, tipo) {
            try {
                const res = await fetch(`${ASISTENCIA_URL}/${id}`, { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tipo_registro: tipo })
                });
                if (res.ok) showAlert(`Asistencia (${tipo}) registrada correctamente.`);
                else showAlert("Error al registrar", true);
            } catch (e) { showAlert("Error de conexión", true); }
        }

        window.onload = cargarLista;
    </script>
</body>
</html>
