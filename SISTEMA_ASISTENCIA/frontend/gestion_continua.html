<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RRHH | Mejora Continua</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2103/2103633.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #00f2ff; 
            --primary-glow: rgba(0, 242, 255, 0.2);
            --surface: rgba(10, 20, 35, 0.85);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --bg-dark: #010409;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 5% 5%, rgba(0, 242, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 95% 95%, rgba(0, 100, 255, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: clamp(1rem, 4vw, 2rem);
        }

        .main-wrapper { 
            width: 100%; 
            max-width: 900px; 
            animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .nav-link {
            display: inline-flex; align-items: center; gap: 12px; text-decoration: none;
            color: var(--text-dim); font-size: 0.85rem; font-weight: 700;
            margin-bottom: 2rem; transition: 0.4s ease; letter-spacing: 2px;
            background: rgba(255,255,255,0.03); padding: 12px 24px; border-radius: 50px;
            border: 1px solid var(--border);
        }
        .nav-link:hover { color: var(--primary); transform: translateX(-5px); border-color: var(--primary); background: rgba(0, 242, 255, 0.05); }

        .glass-panel { 
            background: var(--surface); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px);
            border-radius: 40px; 
            padding: clamp(1.5rem, 6vw, 3.5rem); 
            border: 1px solid var(--border);
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .app-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 3.5rem; flex-wrap: wrap; gap: 2rem; 
        }

        .brand-box p { 
            color: var(--primary); font-size: 0.75rem; text-transform: uppercase; 
            letter-spacing: 5px; font-weight: 800; margin-bottom: 10px;
            text-shadow: 0 0 10px var(--primary-glow);
        }
        .brand-box h2 { font-size: clamp(1.8rem, 5vw, 2.5rem); font-weight: 800; letter-spacing: -1.5px; }

        .clock-badge {
            font-family: 'JetBrains Mono', monospace;
            background-color: rgba(0, 242, 255, 0.08);
            color: var(--primary); padding: 14px 28px; border-radius: 20px;
            border: 1px solid var(--primary-glow); 
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.1); 
            font-size: 1.25rem; font-weight: 700;
        }

        .scroll-area { 
            display: grid; gap: 18px; max-height: 50vh; 
            overflow-y: auto; padding-right: 12px; 
        }
        .scroll-area::-webkit-scrollbar { width: 5px; }
        .scroll-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .user-card {
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid var(--border);
            border-radius: 26px; 
            padding: 1.5rem 2rem; 
            display: flex; justify-content: space-between; align-items: center; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .user-card:hover { 
            background: rgba(0, 242, 255, 0.03); 
            border-color: var(--primary); 
            transform: scale(1.02) translateX(8px); 
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .user-data strong { font-size: 1.15rem; color: #fff; display: block; margin-bottom: 6px; letter-spacing: 0.5px; }
        .user-data span { color: var(--text-dim); font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .user-data i { color: var(--primary); }

        .actions { display: flex; gap: 12px; }
        
        .btn-ui {
            border: none; cursor: pointer; padding: 14px 26px; border-radius: 18px;
            font-weight: 800; font-size: 0.8rem; text-transform: uppercase; color: white;
            display: flex; align-items: center; gap: 10px; transition: 0.3s;
            letter-spacing: 1px;
        }

        .btn-in { background: #0088cc; box-shadow: 0 5px 15px rgba(0, 136, 204, 0.2); }
        .btn-out { background: #005588; box-shadow: 0 5px 15px rgba(0, 85, 136, 0.2); }

        .btn-ui:hover:not(:disabled) { transform: translateY(-3px); filter: brightness(1.2); box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        .btn-ui:active { transform: translateY(-1px); }
        .btn-ui:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        #notification {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); 
            padding: 20px 40px; border-radius: 24px;
            color: white; font-weight: 800; font-size: 0.95rem; z-index: 9999;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6); display: none;
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1);
            text-align: center; min-width: 320px;
            animation: toastIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes toastIn { from { transform: translate(-50%, 100px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

        @media (max-width: 768px) {
            .app-header { flex-direction: column; text-align: center; }
            .user-card { flex-direction: column; text-align: center; gap: 1.5rem; padding: 2rem; }
            .user-data span { justify-content: center; }
            .actions { width: 100%; }
            .btn-ui { flex: 1; justify-content: center; padding: 18px; }
        }
    </style>
</head>
<body>

    <div id="notification"></div>

    <div class="main-wrapper">
        <a href="lista.html" class="nav-link"><i class="fas fa-arrow-left"></i>Volver</a>

        <main class="glass-panel">
            <header class="app-header">
                <div class="brand-box">
                    <p>Continuous Improvement</p>
                    <h2>Área <span style="font-weight:300; color:var(--primary)">Mejora Continua</span></h2>
                </div>
                <div class="clock-badge" id="live-clock">--:--:-- --</div>
            </header>

            <section class="scroll-area" id="list-container">
                <div style="text-align:center; padding: 5rem; color: var(--text-dim);">
                    <div class="fa-3x" style="margin-bottom: 2rem;">
                        <i class="fas fa-microchip fa-spin" style="color:var(--primary)"></i>
                    </div>
                    <p style="font-size:0.9rem; font-weight:800; letter-spacing:4px">SINCRONIZANDO DATAFLOW...</p>
                </div>
            </section>
        </main>
    </div>

    <script>
        const API_GET = "https://asistencia-recursos.onrender.com/api/practicantes";
        const API_POST = "https://asistencia-recursos.onrender.com/api/asistencia";
        const AREA_TAG = "Mejora Continua";

        function updateClock() {
            const clock = document.getElementById('live-clock');
            const tick = () => {
                clock.textContent = new Date().toLocaleTimeString('es-PE', {
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
                }).toUpperCase();
            };
            tick();
            setInterval(tick, 1000);
        }

        function alertUI(text, isError = false) {
            const el = document.getElementById('notification');
            el.innerHTML = `<i class="fas ${isError ? 'fa-bolt' : 'fa-check-double'}"></i> ${text}`;
            el.style.backgroundColor = isError ? "rgba(225, 29, 72, 0.95)" : "rgba(0, 136, 204, 0.95)";
            el.style.display = "block";
            setTimeout(() => { el.style.display = "none"; }, 3500);
        }

        async function fetchPersonnel() {
            const container = document.getElementById('list-container');
            try {
                const res = await fetch(`${API_GET}?area=${encodeURIComponent(AREA_TAG)}`);
                const data = await res.json();

                if (!data || data.length === 0) {
                    container.innerHTML = `<div style="text-align:center; padding:4rem; opacity:0.5;">
                        <i class="fas fa-database fa-3x" style="margin-bottom:1rem; display:block;"></i>
                        <p>No se registran nodos (personal) en esta sección.</p>
                    </div>`;
                    return;
                }

                data.sort((a, b) => a.apellidos.localeCompare(b.apellidos));

                container.innerHTML = data.map(p => `
                    <div class="user-card">
                        <div class="user-data">
                            <strong>${p.apellidos.toUpperCase()}, ${p.nombres}</strong>
                            <span><i class="fas fa-satellite-dish"></i> SYS-ID: ${p.id_practicantes}</span>
                        </div>
                        <div class="actions">
                            <button class="btn-ui btn-in" onclick="register(${p.id_practicantes}, 'entrada', this)">
                                <i class="fas fa-play"></i> INICIAR
                            </button>
                            <button class="btn-ui btn-out" onclick="register(${p.id_practicantes}, 'salida', this)">
                                <i class="fas fa-power-off"></i> CERRAR
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                alertUI("Fallo crítico de enlace", true);
                container.innerHTML = `<div style="text-align:center; color:#f43f5e; padding:3rem;">
                    <i class="fas fa-exclamation-circle fa-3x"></i>
                    <p style="margin-top:1rem;">Error de protocolo: Servidor no disponible.</p>
                </div>`;
            }
        }

        async function register(id, type, btn) {
            const card = btn.closest('.user-card');
            const allBtns = card.querySelectorAll('button');
            const originalIcon = btn.innerHTML;

            allBtns.forEach(b => b.disabled = true);
            btn.innerHTML = `<i class="fas fa-atom fa-spin"></i>`;

            try {
                const res = await fetch(`${API_POST}/${id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tipo_registro: type })
                });

                if (res.ok) {
                    alertUI(`OPTIMIZACIÓN: Registro de ${type.toUpperCase()} completado.`);
                } else {
                    alertUI("ERROR DE PROCESAMIENTO", true);
                }
            } catch (e) {
                alertUI("FALLO DE TRANSMISIÓN", true);
            } finally {
                setTimeout(() => {
                    allBtns.forEach(b => b.disabled = false);
                    btn.innerHTML = originalIcon;
                }, 800);
            }
        }

        window.onload = () => { updateClock(); fetchPersonnel(); };
    </script>
</body>
</html>
