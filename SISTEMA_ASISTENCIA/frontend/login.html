<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RRHH | Inicio de Sesión</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --bg-body: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --input-bg: #f8fafc;
            --border-color: #e2e8f0;
            --error: #f43f5e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.05) 0px, transparent 50%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px; color: var(--text-main);
        }

        .card { 
            background: var(--card-bg); 
            padding: 45px 40px; 
            border-radius: 40px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); 
            width: 100%; max-width: 420px; 
            border: 1px solid #ffffff;
            position: relative;
        }

        .card::after {
            content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 80px; height: 5px; background: var(--primary);
            border-radius: 0 0 10px 10px; opacity: 0.3;
        }

        .header-section { text-align: center; margin-bottom: 30px; }
        
        .header-section .icon-box {
            width: 70px; height: 70px; background: #f1f5ff;
            border-radius: 22px; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px; color: var(--primary); font-size: 2rem;
            border: 1px solid rgba(99, 102, 241, 0.1);
        }

        h2 { font-weight: 800; font-size: 1.75rem; letter-spacing: -1px; color: var(--text-main); margin-bottom: 4px; }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; font-weight: 500; }

        .form-group { margin-bottom: 22px; }
        label { display: block; font-weight: 700; color: var(--text-main); margin-bottom: 10px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; padding-left: 5px; }

        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.1rem; }
        
        input { 
            width: 100%; padding: 16px 20px 16px 55px; 
            border: 1.5px solid var(--border-color); border-radius: 18px; 
            outline: none; transition: 0.3s; font-size: 0.95rem; 
            font-family: inherit; background: var(--input-bg);
            color: var(--text-main);
        }

        input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        .btn-login { 
            width: 100%; padding: 18px; border: none; border-radius: 20px; 
            color: white; font-weight: 700; cursor: pointer; transition: 0.3s; 
            font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 12px;
            background: var(--primary);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
            margin-top: 10px; text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-login:hover { transform: translateY(-2px); background: #4f46e5; }
        .btn-login:disabled { background: var(--text-muted); cursor: not-allowed; opacity: 0.7; }

        #error-msg {
            background: #fff1f2; color: var(--error);
            padding: 12px; border-radius: 15px; font-size: 0.85rem;
            text-align: center; margin-bottom: 20px; font-weight: 600;
            display: none; border: 1px solid rgba(244, 63, 94, 0.2);
        }

        .spinner { animation: rotate 1s linear infinite; display: none; width: 20px; height: 20px; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <div class="header-section">
        <div class="icon-box"><i class="fas fa-lock"></i></div>
        <h2>Acceso Privado</h2>
        <span class="subtitle">Panel de Control RRHH</span>
    </div>

    <div id="error-msg">Credenciales incorrectas</div>

    <form id="loginForm">
        <div class="form-group">
            <label>Correo Electrónico</label>
            <div class="input-wrapper">
                <input type="email" id="txtEmail" placeholder="admin@gmail.com" required>
                <i class="fas fa-envelope"></i>
            </div>
        </div>
        
        <div class="form-group">
            <label>Contraseña</label>
            <div class="input-wrapper">
                <input type="password" id="txtPass" placeholder="••••••••" required>
                <i class="fas fa-key"></i>
            </div>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
            <i class="fas fa-sign-in-alt" id="btnIcon"></i>
            <i class="fas fa-circle-notch spinner" id="btnSpinner"></i>
            <span>Entrar al Sistema</span>
        </button>
    </form>
</div>

<script>
    // URL DE TU BACKEND (Asegúrate que coincida con tu server.js)
    const API_LOGIN_URL = "http://localhost:3000/api/login"; 

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('btnLogin');
        const icon = document.getElementById('btnIcon');
        const spinner = document.getElementById('btnSpinner');
        const errorDiv = document.getElementById('error-msg');
        
        const email = document.getElementById('txtEmail').value;
        const password = document.getElementById('txtPass').value;

        // Visual Feedback
        btn.disabled = true;
        icon.style.display = 'none';
        spinner.style.display = 'block';
        errorDiv.style.display = 'none';

        try {
            const response = await fetch(API_LOGIN_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok && data.token) {
                // Éxito: Guardamos token y redirigimos
                localStorage.setItem('token', data.token);
                window.location.href = 'index.html'; 
            } else {
                // Error de credenciales
                errorDiv.innerText = data.error || "Acceso denegado";
                errorDiv.style.display = 'block';
            }
        } catch (err) {
            errorDiv.innerText = "Error de conexión con el servidor";
            errorDiv.style.display = 'block';
        } finally {
            btn.disabled = false;
            icon.style.display = 'block';
            spinner.style.display = 'none';
        }
    });

    // Si ya tiene un token válido, enviarlo directo al index
    if(localStorage.getItem('token')) {
        window.location.href = 'index.html';
    }
</script>

</body>
</html>
