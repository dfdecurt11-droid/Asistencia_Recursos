<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RRHH | Logística</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #fbbf24; 
            --primary-glow: rgba(251, 191, 36, 0.15);
            --danger: #ef4444;
            --bg-dark: #020617;
            --card-bg: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
            --text-muted: #94a3b8;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, #1e1b01, #020617 80%);
            background-attachment: fixed;
            color: white;
            padding: clamp(1rem, 3vw, 2rem);
        }

        /* Elementos decorativos de fondo */
        .glow-orb {
            position: fixed; width: 500px; height: 500px;
            background: var(--primary); filter: blur(180px);
            opacity: 0.04; z-index: -1; border-radius: 50%;
        }

        .container { 
            width: 100%;
            max-width: 900px; 
            background: rgba(15, 23, 42, 0.6); 
            padding: clamp(1.5rem, 5vw, 3.5rem); 
            border-radius: 45px; 
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            box-shadow: 0 60px 120px -30px rgba(0,0,0,0.7);
            animation: appEntry 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes appEntry { from { opacity: 0; transform: scale(0.98) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; gap: 1rem; flex-wrap: wrap; }

        .btn-back {
            color: var(--text-muted); text-decoration: none; font-weight: 700; font-size: 0.85rem;
            display: flex; align-items: center; gap: 10px; transition: 0.4s;
            background: rgba(255,255,255,0.04); padding: 12px 22px; border-radius: 18px;
            text-transform: uppercase; letter-spacing: 1.5px; border: 1px solid transparent;
        }

        .btn-back:hover { color: var(--primary); background: rgba(251, 191, 36, 0.05); border-color: var(--primary-glow); transform: translateX(-6px); }

        #reloj {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800; color: var(--primary); font-size: 1.3rem;
            background: rgba(251, 191, 36, 0.08); padding: 10px 20px; border-radius: 16px;
            border: 1px solid var(--primary-glow); text-shadow: 0 0 15px var(--primary-glow);
        }

        .area-title { position: relative; }
        .area-tag { 
            display: inline-block; background: var(--primary-glow); color: var(--primary);
            padding: 6px 16px; border-radius: 12px; font-size: 0.7rem;
            font-weight: 800; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 12px;
        }
        .area-title h2 { font-size: clamp(2rem, 6vw, 2.8rem); font-weight: 800; letter-spacing: -2px; }

        .scroll-area { margin-top: 2.5rem; display: grid; gap: 16px; max-height: 52vh; overflow-y: auto; padding-right: 12px; }
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .item-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 1.5rem 2.2rem; background: var(--card-bg);
            border-radius: 28px; border: 1px solid var(--border); transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .item-row:hover { background: rgba(251, 191, 36, 0.02); border-color: var(--primary); transform: translateX(8px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

        .user-meta strong { font-size: 1.15rem; color: #fff; display: block; margin-bottom: 4px; }
        .user-meta span { color: var(--text-muted); font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .user-meta i { color: var(--primary); font-size: 0.9rem; }

        .actions { display: flex; gap: 12px; }

        .btn-mark {
            padding: 14px 24px; border-radius: 18px; border: none; cursor: pointer;
            font-weight: 800; font-size: 0.8rem; text-transform: uppercase;
            display: flex; align-items: center; gap: 10px; transition: 0.3s; color: white;
            letter-spacing: 1px;
        }

        .btn-in { background: #b45309; box-shadow: 0 4px 12px rgba(180, 83, 9, 0.2); }
        .btn-out { background: #334155; box-shadow: 0 4px 12px rgba(51, 65, 85, 0.2); }
        
        .btn-mark:hover:not(:disabled) { transform: translateY(-3px); filter: brightness(1.2); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .btn-mark:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        #toast {
            position: fixed; bottom: 30px; right: 30px; padding: 20px 35px; border-radius: 25px;
            background: #0f172a; color: white; box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            display: none; z-index: 10000; border: 1px solid var(--border);
            font-weight: 700; font-size: 0.95rem; animation: toastSlide 0.5s ease-out;
        }

        @keyframes toastSlide { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        @media (max-width: 768px) {
            .nav-header { flex-direction: column-reverse; text-align: center; }
            .item-row { flex-direction: column; text-align: center; gap: 1.5rem; padding: 2rem; }
            .actions { width: 100%; }
            .btn-mark { flex: 1; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="glow-orb" style="top: -100px; right: -100px;"></div>
    <div class="glow-orb" style="bottom: -100px; left: -100px;"></div>

    <div id="toast"></div>

    <main class="container">
        <nav class="nav-header">
            <a href="lista.html" class="btn-back"><i class="fas fa-arrow-left"></i>Volver</a>
            <div id="reloj">--:--:-- --</div>
        </nav>

        <header class="area-title">
            <span class="area-tag">Operations & Supply Chain</span>
            <h2>Área <span style="color: var(--primary);">Logística</span></h2>
        </header>

        <section id="lista-asistencia" class="scroll-area">
            <div style="text-align:center; padding: 80px; color: var(--text-muted);">
                <i class="fas fa-box-open fa-spin" style="font-size: 2.5rem; color: var(--primary); margin-bottom: 20px;"></i>
                <p style="letter-spacing: 3px; font-weight: 700; font-size: 0.85rem;">CARGANDO MANIFIESTO...</p>
            </div>
        </section>
    </main>

    <script>
        const API_BASE = "https://asistencia-recursos.onrender.com/api";
        const AREA_NAME = "Logística";

        function updateTime() {
            const clockEl = document.getElementById('reloj');
            const tick = () => {
                clockEl.textContent = new Date().toLocaleTimeString('es-PE', { 
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true 
                }).toUpperCase();
            };
            tick();
            setInterval(tick, 1000);
        }

        function notify(msg, error = false) {
            const t = document.getElementById('toast');
            t.innerHTML = `<i class="fas ${error ? 'fa-exclamation-triangle' : 'fa-check-circle'}" style="color:${error ? '#ef4444' : '#fbbf24'}; margin-right:12px;"></i> ${msg}`;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3500);
        }

        async function fetchPracticantes() {
            const container = document.getElementById('lista-asistencia');
            try {
                const res = await fetch(`${API_BASE}/practicantes?area=${encodeURIComponent(AREA_NAME)}`);
                const data = await res.json();

                if(!data.length) {
                    container.innerHTML = `<div style="text-align:center; padding: 60px; opacity:0.5;">
                        <i class="fas fa-archive fa-3x" style="margin-bottom:15px; display:block;"></i>
                        <p>No hay personal asignado a este almacén.</p>
                    </div>`;
                    return;
                }

                container.innerHTML = data.sort((a,b) => a.apellidos.localeCompare(b.apellidos)).map(p => `
                    <div class="item-row">
                        <div class="user-meta">
                            <strong>${p.apellidos.toUpperCase()}, ${p.nombres}</strong>
                            <span><i class="fas fa-barcode"></i> SKU-ID: ${p.id_practicantes}</span>
                        </div>
                        <div class="actions">
                            <button class="btn-mark btn-in" onclick="postAsistencia(${p.id_practicantes}, 'entrada', this)">
                                <i class="fas fa-dolly"></i> ENTRADA
                            </button>
                            <button class="btn-mark btn-out" onclick="postAsistencia(${p.id_practicantes}, 'salida', this)">
                                <i class="fas fa-box"></i> SALIDA
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                notify("Fallo de enlace con el servidor central", true);
                container.innerHTML = `<p style="text-align:center; color:#ef4444; padding: 40px; font-weight:700;">ERROR DE SINCRONIZACIÓN</p>`;
            }
        }

        async function postAsistencia(id, tipo, btn) {
            const originalContent = btn.innerHTML;
            const parent = btn.closest('.actions');
            const btns = parent.querySelectorAll('button');

            btns.forEach(b => b.disabled = true);
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i>`;

            try {
                const res = await fetch(`${API_BASE}/asistencia/${id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tipo_registro: tipo })
                });
                
                if(res.ok) {
                    notify(`LOGÍSTICA: ${tipo.toUpperCase()} confirmada.`);
                } else {
                    notify("Error de validación en el servidor", true);
                }
            } catch (e) {
                notify("Fallo crítico de comunicación", true);
            } finally {
                setTimeout(() => {
                    btns.forEach(b => b.disabled = false);
                    btn.innerHTML = originalContent;
                }, 600);
            }
        }

        window.onload = () => { updateTime(); fetchPracticantes(); };
    </script>
</body>
</html>
